    const _sh=getNightSleepHours(d.dateStr);const sh=_sh!=null?Math.round(_sh*10)/10:null;

    // 睡眠→当日
    if(sh!=null&&a!=null){
      if(sh<=5)sleepG.s.push(a);else if(sh<=7)sleepG.m.push(a);else sleepG.l.push(a);
    }
    // 飲酒→翌日（翌日データがある場合のみ）
    if(aTomorrow!=null){
      if(!tg)alcG.n.push(aTomorrow);
      else if(tg<=20)alcG.l.push(aTomorrow);
      else if(tg<=40)alcG.m.push(aTomorrow);
      else if(tg<=60)alcG.h.push(aTomorrow);
      else alcG.vh.push(aTomorrow);
    }
    // 飲水→当日（0.2L単位）
    if(a!=null&&d.water!=null){
      const w=Math.round(d.water*10)/10;
      if(w<=0.2)waterG.w02.push(a);
      else if(w<=0.4)waterG.w04.push(a);
      else if(w<=0.6)waterG.w06.push(a);
      else if(w<=0.8)waterG.w08.push(a);
      else if(w<=1.0)waterG.w10.push(a);
      else if(w<=1.2)waterG.w12.push(a);
      else if(w<=1.4)waterG.w14.push(a);
      else if(w<=1.6)waterG.w16.push(a);
      else if(w<=1.8)waterG.w18.push(a);
      else waterG.w20.push(a);
    }
  });
  const pd=scored.filter(l=>(l.pressureDiff||0)<=-5);
  const ps=scored.filter(l=>Math.abs(l.pressureDiff||0)<3);
  const sc2={};bad.forEach(l=>l.symptoms.forEach(s=>{sc2[s]=(sc2[s]||0)+1;}));
  const topS=Object.entries(sc2).sort((a,b)=>b[1]-a[1]).slice(0,4);

  const barCard=(title,rows)=>{
    const card=div({className:"card"},[div({style:{fontSize:"13px",fontWeight:700,color:"#e2e8f0",marginBottom:"10px"}},title)]);
    rows.forEach(({l,v,c,sub})=>{
      if(!v)return;
      card.appendChild(div({style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"5px"}},[
        div({style:{fontSize:"11px",color:"#94a3b8",minWidth:"72px"}},l),
        div({style:{flex:1,height:"6px",background:"#0f172a",borderRadius:"4px",overflow:"hidden"}},[div({style:{height:"100%",width:`${(parseFloat(v)/10)*100}%`,background:c,borderRadius:"4px"}})]),
        div({style:{fontSize:"12px",fontWeight:700,color:c,minWidth:"26px",textAlign:"right"}},v),
        sub?div({style:{fontSize:"10px",color:"#475569"}},sub):null
      ]));
    });
    return card;
  };

  // サマリー
  wrap.appendChild(div({style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",marginBottom:"10px"}},[
    {l:"記録日数",v:`${[...new Set(scored.map(l=>l.dateStr))].length}日`},{l:"平均体調",v:avg?`${avg}/10`:"—"},{l:"不調記録",v:`${bad.length}件`}
  ].map(({l,v})=>div({className:"card",style:{textAlign:"center",marginBottom:"0"}},[div({style:{fontSize:"10px",color:"#64748b",marginBottom:"3px"}},l),div({style:{fontSize:"17px",fontWeight:800,color:"#e2e8f0"}},v)]))));

  if(scored.length<3){
    wrap.appendChild(div({className:"card",style:{textAlign:"center",color:"#64748b",padding:"32px 16px"}},[div({style:{fontSize:"32px",marginBottom:"8px"}},"📋"),"体調を3件以上記録すると分析できます"]));
    return wrap;
  }

  wrap.appendChild(barCard("😴 睡眠と当日体調",[
    {l:"5h以下",v:ga(sleepG.s),c:"#ef4444",sub:`${sleepG.s.length}日`},
    {l:"6〜7h", v:ga(sleepG.m),c:"#eab308",sub:`${sleepG.m.length}日`},
    {l:"8h以上",v:ga(sleepG.l),c:"#22c55e",sub:`${sleepG.l.length}日`}
  ]));

  // 😴+💤 合計睡眠（夜＋昼寝）と当日体調
  const totalSleepG={s:[],m:[],l:[]};
  let hasNapData=false;
  state.dailies.forEach(d=>{
    const a=dayAvgScore(d.dateStr);
    if(a==null)return;
    const nightH=getNightSleepHours(d.dateStr);
    if(nightH==null)return;
    const napMins=(d.naps||[]).reduce((x,n)=>x+(n.mins||0),0);
    if(napMins>0)hasNapData=true;
    const total=nightH+napMins/60;
    if(total<=5)totalSleepG.s.push(a);else if(total<=7)totalSleepG.m.push(a);else totalSleepG.l.push(a);
  });
  if(hasNapData){
    wrap.appendChild(barCard("💤 合計睡眠（夜＋昼寝）と当日体調",[
      {l:"5h以下",v:ga(totalSleepG.s),c:"#ef4444",sub:`${totalSleepG.s.length}日`},
      {l:"6〜7h", v:ga(totalSleepG.m),c:"#eab308",sub:`${totalSleepG.m.length}日`},
      {l:"8h以上",v:ga(totalSleepG.l),c:"#22c55e",sub:`${totalSleepG.l.length}日`}
    ]));
  }
  wrap.appendChild(barCard("🍺 飲酒と翌日体調（純アルコール量）",[
    {l:"飲まない",v:ga(alcG.n), c:"#22c55e",sub:`${alcG.n.length}日`},
    {l:"〜20g",   v:ga(alcG.l), c:"#a3e635",sub:`${alcG.l.length}日`},
    {l:"〜40g",   v:ga(alcG.m), c:"#eab308",sub:`${alcG.m.length}日`},
    {l:"〜60g",   v:ga(alcG.h), c:"#f97316",sub:`${alcG.h.length}日`},
    {l:"60g超",   v:ga(alcG.vh),c:"#ef4444",sub:`${alcG.vh.length}日`}
  ]));
  wrap.appendChild(div({style:{fontSize:"9px",color:"#475569",margin:"-6px 0 10px",paddingLeft:"2px"}},"目安: 20g≒ビール中瓶1本 / 40g≒2本 / 60g≒3本"));
  wrap.appendChild(barCard("💧 飲水と当日体調（0.2L単位）",[
    {l:"〜0.2L",v:ga(waterG.w02),c:"#ef4444",sub:`${waterG.w02.length}日`},
    {l:"〜0.4L",v:ga(waterG.w04),c:"#ef4444",sub:`${waterG.w04.length}日`},
    {l:"〜0.6L",v:ga(waterG.w06),c:"#f97316",sub:`${waterG.w06.length}日`},
    {l:"〜0.8L",v:ga(waterG.w08),c:"#f97316",sub:`${waterG.w08.length}日`},
    {l:"〜1.0L",v:ga(waterG.w10),c:"#eab308",sub:`${waterG.w10.length}日`},
    {l:"〜1.2L",v:ga(waterG.w12),c:"#eab308",sub:`${waterG.w12.length}日`},
    {l:"〜1.4L",v:ga(waterG.w14),c:"#22c55e",sub:`${waterG.w14.length}日`},
    {l:"〜1.6L",v:ga(waterG.w16),c:"#22c55e",sub:`${waterG.w16.length}日`},
    {l:"〜1.8L",v:ga(waterG.w18),c:"#22c55e",sub:`${waterG.w18.length}日`},
    {l:"2.0L以上",v:ga(waterG.w20),c:"#38bdf8",sub:`${waterG.w20.length}日`},
  ]));

  // 🕐 時間帯別の体調（別観点：1日の中でいつ調子が良い/悪いか）
  const todG={morning:[],afternoon:[],evening:[],night:[]};
  scored.forEach(l=>{
    const h=l.hour;
    if(h>=5&&h<11)todG.morning.push(l.score);
    else if(h>=11&&h<17)todG.afternoon.push(l.score);
    else if(h>=17&&h<22)todG.evening.push(l.score);
    else todG.night.push(l.score);
  });
  const todRow=(l,arr)=>{const v=ga(arr);return {l,v,c:v?scoreColor(parseFloat(v)):"#475569",sub:`${arr.length}件`};};
  if(scored.length>=3){
    wrap.appendChild(barCard("🕐 時間帯別の体調",[
      todRow("朝 5-11時",todG.morning),
      todRow("昼 11-17時",todG.afternoon),
      todRow("夕 17-22時",todG.evening),
      todRow("夜 22-5時",todG.night)
    ]));
  }

  // 🏭 仕事シフトと当日体調
  const shiftG={s1:[],s2:[],off:[]};
  state.dailies.forEach(d=>{
    const a=dayAvgScore(d.dateStr);
    if(a==null)return;
    if(d.workStart==null){shiftG.off.push(a);}
    else if(d.workStart<12){shiftG.s1.push(a);}
    else {shiftG.s2.push(a);}
  });
  wrap.appendChild(barCard("🏭 仕事シフトと当日体調",[
    {l:"1直",v:ga(shiftG.s1), c:"#38bdf8",sub:`${shiftG.s1.length}日`},
    {l:"2直",v:ga(shiftG.s2), c:"#a78bfa",sub:`${shiftG.s2.length}日`},
    {l:"休み",v:ga(shiftG.off),c:"#22c55e",sub:`${shiftG.off.length}日`}
  ]));

  // 🌡️ 飲酒欲求の分析
  const cravingDays=state.dailies
    .map(d=>{
      const cr=d.cravings||{};
      const vals=Object.values(cr);
      if(!vals.length)return null;
      const maxCr=Math.max(...vals);
      const drinks=(d.drinks||[]).map(dr=>({...dr,drinkType:resolveDT(dr)}));
      const alcG2=drinks.reduce((x,b)=>x+pureAlcohol(b.ml,b.drinkType.pct),0);
      return {dateStr:d.dateStr, maxCr, drank:alcG2>0, score:dayAvgScore(d.dateStr)};
    })
    .filter(Boolean);

  if(cravingDays.length>=3){
    const cc=div({className:"card"},[div({style:{fontSize:"13px",fontWeight:700,color:"#e2e8f0",marginBottom:"10px"}},"🌡️ 飲酒欲求の分析")]);

    // 欲求が高い日に実際飲んだ割合
    const highCr=cravingDays.filter(c=>c.maxCr>=7);
    const lowCr=cravingDays.filter(c=>c.maxCr<=4);
    if(highCr.length>0){
      const drankPct=Math.round(highCr.filter(c=>c.drank).length/highCr.length*100);
      cc.appendChild(div({style:{display:"flex",gap:"8px",alignItems:"flex-start",marginBottom:"7px",padding:"7px 10px",borderRadius:"8px",background:drankPct>=70?"#ef444408":"#0f172a",border:`1px solid ${drankPct>=70?"#ef444422":"#1e3a5f"}`}},[
        span({style:{fontSize:"14px",flexShrink:0}},"🍺"),
        div({style:{fontSize:"12px",color:"#cbd5e1",lineHeight:1.6}},`欲求7以上の日は${highCr.length}日中${highCr.filter(c=>c.drank).length}日（${drankPct}%）で実際に飲酒しています`)
      ]));
    }

    // 欲求が高い日 vs 低い日の当日体調
    const highScore=highCr.filter(c=>c.score!=null).map(c=>c.score);
    const lowScore=lowCr.filter(c=>c.score!=null).map(c=>c.score);
    if(highScore.length>=2&&lowScore.length>=2){
      const hAvg=highScore.reduce((a,b)=>a+b,0)/highScore.length;
      const lAvg=lowScore.reduce((a,b)=>a+b,0)/lowScore.length;
      if(lAvg-hAvg>=0.5){
        cc.appendChild(div({style:{display:"flex",gap:"8px",alignItems:"flex-start",marginBottom:"7px",padding:"7px 10px",borderRadius:"8px",background:"#ef444408",border:"1px solid #ef444422"}},[
          span({style:{fontSize:"14px",flexShrink:0}},"📉"),
          div({style:{fontSize:"12px",color:"#cbd5e1",lineHeight:1.6}},`欲求が高い日（7以上）は体調も低い傾向（平均${hAvg.toFixed(1)} vs ${lAvg.toFixed(1)}）。体調不良が飲酒欲求の引き金になっている可能性があります`)
        ]));
      }
    }

    // 前日の睡眠と欲求の関係
    const prevSleepHigh=[],prevSleepLow=[];
    cravingDays.forEach(c=>{
      const p=c.dateStr.split('-');
      const prev=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
      prev.setDate(prev.getDate()-1);
      const prevStr=`${prev.getFullYear()}-${String(prev.getMonth()+1).padStart(2,'0')}-${String(prev.getDate()).padStart(2,'0')}`;
      const sh2=getNightSleepHours(prevStr);
      if(sh2==null)return;
      if(c.maxCr>=7)prevSleepHigh.push(sh2);
      else if(c.maxCr<=4)prevSleepLow.push(sh2);
    });
    if(prevSleepHigh.length>=2&&prevSleepLow.length>=2){
      const hS=prevSleepHigh.reduce((a,b)=>a+b,0)/prevSleepHigh.length;
      const lS=prevSleepLow.reduce((a,b)=>a+b,0)/prevSleepLow.length;
      if(lS-hS>=0.5){
        cc.appendChild(div({style:{display:"flex",gap:"8px",alignItems:"flex-start",marginBottom:"7px",padding:"7px 10px",borderRadius:"8px",background:"#f9731608",border:"1px solid #f9731622"}},[
          span({style:{fontSize:"14px",flexShrink:0}},"😴"),
          div({style:{fontSize:"12px",color:"#cbd5e1",lineHeight:1.6}},`欲求が高い日の前日は睡眠が短い傾向（平均${hS.toFixed(1)}h vs ${lS.toFixed(1)}h）。睡眠不足が翌日の欲求を高めている可能性があります`)
        ]));
      }
    }

    if(cc.children.length===1){
      cc.appendChild(div({style:{fontSize:"12px",color:"#475569",textAlign:"center",padding:"8px 0"}},"記録が増えるとパターンが表示されます"));
    }
    cc.appendChild(div({style:{fontSize:"10px",color:"#334155",marginTop:"6px"}},`※ 欲求記録がある${cravingDays.length}日分から分析`));
    wrap.appendChild(cc);
  }

  // 💧 射精と体調の関係
  const ejacDays=state.dailies.filter(d=>(d.ejaculations||[]).length>0).map(d=>d.dateStr);
  if(ejacDays.length>=2){
    const withE={same:[],next:[]}, withoutE={same:[],next:[]};
    state.dailies.forEach(d=>{
      const a=dayAvgScore(d.dateStr);
      const aN=dayAvgScore(nextD(d.dateStr));
      const has=(d.ejaculations||[]).length>0;
      if(a!=null)(has?withE.same:withoutE.same).push(a);
      if(aN!=null)(has?withE.next:withoutE.next).push(aN);
    });
    const ejacCard=div({className:"card"},[div({style:{fontSize:"13px",fontWeight:700,color:"#e2e8f0",marginBottom:"4px"}},"💧 射精と体調")]);
    ejacCard.appendChild(div({style:{fontSize:"10px",color:"#475569",marginBottom:"10px"}},`記録あり${ejacDays.length}日 / 月間平均 ${(ejacDays.length/Math.max(1,state.dailies.length)*30).toFixed(1)}回`));
    const rows=[
      {l:"あり日の体調",v:ga(withE.same),c:"#38bdf8",sub:`${withE.same.length}日`},
      {l:"なし日の体調",v:ga(withoutE.same),c:"#64748b",sub:`${withoutE.same.length}日`},
      {l:"あり翌日",v:ga(withE.next),c:"#a78bfa",sub:`${withE.next.length}日`},
      {l:"なし翌日",v:ga(withoutE.next),c:"#64748b",sub:`${withoutE.next.length}日`}
    ];
    rows.forEach(({l,v,c,sub})=>{
      if(!v)return;
      ejacCard.appendChild(div({style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"5px"}},[
        div({style:{fontSize:"11px",color:"#94a3b8",minWidth:"90px"}},l),
        div({style:{flex:1,height:"6px",background:"#0f172a",borderRadius:"4px",overflow:"hidden"}},[div({style:{height:"100%",width:`${(parseFloat(v)/10)*100}%`,background:c,borderRadius:"4px"}})]),
        div({style:{fontSize:"12px",fontWeight:700,color:c,minWidth:"26px",textAlign:"right"}},v),
        div({style:{fontSize:"10px",color:"#475569"}},sub)
      ]));
    });
    wrap.appendChild(ejacCard);
  }
  if(pd.length>0||ps.length>0) wrap.appendChild(barCard("🌡️ 気圧と体調",[
    {l:"急降下",v:pd.length?(pd.reduce((a,b)=>a+b.score,0)/pd.length).toFixed(1):null,c:"#ef4444",sub:`${pd.length}件`},
    {l:"安定",v:ps.length?(ps.reduce((a,b)=>a+b.score,0)/ps.length).toFixed(1):null,c:"#22c55e",sub:`${ps.length}件`}
  ]));
  if(topS.length>0){
    const sc=div({className:"card"},[div({style:{fontSize:"13px",fontWeight:700,color:"#e2e8f0",marginBottom:"10px"}},"🤒 不調時の体調状態")]);
    topS.forEach(([s,n])=>sc.appendChild(div({style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"5px"}},[
      div({style:{fontSize:"12px",color:"#cbd5e1",minWidth:"80px"}},s),
      div({style:{flex:1,height:"6px",background:"#0f172a",borderRadius:"4px",overflow:"hidden"}},[div({style:{height:"100%",width:`${(n/Math.max(bad.length,1))*100}%`,background:"#f97316",borderRadius:"4px"}})]),
      div({style:{fontSize:"11px",color:"#94a3b8",minWidth:"24px",textAlign:"right"}},`${n}回`)
    ])));
    wrap.appendChild(sc);
  }

  // 🍽️ 食材と体調の相関（翌日+翌々日の平均スコアで評価）
  const foodCorrel = (() => {
    // 日付→平均体調スコアのマップ
    const dateScore = {};
    scored.forEach(l => {
      if(!dateScore[l.dateStr]) dateScore[l.dateStr] = [];
      dateScore[l.dateStr].push(l.score);
    });
    const avgScore = ds => {
      const arr = dateScore[ds];
      return arr ? arr.reduce((a,b)=>a+b,0)/arr.length : null;
    };

    // 日付を1日進める
    const nextDay = ds => {
      const p=ds.split('-');
      const n=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
      n.setDate(n.getDate()+1);
      return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
    };

    // 全食材を集計
    const foodStats = {};
    state.dailies.forEach(d => {
      const foods = d.foods || [];
      if(!foods.length) return;
      const d1 = nextDay(d.dateStr);
      const d2 = nextDay(d1);
      const s1 = avgScore(d1);
      const s2 = avgScore(d2);
      const lagScores = [s1, s2].filter(s => s != null);
      if(!lagScores.length) return;
      const lagAvg = lagScores.reduce((a,b)=>a+b,0)/lagScores.length;
      foods.forEach(f => {
        if(!foodStats[f]) foodStats[f] = {eaten:[], notEaten:[]};
        foodStats[f].eaten.push(lagAvg);
      });
    });

    // 食べなかった日の翌日+翌々日スコアも計算
    const allFoods = Object.keys(foodStats);
    state.dailies.forEach(d => {
      const foods = d.foods || [];
      const d1 = nextDay(d.dateStr);
      const d2 = nextDay(d1);
      const s1 = avgScore(d1);
      const s2 = avgScore(d2);
      const lagScores = [s1, s2].filter(s => s != null);
      if(!lagScores.length) return;
      const lagAvg = lagScores.reduce((a,b)=>a+b,0)/lagScores.length;
      allFoods.forEach(f => {
        if(!foods.includes(f)) {
          foodStats[f].notEaten.push(lagAvg);
        }
      });
    });

    // 差分を計算（食べた翌日平均 - 食べなかった翌日平均）
    return Object.entries(foodStats)
      .filter(([,v]) => v.eaten.length >= 2 && v.notEaten.length >= 2)
      .map(([food, v]) => {
        const eAvg = v.eaten.reduce((a,b)=>a+b,0)/v.eaten.length;
        const nAvg = v.notEaten.reduce((a,b)=>a+b,0)/v.notEaten.length;
        return { food, eAvg, nAvg, diff: eAvg-nAvg, count: v.eaten.length };
      })
      .sort((a,b) => Math.abs(b.diff)-Math.abs(a.diff))
      .slice(0, 15);
  })();

  if(foodCorrel.length > 0){
    const fc = div({className:"card"},[]);
    fc.appendChild(div({style:{fontSize:"13px",fontWeight:700,color:"#e2e8f0",marginBottom:"4px"}},"🍽️ 食材と体調の相関"));
    fc.appendChild(div({style:{fontSize:"10px",color:"#475569",marginBottom:"12px"}},"食べた翌日・翌々日の平均体調スコアとの比較"));

    const positive = foodCorrel.filter(f => f.diff > 0.2);
    const negative = foodCorrel.filter(f => f.diff < -0.2);
    const neutral  = foodCorrel.filter(f => Math.abs(f.diff) <= 0.2);

    if(positive.length > 0){
      fc.appendChild(div({style:{fontSize:"11px",fontWeight:600,color:"#4ade80",marginBottom:"6px"}},"✅ 食べると体調が良くなる傾向"));
      positive.forEach(({food,diff,count}) => {
        const pct = Math.min(100, Math.abs(diff)/3*100);
        fc.appendChild(div({style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"5px"}},[
          div({style:{fontSize:"11px",color:"#e2e8f0",minWidth:"110px"}},`${fe(food)} ${food}`),
          div({style:{flex:1,height:"6px",background:"#0f172a",borderRadius:"4px",overflow:"hidden"}},[
            div({style:{height:"100%",width:`${pct}%`,background:"#22c55e",borderRadius:"4px"}})
          ]),
          div({style:{fontSize:"11px",fontWeight:700,color:"#22c55e",minWidth:"36px",textAlign:"right"}},`+${diff.toFixed(1)}`),
          div({style:{fontSize:"10px",color:"#475569"}},`${count}回`)
        ]));
      });
    }

    if(negative.length > 0){
      fc.appendChild(div({style:{fontSize:"11px",fontWeight:600,color:"#f87171",marginBottom:"6px",marginTop:"10px"}},"⚠️ 食べると体調が下がる傾向"));
      negative.forEach(({food,diff,count}) => {
        const pct = Math.min(100, Math.abs(diff)/3*100);
        fc.appendChild(div({style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"5px"}},[
          div({style:{fontSize:"11px",color:"#e2e8f0",minWidth:"110px"}},`${fe(food)} ${food}`),
          div({style:{flex:1,height:"6px",background:"#0f172a",borderRadius:"4px",overflow:"hidden"}},[
            div({style:{height:"100%",width:`${pct}%`,background:"#ef4444",borderRadius:"4px"}})
          ]),
          div({style:{fontSize:"11px",fontWeight:700,color:"#f87171",minWidth:"36px",textAlign:"right"}},diff.toFixed(1)),
          div({style:{fontSize:"10px",color:"#475569"}},`${count}回`)
        ]));
      });
    }

    if(positive.length===0 && negative.length===0){
      fc.appendChild(div({style:{fontSize:"12px",color:"#475569",textAlign:"center",padding:"8px 0"}},"データが不足しています（各食材2回以上の記録が必要）"));
    }

    fc.appendChild(div({style:{fontSize:"10px",color:"#334155",marginTop:"10px",lineHeight:1.6}},"※ 食べた翌日・翌々日の平均スコアの差。記録が増えるほど精度が上がります。"));
    wrap.appendChild(fc);
  }

  // 📌 わかったこと（ルールベース知見・自動生成）
  const insights=(()=>{
    const out=[];
    const gaN=arr=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:null;
    // 飲酒→翌日（20g超＝m/h/vhを合算）
    const alcHeavy=[...alcG.m,...alcG.h,...alcG.vh];
    const an=gaN(alcG.n), ah=gaN(alcHeavy);
    if(an!=null&&ah!=null&&alcG.n.length>=2&&alcHeavy.length>=2){
      const diff=an-ah;
      if(diff>=0.5) out.push({icon:"🍺",text:`飲酒20g超の翌日は、飲まない日の翌日より平均${diff.toFixed(1)}点低い（${alcHeavy.length}日 vs ${alcG.n.length}日）`,neg:true});
    }
    // 睡眠
    const ss=gaN(sleepG.s), sl=gaN(sleepG.l);
    if(ss!=null&&sl!=null&&sleepG.s.length>=2&&sleepG.l.length>=2){
      const diff=sl-ss;
      if(diff>=0.5) out.push({icon:"😴",text:`8h以上眠った日は、5h以下の日より平均${diff.toFixed(1)}点高い（${sleepG.l.length}日 vs ${sleepG.s.length}日）`,neg:false});
    }
    // 時間帯パターン
    const hourScores={};
    scored.forEach(l=>{if(!hourScores[l.hour])hourScores[l.hour]=[];hourScores[l.hour].push(l.score);});
    const hourAvgs=Object.entries(hourScores).filter(([,v])=>v.length>=3).map(([h,v])=>({h:parseInt(h),avg:gaN(v),n:v.length}));
    if(hourAvgs.length>=3){
      const best=hourAvgs.reduce((a,b)=>b.avg>a.avg?b:a);
      const worst=hourAvgs.reduce((a,b)=>b.avg<a.avg?b:a);
      if(best.avg-worst.avg>=1) out.push({icon:"⏰",text:`${best.h}時台が最も好調（平均${best.avg.toFixed(1)}）、${worst.h}時台が最も不調（平均${worst.avg.toFixed(1)}）`,neg:false});
    }
    // 連続飲酒
    const sortedD=[...state.dailies].sort((a,b)=>a.dateStr<b.dateStr?-1:1);
    let maxRun=0,run=0;
    sortedD.forEach(d=>{
      const drinks=(d.drinks||[]).map(dr=>({...dr,drinkType:resolveDT(dr)}));
      const g=drinks.reduce((x,b)=>x+pureAlcohol(b.ml,b.drinkType.pct),0);
      if(g>0){run++;maxRun=Math.max(maxRun,run);}else run=0;
    });
    if(maxRun>=3) out.push({icon:"📅",text:`最長${maxRun}日連続で飲酒。休肝日を挟むと翌朝スコアが上がる傾向があります`,neg:true});
    return out;
  })();

  if(insights.length>0){
    const ic=div({className:"card"},[div({style:{fontSize:"13px",fontWeight:700,color:"#e2e8f0",marginBottom:"10px"}},"📌 データからわかったこと")]);
    insights.forEach(({icon,text,neg})=>{
      ic.appendChild(div({style:{display:"flex",gap:"8px",alignItems:"flex-start",marginBottom:"7px",padding:"7px 10px",borderRadius:"8px",background:neg?"#ef444408":"#22c55e08",border:`1px solid ${neg?"#ef444422":"#22c55e22"}`}},[
        span({style:{fontSize:"14px",flexShrink:0}},icon),
        div({style:{fontSize:"12px",color:"#cbd5e1",lineHeight:1.6}},text)
      ]));
    });
    ic.appendChild(div({style:{fontSize:"10px",color:"#334155",marginTop:"6px"}},"※ 記録データから自動計算（AI不使用・毎回更新）"));
    wrap.appendChild(ic);
  }

  // ⚡ 突発的な行動（予定外の実績）の解析
  {
    let total=0, dayCount=0; const withS=[], withoutS=[];
    const weekCount={}; // 月曜 -> 件数
    const mondayOf=ds=>{const x=parseDS(ds);const day=x.getDay();const diff=day===0?-6:1-day;x.setDate(x.getDate()+diff);return fmtDS(x);};
    state.dailies.forEach(d=>{
      const c=(d.actuals||[]).filter(x=>x.unplanned).length;
      const a=dayAvgScore(d.dateStr);
      total+=c;
      if(c>0){ dayCount++; if(a!=null)withS.push(a); const mk=mondayOf(d.dateStr); weekCount[mk]=(weekCount[mk]||0)+c; }
      else if(a!=null) withoutS.push(a);
    });
    if(total>0){
      const card=div({className:"card"});
      card.appendChild(div({style:{fontSize:"13px",fontWeight:700,color:"#e2e8f0",marginBottom:"4px"}},"⚡ 突発的な行動"));
      card.appendChild(div({style:{fontSize:"10px",color:"#64748b",marginBottom:"10px"}},"予定外として登録した実績の頻度と体調への関係"));
      const st=(lbl,val)=>div({style:{textAlign:"center"}},[div({style:{fontSize:"9px",color:"#64748b",marginBottom:"2px"}},lbl),div({style:{fontSize:"15px",fontWeight:800,color:"#f59e0b"}},val)]);
      const perWeek=(()=>{const ks=Object.keys(weekCount);return ks.length?(total/ks.length):0;})();
      card.appendChild(div({style:{display:"flex",justifyContent:"space-around",marginBottom:"10px",padding:"6px 0",background:"#0f172a",borderRadius:"8px"}},[
        st("合計",`${total}件`), st("あった日",`${dayCount}日`), st("週あたり",`${perWeek.toFixed(1)}件`)
      ]));
      // 直近8週の件数バー
      const thisMon=mondayOf(todayStr());
      const weeks=Array.from({length:8},(_,i)=>addDays(thisMon,-(7-1-i)*7));
      const maxW=Math.max(1,...weeks.map(w=>weekCount[w]||0));
      card.appendChild(div({style:{display:"flex",gap:"4px",alignItems:"flex-end",height:"56px",marginBottom:"4px"}},
        weeks.map(w=>{const c=weekCount[w]||0;const h=c?Math.round((c/maxW)*48):2;const p=w.split('-');
          return div({style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"2px"}},[
            div({style:{fontSize:"8px",color:c?"#f59e0b":"#334155"}},c?String(c):""),
            div({style:{width:"100%",height:`${h}px`,background:c?"#f59e0b":"#1e293b",borderRadius:"3px 3px 0 0"}}),
            div({style:{fontSize:"7px",color:"#475569"}},`${parseInt(p[1])}/${parseInt(p[2])}`)
          ]);
        })));
      card.appendChild(div({style:{fontSize:"9px",color:"#475569",textAlign:"center",marginBottom:"6px"}},"直近8週の件数"));
      // 体調比較
      if(withS.length>=2 && withoutS.length>=2){
        const aS=parseFloat(ga(withS)), aN=parseFloat(ga(withoutS));
        card.appendChild(div({style:{borderTop:"1px solid #1e3a5f",paddingTop:"8px"}},[
          div({style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"5px"}},[
            div({style:{fontSize:"11px",color:"#94a3b8",minWidth:"96px"}},"突発あった日"),
            div({style:{flex:1,height:"6px",background:"#0f172a",borderRadius:"4px",overflow:"hidden"}},[div({style:{height:"100%",width:`${aS/10*100}%`,background:scoreColor(aS)}})]),
            div({style:{fontSize:"12px",fontWeight:700,color:scoreColor(aS),minWidth:"26px",textAlign:"right"}},aS.toFixed(1))
          ]),
          div({style:{display:"flex",alignItems:"center",gap:"8px"}},[
            div({style:{fontSize:"11px",color:"#94a3b8",minWidth:"96px"}},"なかった日"),
            div({style:{flex:1,height:"6px",background:"#0f172a",borderRadius:"4px",overflow:"hidden"}},[div({style:{height:"100%",width:`${aN/10*100}%`,background:scoreColor(aN)}})]),
            div({style:{fontSize:"12px",fontWeight:700,color:scoreColor(aN),minWidth:"26px",textAlign:"right"}},aN.toFixed(1))
          ])
        ]));
      }
      wrap.appendChild(card);
    }
  }

  // AI分析（結果は state に保持し、再描画で消えないようにする）
  wrap.appendChild(renderAIAnalysisCard(scored));
  return wrap;
}

    (r.advice||[]).forEach(a=>content.appendChild(div({style:{fontSize:"12px",color:"#cbd5e1",lineHeight:1.6,marginBottom:"5px",paddingLeft:"10px",borderLeft:"2px solid #0ea5e9"}},a)));

      div({style:{fontSize:"11px",color:"#a5b4fc",marginBottom:"3px",fontWeight:700}},"💡 別の視点"),
      div({style:{fontSize:"12px",color:"#cbd5e1",lineHeight:1.6}},r.newPerspective)
    ]));
    if(state.aiAnalysisRemaining!=null) content.appendChild(div({style:{fontSize:"10px",color:"#334155",marginTop:"8px",textAlign:"right"}},`本日の残り回数: ${state.aiAnalysisRemaining}回`));

async function runAI(scored,dailies){
  if(state.aiAnalysisLoading)return;
  state.aiAnalysisLoading=true;state.aiAnalysisError=null;render();
  try{
    const ds2=dailies.slice(-14).map(d=>{
      const drinks=(d.drinks||[]).map(dr=>({...dr,drinkType:resolveDT(dr)}));
      const g=drinks.reduce((a,b)=>a+pureAlcohol(b.ml,b.drinkType.pct),0);
      const _sh=getNightSleepHours(d.dateStr);const sh=_sh!=null?Math.round(_sh*10)/10:null;
      const shift=d.workStart==null?'休み':(d.workStart<12?'1直':'2直');
      // その日の実際の行動（スケジュール／実績）を反映
      const acts=getActualActivities(d.dateStr).map(a=>a.title.replace(/^[✓]/,'')).slice(0,10).join(',');
      return `${d.dateStr}(${shift}): 睡眠${sh??'?'}h 水分${d.water??'?'}L 純アルコール${g.toFixed(0)}g 食べたもの[${(d.foods||[]).join(',')}] 実際の行動[${acts||'記録なし'}]`;
    }).join('\n');
    const hs=scored.slice(-100).map(l=>`${l.dateStr} ${l.hour}時: 体調${l.score}/10 体調状態[${l.symptoms.join(',')}]${l.note?` メモ:${l.note}`:''}`).join('\n');
    // 今後の予定（直近1週間）も渡して、負荷の偏りなどを見てもらう
    const upcoming=(()=>{
      const lines=[];
      for(let i=0;i<7;i++){
        const dd=addDays(todayStr(),i);
        const pl=getPlannedExtras(dd).map(e=>e.title).slice(0,8);
        if(pl.length) lines.push(`${dd}: ${pl.join(',')}`);
      }
      return lines.join('\n')||'なし';
    })();

    const res=await fetch("https://nuts024.com/health/api.php",{
      method:"POST",
      headers:{"Content-Type":"application/json","X-Secret-Key":"songof3838"},
      body:JSON.stringify({
        system:`あなたは健康データアナリストです。ユーザーはシフト勤務者（1直/2直/休み）です。体調・睡眠・飲酒・飲水・食事に加え、仕事シフトやその日の実際の行動（スケジュール）、今後の予定も踏まえて総合的に分析してください。以下のJSON形式のみで返答してください。前後に説明文やMarkdownの装飾は不要です:
{"summary":"全体傾向の要約2〜3文","topFactors":[{"factor":"要因名","impact":"positive または negative","detail":"具体的な説明","score":1から5の整数}],"worstCondition":"体調が悪くなる条件","bestCondition":"体調が良くなる条件","advice":["具体的で実行可能なアドバイスを、睡眠・栄養・運動・生活リズム・シフト勤務・メンタルなど毎回できるだけ異なる観点から3〜4個"],"newPerspective":"表面的な相関ではなく、データから読み取れる本人が気づきにくい別の観点・仮説を1〜2文で"}`,
        prompt:`【日次記録（シフト・実際の行動つき）】\n${ds2}\n\n【時間別体調】\n${hs}\n\n【今後1週間の予定】\n${upcoming}\n\n分析してください。`
      })
    });
    const data=await res.json();
    if(data.error){
      // エラー種別に応じたメッセージ
      if(data.error==="__DAILY_LIMIT__") throw new Error(data.message||"本日の利用上限に達しました");
      if(data.error==="__GEMINI_RATE__"){
        const detail=data.detail?`\n（詳細: ${data.detail}）`:"";
        throw new Error((data.message||"アクセス集中中。1分お待ちください")+detail);
      }
      throw new Error(data.error);
    }
    const text=data.text||"";
    const r=JSON.parse(text.replace(/```json|```/g,"").trim());
    state.aiAnalysisResult=r;
    state.aiAnalysisRemaining=(data.remaining!=null?data.remaining:null);
  }catch(e){
    state.aiAnalysisError=e.message;
    state.aiAnalysisResult=null;
  }
  state.aiAnalysisLoading=false;render();
}

  try{const w=localStorage.getItem(STORAGE_KEY+"_weather");if(w)weather=JSON.parse(w);}catch{}
  try{const c=localStorage.getItem(STORAGE_KEY+"_city");if(c)city=JSON.parse(c);}catch{}

  const payload={

    exportedAt:new Date().toISOString(),

    dailies:state.dailies,
    todos:state.todos,
    todoOrder,
    goals:state.goals,
    schedule:state.schedule,

// ── バックアップ促進リマインダー ──
// localStorage はブラウザ側のみの保存で、キャッシュ削除等で消えるリスクがある。
// 一定期間バックアップしていない場合、起動時にやさしく促す。
function checkBackupReminder(){
  // データが少ないうちは促さない
  if(state.logs.length + state.dailies.length < 10) return;
  let last=0;
  try{const v=localStorage.getItem(STORAGE_KEY+"_lastbackup");if(v)last=parseInt(v)||0;}catch{}
  const days = last ? (Date.now()-last)/86400000 : 999;
  if(days>=14){
    setTimeout(()=>{
      showToast(last?"💾 前回のバックアップから2週間以上経過。設定からデータ出力をおすすめします":"💾 データのバックアップをおすすめします（設定→データ出力）","#38bdf8");
    },1500);
  }
}
function importData(e){

  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const p=JSON.parse(ev.target.result);
      if(!p.logs||!p.dailies)throw new Error("形式が違います");
      // 確認画面：内容のサマリーを表示して上書き確認
      const summary=[
        `体調記録: ${p.logs.length}件`,
        `日次記録: ${p.dailies.length}日分`,
        p.todos?`TODO: ${Object.keys(p.todos).length}日分`:null,
        p.goals?`目標: ${Object.keys(p.goals).length}件`:null,
        p.schedule?`予定: ${Object.keys(p.schedule).length}日分`:null,
        p.tasks?`リスト: ${(p.tasks.todo||[]).length+(p.tasks.wish||[]).length+(p.tasks.shopping||[]).length}件`:null,
        p.weather?`天気: ${Object.keys(p.weather).length}日分`:null,

      ].filter(Boolean).join("\n");

      if(p.goals){state.goals=p.goals;try{localStorage.setItem(STORAGE_KEY+"_goals",JSON.stringify(p.goals));}catch{}}
      if(p.schedule){state.schedule=p.schedule;try{localStorage.setItem(STORAGE_KEY+"_schedule",JSON.stringify(p.schedule));}catch{}}
      if(p.repeatEvents){state.repeatEvents=p.repeatEvents;try{localStorage.setItem(STORAGE_KEY+"_repeat",JSON.stringify(p.repeatEvents));}catch{}}
      if(p.tasks){state.tasks=p.tasks;try{localStorage.setItem(STORAGE_KEY+"_tasks",JSON.stringify(p.tasks));}catch{}}
      if(Array.isArray(p.routines)&&p.routines.length){state.routines=p.routines;saveRoutines();}
      if(p.shiftPattern&&Array.isArray(p.shiftPattern.grid)){state.shiftPattern={...defaultShiftPattern(),...p.shiftPattern};saveShiftPattern();}
      if(Array.isArray(p.planPatterns)){state.planPatterns=p.planPatterns;savePlanPatterns();}
      if(Array.isArray(p.customTodos)){state.customTodos=p.customTodos;saveCustomTodos();}
      if(Array.isArray(p.goalTree)){state.goalTree=p.goalTree;saveGoalTree();}
      if(p.weather){try{localStorage.setItem(STORAGE_KEY+"_weather",JSON.stringify(p.weather));}catch{}}
      if(p.city){state.weatherCity=p.city;try{localStorage.setItem(STORAGE_KEY+"_city",JSON.stringify(p.city));}catch{}}
      // 旧形式（v8.3）のバックアップは新モデルへ移行して取り込む
      if(!p.schedule && !p.tasks && (p.events||p.taskList||p.wishList||p.shopList)){

// ── バックアップの閲覧（読み取り専用・現在のデータは上書きしない）──
const VIEW_FIELDS=["logs","dailies","todos","goals","goalTree","schedule","repeatEvents","tasks","routines","shiftPattern","planPatterns","customTodos","weatherCity","events","taskList","wishList","shopList"];
function viewBackupFile(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const p=JSON.parse(ev.target.result);
      if(!p.logs||!p.dailies)throw new Error("体調管理アプリのバックアップ形式ではありません");
      // 現在の生データをメモリに退避（localStorageには触れない）
      const snap={}; VIEW_FIELDS.forEach(k=>{ snap[k]=state[k]; });
      state._liveSnapshot=snap;
      // バックアップを state に読み込み（保存はしない）
      state.logs=p.logs||[];
      state.dailies=p.dailies||[];
      state.todos=p.todos||{};
      if(p.goals)state.goals=p.goals;
      state.schedule=p.schedule||{};
      state.repeatEvents=p.repeatEvents||[];
      state.tasks=p.tasks||{todo:[],shopping:[]};
      if(Array.isArray(p.routines)&&p.routines.length)state.routines=p.routines;
      if(p.shiftPattern&&Array.isArray(p.shiftPattern.grid))state.shiftPattern={...defaultShiftPattern(),...p.shiftPattern};
      if(Array.isArray(p.planPatterns))state.planPatterns=p.planPatterns;
      if(Array.isArray(p.customTodos))state.customTodos=p.customTodos;
      state.goalTree=Array.isArray(p.goalTree)?p.goalTree:[];
      if(p.city)state.weatherCity=p.city;
      state._viewWeather=p.weather||{}; // 閲覧用の天気（localStorageには入れない）
      // 旧形式（v8.3）バックアップも移行して閲覧
      if(!p.schedule && !p.tasks && (p.events||p.taskList||p.wishList||p.shopList)){
        state.events=p.events||{};state.taskList=p.taskList||[];state.wishList=p.wishList||[];state.shopList=p.shopList||[];
        state.schedule={};state.repeatEvents=[];state.tasks={todo:[],shopping:[]};
        migrateOldSchedule();
      }
      state.viewingBackup=file.name||"バックアップ";
      state.viewingBackupInfo=p.exportedAt?`エクスポート: ${p.exportedAt.slice(0,10)}`:"";
      state.tab="日記"; state.viewDate=todayStr(); state.modal=null; state.storageAlert=false;
      showToast("バックアップを閲覧中（保存されません）","#818cf8");
      render();
    }catch(err){alert("閲覧できませんでした: "+err.message);}
  };
  reader.readAsText(file);e.target.value="";
}
function exitBackupView(){
  const snap=state._liveSnapshot;
  if(snap){ Object.keys(snap).forEach(k=>{ state[k]=snap[k]; }); }
  state._liveSnapshot=null; state.viewingBackup=null; state.viewingBackupInfo=null; state._viewWeather=null;
  state.modal=null;
  showToast("通常のデータに戻りました","#22c55e");
  render();
}

        const onB=btn({style:{fontSize:"10px",padding:"3px 8px",borderRadius:"6px",cursor:"pointer",fontWeight:700,flexShrink:0,width:"64px",
          border:`1px solid ${st.on!==false?SHIFT_TYPES[k].color:"#334155"}`,background:st.on!==false?SHIFT_TYPES[k].color+"22":"transparent",color:st.on!==false?SHIFT_TYPES[k].color:"#475569"}},`${slbl}${st.on!==false?"":"✕"}`);
        onB.addEventListener('click',()=>{o.shiftTimes={...(o.shiftTimes||{}),[k]:{...st,on:st.on===false}};render();});
        r.appendChild(onB);
        if(st.on!==false){ r.appendChild(timeInp(st.timeH,st.timeM,(H,M)=>{o.shiftTimes={...(o.shiftTimes||{}),[k]:{...st,timeH:H,timeM:M}};})); }
        sub.appendChild(r);
      });
    } else {
      sub.appendChild(timeInp(o.timeH,o.timeM,(H,M)=>{o.timeH=H;o.timeM=M;}));
    }
    cwWrap.appendChild(sub);
  });
  m.appendChild(cwWrap);
  if(m0.uid){
    m.appendChild(btn({style:{width:"100%",padding:"7px",background:"transparent",border:"1px solid #334155",borderRadius:"8px",color:"#475569",cursor:"pointer",fontSize:"12px",marginBottom:"8px"},
      onClick:()=>{ if(confirm("この項目を削除しますか？")){pushUndo("たまにやることを削除しました");state.customTodos=(state.customTodos||[]).filter(x=>x.uid!==m0.uid);saveCustomTodos();state.customTodoModal=null;render();} }},"この項目を削除"));
  }
  m.appendChild(div({style:{display:"flex",gap:"8px"}},[
    btn({className:"btn-ghost",style:{flex:1},onClick:()=>{state.customTodoModal=null;render();}},"キャンセル"),
    btn({style:{flex:2,padding:"10px",background:"linear-gradient(135deg,#0ea5e9,#6366f1)",border:"none",borderRadius:"8px",color:"#fff",fontSize:"13px",fontWeight:600,cursor:"pointer"},
      onClick:()=>{
        if(!(m0.label||"").trim()){alert("名前を入力してください");return;}
        const data={uid:m0.uid||Date.now(),label:m0.label.trim(),itype:m0.itype||"week",n:Math.max(1,m0.n||1),startDate:m0.startDate||todayStr(),timeH:m0.timeH!=null?m0.timeH:null,timeM:m0.timeH!=null?(m0.timeM||0):0,color:m0.color||"#38bdf8",weekdays:(m0.itype==="week"&&m0.weekdays)?[...m0.weekdays]:[],shifts:m0.shifts?[...m0.shifts]:[],weekdayTimes:(m0.weekdayTimes&&Object.keys(m0.weekdayTimes).length)?JSON.parse(JSON.stringify(m0.weekdayTimes)):undefined};
        if(m0.uid) state.customTodos=(state.customTodos||[]).map(x=>x.uid===m0.uid?data:x);
        else state.customTodos=[...(state.customTodos||[]),data];
        saveCustomTodos();state.customTodoModal=null;render();
      }},"保存")
  ]));
  bg.appendChild(m);return bg;
}

function renderEditCheckTimeModal(vd){
  const item=TODO_ITEMS.find(i=>i.id===state.editCheckItemId);
  const bg=div({className:"modal-center"});
  const m=div({className:"modal-box"});
  bg.addEventListener('click',()=>{state.modal=null;render();});
  m.addEventListener('click',e=>e.stopPropagation());
  m.appendChild(div({style:{fontSize:"15px",fontWeight:700,color:"#e2e8f0",marginBottom:"14px"}},`${item?item.label:""} の完了時刻`));
  const cs={h:state.editCheckTime.h,m:state.editCheckTime.m};
  const inp=document.createElement('input');inp.type='time';
  inp.value=`${String(cs.h).padStart(2,'0')}:${String(cs.m).padStart(2,'0')}`;
  inp.style.cssText="width:100%;padding:10px 12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:16px;font-family:inherit;box-sizing:border-box;margin-bottom:14px;color-scheme:dark";
  inp.addEventListener('change',e=>{const parts=(e.target.value||"").split(':');const h=Number(parts[0]),mm=Number(parts[1]);if(!isNaN(h)&&!isNaN(mm)){cs.h=h;cs.m=mm;}});
  m.appendChild(inp);
  m.appendChild(div({style:{display:"flex",gap:"8px"}},[
    btn({className:"btn-ghost",style:{flex:1},onClick:()=>{state.modal=null;render();}},"キャンセル"),
    btn({style:{flex:2,padding:"10px",background:"linear-gradient(135deg,#0ea5e9,#6366f1)",border:"none",borderRadius:"8px",color:"#fff",fontSize:"13px",fontWeight:600,cursor:"pointer"},
      onClick:()=>{
        const p=vd.split('-');const iso=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]),cs.h,cs.m,0).toISOString();
        const cur=(state.todos[vd]||{})[state.editCheckItemId]||{};
        setTodo(vd,state.editCheckItemId,{...cur,checked:true,time:iso});
        state.modal=null;showToast("完了時刻を修整しました");render();
      }},"保存")
  ]));
  bg.appendChild(m);return bg;
}

function renderEditTimerModal(vd){
  const item=TODO_ITEMS.find(i=>i.id===state.editTimerItemId);
  const bg=div({className:"modal-center"});
  const m=div({className:"modal-box"});
  bg.addEventListener('click',()=>{state.modal=null;render();});
  m.addEventListener('click',e=>e.stopPropagation());

  m.appendChild(div({style:{fontSize:"14px",fontWeight:700,color:"#e2e8f0",marginBottom:"16px"}},`⏱ ${item?.label||""} 時刻を入力`));

  const mkTimeSel=(label,val,onChange)=>{
    const wrap2=div({style:{marginBottom:"12px"}},[
      div({style:{fontSize:"11px",color:"#64748b",marginBottom:"5px"}},label)
    ]);
    const row2=div({style:{display:"flex",gap:"8px",alignItems:"center"}});
    const selH=document.createElement('select');selH.className='sel';
    const selM=document.createElement('select');selM.className='sel';
    Array.from({length:24},(_,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`${String(i).padStart(2,'0')}時`;if(i===val.h)o.selected=true;selH.appendChild(o);});
    Array.from({length:60},(_,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`${String(i).padStart(2,'0')}分`;if(i===val.m)o.selected=true;selM.appendChild(o);});
    selH.addEventListener('change',e=>onChange({...val,h:Number(e.target.value)}));
    selM.addEventListener('change',e=>onChange({...val,m:Number(e.target.value)}));
    row2.appendChild(selH);
    row2.appendChild(span({style:{color:"#475569",fontWeight:700}},"："));
    row2.appendChild(selM);
    wrap2.appendChild(row2);
    return wrap2;
  };

  m.appendChild(mkTimeSel("▶ 開始時刻", state.editTimerStart, v=>{state.editTimerStart=v;}));
  m.appendChild(mkTimeSel("⏹ 終了時刻", state.editTimerEnd, v=>{state.editTimerEnd=v;}));

  const clearBtn=btn({style:{width:"100%",padding:"7px",background:"transparent",border:"1px solid #334155",borderRadius:"8px",color:"#475569",cursor:"pointer",fontSize:"12px",marginBottom:"8px"}},
    "クリア（未記録に戻す）");
  clearBtn.addEventListener('click',()=>{
    setTodo(vd,state.editTimerItemId,{});state.modal=null;render();
  });
  m.appendChild(clearBtn);

  m.appendChild(div({style:{display:"flex",gap:"8px"}},[
    btn({className:"btn-ghost",style:{flex:1},onClick:()=>{state.modal=null;render();}},"キャンセル"),
    btn({style:{flex:2,padding:"10px",background:"linear-gradient(135deg,#0ea5e9,#6366f1)",border:"none",borderRadius:"8px",color:"#fff",fontSize:"13px",fontWeight:600,cursor:"pointer"},
      onClick:()=>{
        const toISO=(dateStr,hm)=>{const p=dateStr.split('-');const d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]),hm.h,hm.m,0);return d.toISOString();};
        setTodo(vd,state.editTimerItemId,{
          startTime:toISO(vd,state.editTimerStart),
          endTime:toISO(vd,state.editTimerEnd)
        });
        state.modal=null;render();
      }},"保存")
  ]));
  bg.appendChild(m);return bg;
}

// ═══════════════════════════════════════════════════
// 起動
// ═══════════════════════════════════════════════════
loadStorage();
state.forecast=genForecast();
state.viewDate = todayStr();
render();
document.title="体調管理 v"+APP_VERSION;
checkStorageAndAlert();
checkBackupReminder();
// PWA: Service Worker登録＋自動更新
if('serviceWorker' in navigator){
  // 既に別のSWが制御している状態で新SWが有効化されたら1度だけリロード（最新版を確実に表示）
  const hadController = !!navigator.serviceWorker.controller;
  let swReloaded = false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(swReloaded || !hadController) return;
    swReloaded = true;
    location.reload();
  });
  navigator.serviceWorker.register('sw.js').then(reg=>{
    // 起動時と1時間ごとに更新チェック
    reg.update().catch(()=>{});
    setInterval(()=>reg.update().catch(()=>{}), 60*60*1000);
    // 待機中の新SWがあれば即時切替を促す
    reg.addEventListener('updatefound',()=>{
      const nw=reg.installing;
      if(!nw)return;
      nw.addEventListener('statechange',()=>{
        if(nw.state==='installed' && navigator.serviceWorker.controller){
          try{ nw.postMessage('skipWaiting'); }catch(_){}
        }
      });
    });
  }).catch(()=>{});
  // 画面復帰時にも更新チェック（PWAを開き直したとき等）
  document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState==='visible'){
      navigator.serviceWorker.getRegistration().then(r=>{ if(r)r.update().catch(()=>{}); }).catch(()=>{});
    }
  });
}
// 保存済み都市があれば自動で天気取得
if(state.weatherCity) doFetchWeather(state.weatherCity);
// 1分ごとに日付変わりをチェック
setInterval(()=>{
  const td = todayStr();
  let changed=false;
  if(state.viewDate !== td && state.viewDate < td){
    // 今日タブを見ていた場合のみ自動で今日に進む
    if(state.viewDate === state._lastToday){ state.viewDate = td; changed=true; }
  }
  state._lastToday = td;
  // 日付が変わったときだけ再描画。操作中（モーダル表示中）は再描画しない
  // → 入力中のポップアップやAI分析結果が消えるのを防ぐ
  if(changed && !state.modal) render();
}, 60000);

// 現在時刻ラインだけを再描画なしで自動更新（30秒ごと）
function updateNowLine(){
  const el=document.getElementById('now-line');
  if(!el)return;
  const hourH=parseFloat(el.getAttribute('data-hourh'))||40;
  const startH=parseFloat(el.getAttribute('data-starth'))||0;
  const endH=parseFloat(el.getAttribute('data-endh'))||24;
  const now=new Date();
  const y=((now.getHours()+now.getMinutes()/60)-startH)*hourH;
  if(y<=0||y>=(endH-startH)*hourH){el.style.display='none';return;}
  el.style.display='block';
  el.style.top=y+'px';
}
setInterval(updateNowLine, 30000);
