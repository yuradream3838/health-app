// ─── Open-Meteo 天気取得 ──────────────────────────
async function fetchWeatherAPI(lat, lon){
  const url = `https://api.open-meteo.com/v1/forecast`
    + `?latitude=${lat}&longitude=${lon}`
    + `&hourly=temperature_2m,relative_humidity_2m,surface_pressure,weather_code`
    + `&timezone=Asia%2FTokyo&forecast_days=1`;
  const res = await fetch(url);
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  const h = data.hourly;
  const today = todayStr();
  const humidity = h.relative_humidity_2m || h.relativehumidity_2m || [];
  const wcode    = h.weather_code || h.weathercode || [];
  return h.time.map((t,i) => ({
    hour:        new Date(t).getHours(),
    date:        t.slice(0,10),
    temp:        h.temperature_2m[i]   != null ? Math.round(h.temperature_2m[i]*10)/10   : null,
    humidity:    humidity[i]            != null ? humidity[i]                              : null,
    pressure:    h.surface_pressure[i] != null ? Math.round(h.surface_pressure[i]*10)/10 : null,
    weatherCode: wcode[i]              != null ? wcode[i]                                 : null,
  })).filter(r => r.date === today);
}

// ═══════════════════════════════════════════════════
// アルコール計算
// ═══════════════════════════════════════════════════
const pureAlcohol = (ml,pct) => ml*(pct/100)*0.8;
const resolveDT = d => (d.drinkType?.pct ? d.drinkType : DRINK_TYPES.find(t=>t.id===d.id)||DRINK_TYPES[0]);

function calcBAC(drinks, wKg, sex, nowMin){
  const r = sex==="f"?0.55:0.68;
  return Math.max(0, drinks.reduce((bac,d)=>{
    if(nowMin<d.startMin)return bac;
    const peak = d.alcoholG/(wKg*r);
    const done = d.endMin+15;
    if(nowMin<=done) return bac+peak*Math.min(1,(nowMin-d.startMin)/Math.max(1,done-d.startMin));
    return bac+Math.max(0,peak-0.15*((nowMin-done)/60));
  },0));
}
function bacLevel(b){
  if(b>=1.5)return{label:"危険⚠️",color:"#ef4444",bg:"#3f0000"};
  if(b>=0.8)return{label:"酩酊",  color:"#f97316",bg:"#2d1500"};
  if(b>=0.5)return{label:"ほろ酔い",color:"#eab308",bg:"#2d2200"};
  if(b>=0.2)return{label:"爽快期",color:"#22c55e",bg:"#002d10"};
  return          {label:"ほぼ素面",color:"#38bdf8",bg:"#00162d"};
}

function h(tag,attrs,children){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(v==null)continue;
    if(k==='style'&&typeof v==='object'){Object.assign(el.style,v);}
    else if(k.startsWith('on')&&typeof v==='function'){el.addEventListener(k.slice(2).toLowerCase(),v);}
    else if(k==='className'){el.className=v;}
    else{el.setAttribute(k,String(v));}
  }
  const flat=[].concat(children||[]).flat(Infinity);
  for(const c of flat){
    if(c==null||c===false||c===undefined)continue;
    if(typeof c==='string'||typeof c==='number'){
      el.appendChild(document.createTextNode(String(c)));
    } else if(c instanceof Node){
      el.appendChild(c);
    }
    // それ以外（boolean等）は無視
  }
  return el;
}
function div(attrs,children){return h('div',attrs,children);}

function span(attrs,children){return h('span',attrs,children);}

// ═══════════════════════════════════════════════════
// BACグラフ（Canvas）
// ═══════════════════════════════════════════════════
function renderBACChart(drinks){
  const canvas=document.createElement('canvas');
  const W=Math.min(window.innerWidth-32,560), H=140;
  canvas.width=W; canvas.height=H;
  canvas.style.cssText=`width:100%;height:${H}px;display:block;`;

  if(!drinks.length){
    canvas.style.cssText+=`background:#0a1120;border-radius:8px;`;
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='#475569';ctx.font='13px system-ui';ctx.textAlign='center';
    ctx.fillText('飲み物を追加するとグラフが表示されます',W/2,H/2);
    return canvas;
  }

  const nowMin=new Date().getHours()*60+new Date().getMinutes();
  const dd=drinks.map(d=>({
    uid:d.uid,
    startMin:d.hour*60+(d.min||0),
    endMin:d.endHour!=null?d.endHour*60+(d.endMin||0):d.hour*60+(d.min||0)+20,
    alcoholG:pureAlcohol(d.ml,d.drinkType.pct)
  }));
  const firstMin=Math.min(...dd.map(d=>d.startMin));
  const chartStart=Math.max(0,Math.min(firstMin,nowMin)-60);
  let chartEnd=chartStart+8*60;
  for(let t=firstMin;t<=firstMin+14*60;t+=10){
    if(calcBAC(dd,60,'m',t)<=0.02){chartEnd=t+60;break;}
  }
  chartEnd=Math.max(chartEnd,nowMin+120);
  const totalMin=chartEnd-chartStart;
  const curBac=calcBAC(dd,60,'m',nowMin);
  const maxBac=Math.max(0.3,...Array.from({length:50},(_,i)=>calcBAC(dd,60,'m',chartStart+totalMin*(i/49))));

  const PL=36,PR=8,PT=14,PB=24,cW=W-PL-PR,cH=H-PT-PB;
  const xG=t=>PL+((t-chartStart)/totalMin)*cW;
  const yS=b=>PT+cH-(b/maxBac)*cH;

  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#0a1120';ctx.fillRect(0,0,W,H);

  // グリッド
  [0.2,0.5,0.8,1.0].filter(v=>v<=maxBac+0.05).forEach(v=>{
    ctx.strokeStyle=v>=0.8?'#ef444455':'#1e3a5f88';
    ctx.lineWidth=v>=0.8?1.2:0.6;
    ctx.setLineDash(v>=0.8?[5,3]:[3,6]);
    ctx.beginPath();ctx.moveTo(PL,yS(v));ctx.lineTo(PL+cW,yS(v));ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=v>=0.8?'#ef4444':'#64748b';
    ctx.font='9px system-ui';ctx.textAlign='right';
    ctx.fillText(v.toFixed(1),PL-3,yS(v)+3);
  });

  // エリア
  const STEPS=100;
  ctx.beginPath();
  ctx.moveTo(xG(chartStart),yS(0));
  for(let i=0;i<=STEPS;i++){
    const t=chartStart+totalMin*(i/STEPS);
    ctx.lineTo(xG(t),yS(calcBAC(dd,60,'m',t)));
  }
  ctx.lineTo(xG(chartEnd),yS(0));ctx.closePath();
  const grad=ctx.createLinearGradient(0,PT,0,PT+cH);
  grad.addColorStop(0,'rgba(249,115,22,0.5)');grad.addColorStop(1,'rgba(249,115,22,0.02)');
  ctx.fillStyle=grad;ctx.fill();

  // ライン
  ctx.strokeStyle='#f97316';ctx.lineWidth=2;ctx.setLineDash([]);
  ctx.beginPath();
  for(let i=0;i<=STEPS;i++){
    const t=chartStart+totalMin*(i/STEPS);
    i===0?ctx.moveTo(xG(t),yS(calcBAC(dd,60,'m',t))):ctx.lineTo(xG(t),yS(calcBAC(dd,60,'m',t)));
  }
  ctx.stroke();

  // 飲み始め/終わりマーカー
  dd.forEach((d,i)=>{
    ctx.fillStyle='#eab308';
    ctx.beginPath();ctx.arc(xG(d.startMin),PT+cH-5,4,0,Math.PI*2);ctx.fill();
    if(drinks[i]?.endHour!=null){
      ctx.strokeStyle='#a78bfa';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
      ctx.beginPath();ctx.moveTo(xG(d.endMin),PT);ctx.lineTo(xG(d.endMin),PT+cH);ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='#a78bfa';
      ctx.beginPath();ctx.arc(xG(d.endMin),PT+cH-5,4,0,Math.PI*2);ctx.fill();
    }
  });

  // NOW
  if(nowMin>=chartStart&&nowMin<=chartEnd){
    const nx=xG(nowMin),ny=yS(curBac);
    ctx.strokeStyle='#38bdf8';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(nx,PT);ctx.lineTo(nx,PT+cH);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(56,189,248,0.2)';ctx.beginPath();ctx.arc(nx,ny,9,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#38bdf8';ctx.beginPath();ctx.arc(nx,ny,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#38bdf8';ctx.font='bold 9px system-ui';ctx.textAlign='left';ctx.fillText('NOW',nx+7,PT+12);
  }

  // X軸ラベル
  const step=totalMin<=300?30:60;
  ctx.fillStyle='#64748b';ctx.font='9px system-ui';ctx.textAlign='center';
  for(let t=Math.ceil(chartStart/step)*step;t<=chartEnd;t+=step){
    ctx.fillText(`${Math.floor(t/60)%24}:${String(t%60).padStart(2,'0')}`,xG(t),H-5);
  }

  // 軸
  ctx.strokeStyle='#334155';ctx.lineWidth=1;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(PL,PT);ctx.lineTo(PL,PT+cH);ctx.lineTo(PL+cW,PT+cH);ctx.stroke();

  return canvas;
}

let headerMounted = false;

function render(){
  const root = document.getElementById('root');

  // ヘッダーは初回のみ生成（再描画しない）
  if(!headerMounted){
    root.appendChild(renderHeader());
    headerMounted = true;
  } else {
    // ヘッダー内の動的部分だけ更新
    updateHeaderDynamic();
  }

  // コンテンツエリアだけ入れ替え
  let content = document.getElementById('main-content');
  if(!content){
    content = document.createElement('div');
    content.id = 'main-content';
    root.appendChild(content);
  }
  content.innerHTML = '';

  const ds=todayStr(), vd=state.viewDate, curH=new Date().getHours();
  const isToday=vd===ds;
  if(state.tab==="今日")       content.appendChild(renderToday(vd,ds,curH,isToday));
  if(state.tab==="TODO")       content.appendChild(renderTodo(vd,ds,isToday));
  if(state.tab==="体調記録")   content.appendChild(renderKondo(vd,ds,curH,isToday));
  if(state.tab==="アルコール") content.appendChild(renderAlcohol(vd,isToday));
  if(state.tab==="ログ")       content.appendChild(renderLog());
  if(state.tab==="分析")       content.appendChild(renderAnalysis());
  if(state.modal==="food")     content.appendChild(renderFoodModal());
  if(state.modal==="addDrink") content.appendChild(renderAddDrinkModal(vd));
  if(state.modal==="editEnd")  content.appendChild(renderEditEndModal(vd));
  if(state.modal==="editTimer")content.appendChild(renderEditTimerModal(vd));
  if(state.editHour!==null)    content.appendChild(renderScoreModal());
}

function updateHeaderDynamic(){
  const ds=todayStr(), vd=state.viewDate;
  const isToday=vd===ds;
  const showNav=!["ログ","分析"].includes(state.tab);

  // 保存ステータス
  const savedEl=document.getElementById('hdr-saved');
  if(savedEl) savedEl.style.display=state.saved?'':'none';

  // 日付ナビ
  const nav=document.getElementById('hdr-nav');
  if(nav){
    nav.style.display=showNav?'flex':'none';
    const dateLabel=document.getElementById('hdr-date-label');
    if(dateLabel){
      const p=vd.split('-');
      dateLabel.textContent=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])).toLocaleDateString("ja-JP",{month:"short",day:"numeric",weekday:"short"})+(isToday?" 今日":"");
      dateLabel.style.color=isToday?"#38bdf8":"#e2e8f0";
    }
    const backBtn=document.getElementById('hdr-back-btn');
    if(backBtn){backBtn.style.display=isToday?'none':'block';}
    const nextBtn=document.getElementById('hdr-next-btn');
    if(nextBtn){nextBtn.style.color=vd<ds?"#94a3b8":"#1e3a5f";}
  }

  // タブ
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.tab===state.tab);
  });
}

function prevDate(){
  const parts=state.viewDate.split('-');
  const n=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  n.setDate(n.getDate()-1);
  state.viewDate=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
  render();
}
function nextDate(){
  if(state.viewDate>=todayStr())return;
  const parts=state.viewDate.split('-');
  const n=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  n.setDate(n.getDate()+1);
  state.viewDate=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
  render();
}

function renderSummaryCard(vd,isToday){
  const dl=state.logs.filter(l=>l.dateStr===vd&&l.score!=null);
  const avg=dl.length?(dl.reduce((a,b)=>a+b.score,0)/dl.length).toFixed(1):null;
  const best=dl.length?Math.max(...dl.map(l=>l.score)):null;
  const worst=dl.length?Math.min(...dl.map(l=>l.score)):null;
  const label=isToday?"今日":(()=>{const p=vd.split('-');return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])).toLocaleDateString("ja-JP",{month:"short",day:"numeric"});})();
  return div({className:"card"},[
    div({style:{fontSize:"13px",fontWeight:700,color:"#e2e8f0",marginBottom:"10px"}},`📊 ${label}の体調サマリー`),
    dl.length===0
      ?div({style:{fontSize:"12px",color:"#475569",textAlign:"center",padding:"8px 0"}},"「体調記録」タブからスコアを記録してください")
      :div({},[
        div({style:{display:"flex",gap:"8px",marginBottom:"10px"}},[
          {l:"平均",v:avg},{l:"最高",v:best},{l:"最低",v:worst}

// 日付を1日前に戻す
function prevDay(dateStr){
  const a=dateStr.split('-');
  const n=new Date(parseInt(a[0]),parseInt(a[1])-1,parseInt(a[2]));
  n.setDate(n.getDate()-1);
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}

// 指定アイテムが指定日に完了しているか
function isTodoDone(dateStr, item){
  const t=(state.todos[dateStr]||{})[item.id]||{};
  if(item.type==="check") return !!t.checked;
  if(item.type==="timer") return !!(t.startTime && t.endTime);
  return false;
}

// 指定アイテムの連続達成日数（vdの日まで何日連続か）
function calcStreak(vd, item){
  let count = 0;
  let chk = vd;
  for(let i=0;i<365;i++){
    if(isTodoDone(chk, item)) count++;
    else break;
    chk = prevDay(chk);
  }
  return count;
}

function renderTodo(vd, ds, isToday){
  const wrap=div({style:{maxWidth:"600px",margin:"0 auto",padding:"10px 16px 60px"}});
  const todo=getTodo(vd);

  // 全体の完了数
  const done = TODO_ITEMS.filter(item => isTodoDone(vd, item)).length;
  const total = TODO_ITEMS.length;

  // 全体連続達成（全項目完了した日が何日続いているか）
  const totalStreak = (() => {
    let count = 0;
    const allDone = d => TODO_ITEMS.every(item => isTodoDone(d, item));
    let chk = vd;
    for(let i=0;i<365;i++){
      if(allDone(chk)) count++;
      else break;
      chk = prevDay(chk);
    }
    return count;
  })();

  // ヘッダーカード
  const p2=vd.split('-');
  wrap.appendChild(div({className:"card"},[
    div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}},[
      div({},[
        div({style:{fontSize:"13px",fontWeight:700,color:"#e2e8f0"}},"📋 デイリーTODO"),
        div({style:{fontSize:"11px",color:"#64748b",marginTop:"2px"}},
          isToday?"今日のタスク":new Date(parseInt(p2[0]),parseInt(p2[1])-1,parseInt(p2[2])).toLocaleDateString("ja-JP",{month:"short",day:"numeric"}))
      ]),
      div({style:{textAlign:"right"}},[
        div({style:{fontSize:"22px",fontWeight:800,color:done===total?"#22c55e":"#38bdf8"}},[
          txt(`${done}`),span({style:{fontSize:"13px",color:"#475569"}},`/${total}`)
        ]),
        totalStreak>0?div({style:{fontSize:"11px",color:"#f97316",marginTop:"2px"}},`🔥 全完了 ${totalStreak}日連続`):null
      ])
    ]),
    div({style:{height:"6px",background:"#0f172a",borderRadius:"4px",overflow:"hidden"}},[
      div({style:{height:"100%",width:`${(done/total)*100}%`,background:done===total?"#22c55e":"#38bdf8",borderRadius:"4px"}})
    ])
  ]));

  // TODOリスト
  TODO_ITEMS.forEach(item => {
    const t = todo[item.id] || {};
    const isDone = isTodoDone(vd, item);
    const isRunning = item.type==="timer" && t.startTime && !t.endTime;
    const streak = calcStreak(vd, item);

    // 経過時間
    const elapsed = (() => {
      if(!t.startTime) return null;
      const end = t.endTime ? new Date(t.endTime) : new Date();
      const ms = end - new Date(t.startTime);
      const m = Math.floor(ms/60000);
      const h2 = Math.floor(m/60);
      return h2>0 ? `${h2}h${m%60}m` : `${m}m`;
    })();

    const row=div({style:{
      border:`1px solid ${isDone?"#22c55e33":isRunning?"#f97316":"#1e3a5f"}`,
      borderRadius:"10px",marginBottom:"5px",padding:"10px 12px",
      display:"flex",alignItems:"center",gap:"10px",
      background:"#1e293b",
      opacity: isDone?"0.75":"1"
    }});

    // チェック/タイマーアイコン
    if(item.type==="check"){
      const cb=btn({style:{
        width:"24px",height:"24px",borderRadius:"6px",
        border:`2px solid ${isDone?"#22c55e":"#334155"}`,
        background:isDone?"#22c55e":"transparent",
        cursor:"pointer",flexShrink:0,
        display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px"
      }}, isDone?"✓":"");
      cb.addEventListener('click',()=>{
        setTodo(vd,item.id,{checked:!t.checked,time:new Date().toISOString()});
      });
      row.appendChild(cb);
    } else {
      const icon=btn({style:{
        width:"24px",height:"24px",borderRadius:"6px",flexShrink:0,
        background:isRunning?"#f97316":isDone?"#22c55e":"#1e3a5f",
        display:"flex",alignItems:"center",justifyContent:"center",
        fontSize:"12px",border:"none",cursor:"pointer"
      }}, isRunning?"⏱":isDone?"✓":"⏱");
      icon.addEventListener('click',(()=>{const itemId=item.id;const td=t;return()=>{
        state.editTimerItemId=itemId;
        const parseT=s=>{if(!s)return null;const d2=new Date(s);return{h:d2.getHours(),m:d2.getMinutes()};};
        const st=parseT(td.startTime);const et=parseT(td.endTime);
        state.editTimerStart=st||{h:new Date().getHours(),m:0};
        state.editTimerEnd=et||{h:new Date().getHours(),m:0};
        state.modal="editTimer";render();
      };})()); 
      row.appendChild(icon);
    }

    // ラベル＋連続日数
    row.appendChild(div({style:{flex:1}},[
      div({style:{display:"flex",alignItems:"center",gap:"6px"}},[
        div({style:{fontSize:"13px",fontWeight:600,color:isDone?"#64748b":"#e2e8f0",textDecoration:isDone?"line-through":"none"}},item.label),
        streak>=2?span({style:{fontSize:"10px",color:"#f97316",fontWeight:700}},`🔥${streak}日`):null
      ]),
      elapsed?div({style:{fontSize:"11px",color:isRunning?"#f97316":"#64748b",marginTop:"2px"}},
        isRunning?`⏱ 計測中 ${elapsed}...`:`✓ ${elapsed}`):null
    ]));

    // ボタン（タイマー）
    if(item.type==="timer"){
      if(!t.startTime){
        const startBtn=btn({style:{padding:"5px 12px",background:"#0ea5e933",border:"1px solid #0ea5e9",borderRadius:"8px",color:"#38bdf8",fontSize:"11px",cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"}},"▶ 開始");
        startBtn.addEventListener('click',()=>setTodo(vd,item.id,{startTime:new Date().toISOString()}));
        row.appendChild(startBtn);
      } else if(!t.endTime){
        const endBtn=btn({style:{padding:"5px 12px",background:"#f9731633",border:"1px solid #f97316",borderRadius:"8px",color:"#f97316",fontSize:"11px",cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"}},"⏹ 終了");
        endBtn.addEventListener('click',()=>setTodo(vd,item.id,{...t,endTime:new Date().toISOString()}));
        row.appendChild(endBtn);
      } else {
        const resetBtn=btn({style:{padding:"5px 10px",background:"transparent",border:"1px solid #334155",borderRadius:"8px",color:"#475569",fontSize:"11px",cursor:"pointer",whiteSpace:"nowrap"}},"↩");
        resetBtn.addEventListener('click',()=>setTodo(vd,item.id,{}));
        row.appendChild(resetBtn);
      }
    }

    // チェック完了時刻表示
    if(item.type==="check" && isDone && t.time){
      const d2=new Date(t.time);
      row.appendChild(span({style:{fontSize:"10px",color:"#334155",whiteSpace:"nowrap"}},
        `${d2.getHours()}:${String(d2.getMinutes()).padStart(2,'0')}`));
    }

    wrap.appendChild(row);
  });

  return wrap;
}

function getSoberTime(drinks){
  if(!drinks.length)return"—";
  const nowMin=new Date().getHours()*60+new Date().getMinutes();
  const dd=drinks.map(d=>({startMin:d.hour*60+(d.min||0),endMin:d.endHour!=null?d.endHour*60+(d.endMin||0):d.hour*60+(d.min||0)+20,alcoholG:pureAlcohol(d.ml,d.drinkType.pct)}));
  for(let t=nowMin+5;t<=nowMin+14*60;t+=5){
    if(calcBAC(dd,60,'m',t)<=0.02)return`${Math.floor(t/60)%24}:${String(t%60).padStart(2,"0")}`;
  }
  return"12h以上";
}
function removeDrink(vd,uid){const d=getDaily(vd);setDaily(vd,{drinks:(d.drinks||[]).filter(x=>x.uid!==uid)});}
function recordEnd(vd,uid){const n=new Date();const d=getDaily(vd);setDaily(vd,{drinks:(d.drinks||[]).map(x=>x.uid===uid?{...x,endHour:n.getHours(),endMin:n.getMinutes()}:x)});render();}
function clearEnd(vd,uid){const d=getDaily(vd);setDaily(vd,{drinks:(d.drinks||[]).map(x=>{if(x.uid!==uid)return x;const c={...x};delete c.endHour;delete c.endMin;return c;})});render();}

function renderAnalysis(){
  const wrap=div({style:{maxWidth:"600px",margin:"0 auto",padding:"12px 16px 60px"}});
  const scored=state.logs.filter(l=>l.score!=null);
  const bad=scored.filter(l=>l.score<=4);
  const avg=scored.length?(scored.reduce((a,b)=>a+b.score,0)/scored.length).toFixed(1):null;
  const ga=arr=>arr.length?(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1):null;
  const sleepG={s:[],m:[],l:[]},alcG={n:[],l:[],hv:[]},waterG={lo:[],ok:[],hi:[]};
  state.dailies.forEach(d=>{
    const ds2=scored.filter(l=>l.dateStr===d.dateStr).map(l=>l.score);
    if(!ds2.length)return;
    const a=ds2.reduce((x,y)=>x+y,0)/ds2.length;
    const drinks=(d.drinks||[]).map(dr=>({...dr,drinkType:resolveDT(dr)}));
    const tg=drinks.reduce((x,b)=>x+pureAlcohol(b.ml,b.drinkType.pct),0);
    const sh=d.sleepStart!=null&&d.sleepEnd!=null?Math.round(((d.sleepEnd-d.sleepStart+24)%24)*10)/10:null;
    if(sh!=null){if(sh<=5)sleepG.s.push(a);else if(sh<=7)sleepG.m.push(a);else sleepG.l.push(a);}
    if(!tg)alcG.n.push(a);else if(tg<=20)alcG.l.push(a);else alcG.hv.push(a);
    const w=d.water||0;if(w<1.5)waterG.lo.push(a);else if(w<2)waterG.ok.push(a);else waterG.hi.push(a);
  });
  const pd=scored.filter(l=>(l.pressureDiff||0)<=-5);
  const ps=scored.filter(l=>Math.abs(l.pressureDiff||0)<3);
  const sc2={};bad.forEach(l=>l.symptoms.forEach(s=>{sc2[s]=(sc2[s]||0)+1;}));
  const topS=Object.entries(sc2).sort((a,b)=>b[1]-a[1]).slice(0,4);

  // サマリー
  wrap.appendChild(div({style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",marginBottom:"10px"}},[
    {l:"記録日数",v:`${state.dailies.length}日`},{l:"平均体調",v:avg?`${avg}/10`:"—"},{l:"不調記録",v:`${bad.length}件`}
  ].map(({l,v})=>div({className:"card",style:{textAlign:"center",marginBottom:"0"}},[div({style:{fontSize:"10px",color:"#64748b",marginBottom:"3px"}},l),div({style:{fontSize:"17px",fontWeight:800,color:"#e2e8f0"}},v)]))));

  if(scored.length<3){
    wrap.appendChild(div({className:"card",style:{textAlign:"center",color:"#64748b",padding:"32px 16px"}},[div({style:{fontSize:"32px",marginBottom:"8px"}},"📋"),"体調を3件以上記録すると分析できます"]));
    return wrap;
  }

  function barCard(title,rows){
    const card=div({className:"card"},[div({style:{fontSize:"13px",fontWeight:700,color:"#e2e8f0",marginBottom:"10px"}},title)]);
    rows.forEach(({l,v,c,sub})=>{
      if(!v)return;
      card.appendChild(div({style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"5px"}},[
        div({style:{fontSize:"11px",color:"#94a3b8",minWidth:"72px"}},l),
        div({style:{flex:1,height:"6px",background:"#0f172a",borderRadius:"4px",overflow:"hidden"}},[div({style:{height:"100%",width:`${(parseFloat(v)/10)*100}%`,background:c,borderRadius:"4px"}})]),
        div({style:{fontSize:"12px",fontWeight:700,color:c,minWidth:"26px",textAlign:"right"}},v),
        sub?div({style:{fontSize:"10px",color:"#475569"}},sub):null
      ]));
    });
    return card;
  }

  wrap.appendChild(barCard("😴 睡眠と体調",[{l:"5h以下",v:ga(sleepG.s),c:"#ef4444",sub:`${sleepG.s.length}日`},{l:"6〜7h",v:ga(sleepG.m),c:"#eab308",sub:`${sleepG.m.length}日`},{l:"8h以上",v:ga(sleepG.l),c:"#22c55e",sub:`${sleepG.l.length}日`}]));
  wrap.appendChild(barCard("🍺 飲酒と体調",[{l:"飲まない",v:ga(alcG.n),c:"#22c55e",sub:`${alcG.n.length}日`},{l:"〜20g",v:ga(alcG.l),c:"#eab308",sub:`${alcG.l.length}日`},{l:"20g超",v:ga(alcG.hv),c:"#ef4444",sub:`${alcG.hv.length}日`}]));
  wrap.appendChild(barCard("💧 飲水と体調",[{l:"1.5L未満",v:ga(waterG.lo),c:"#ef4444",sub:`${waterG.lo.length}日`},{l:"1.5〜2L",v:ga(waterG.ok),c:"#eab308",sub:`${waterG.ok.length}日`},{l:"2L以上",v:ga(waterG.hi),c:"#22c55e",sub:`${waterG.hi.length}日`}]));
  if(pd.length>0||ps.length>0) wrap.appendChild(barCard("🌡️ 気圧と体調",[
    {l:"急降下",v:pd.length?(pd.reduce((a,b)=>a+b.score,0)/pd.length).toFixed(1):null,c:"#ef4444",sub:`${pd.length}件`},
    {l:"安定",v:ps.length?(ps.reduce((a,b)=>a+b.score,0)/ps.length).toFixed(1):null,c:"#22c55e",sub:`${ps.length}件`}
  ]));
  if(topS.length>0){
    const sc=div({className:"card"},[div({style:{fontSize:"13px",fontWeight:700,color:"#e2e8f0",marginBottom:"10px"}},"🤒 不調時の症状")]);
    topS.forEach(([s,n])=>sc.appendChild(div({style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"5px"}},[
      div({style:{fontSize:"12px",color:"#cbd5e1",minWidth:"80px"}},s),
      div({style:{flex:1,height:"6px",background:"#0f172a",borderRadius:"4px",overflow:"hidden"}},[div({style:{height:"100%",width:`${(n/Math.max(bad.length,1))*100}%`,background:"#f97316",borderRadius:"4px"}})]),
      div({style:{fontSize:"11px",color:"#94a3b8",minWidth:"24px",textAlign:"right"}},`${n}回`)
    ])));
    wrap.appendChild(sc);
  }

  // 🍽️ 食材と体調の相関（翌日+翌々日の平均スコアで評価）
  const foodCorrel = (() => {
    // 日付→平均体調スコアのマップ
    const dateScore = {};
    scored.forEach(l => {
      if(!dateScore[l.dateStr]) dateScore[l.dateStr] = [];
      dateScore[l.dateStr].push(l.score);
    });
    const avgScore = ds => {
      const arr = dateScore[ds];
      return arr ? arr.reduce((a,b)=>a+b,0)/arr.length : null;
    };

    // 日付を1日進める
    const nextDay = ds => {
      const p=ds.split('-');
      const n=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
      n.setDate(n.getDate()+1);
      return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
    };

    // 全食材を集計
    const foodStats = {};
    state.dailies.forEach(d => {
      const foods = d.foods || [];
      if(!foods.length) return;
      const d1 = nextDay(d.dateStr);
      const d2 = nextDay(d1);
      const s1 = avgScore(d1);
      const s2 = avgScore(d2);
      const lagScores = [s1, s2].filter(s => s != null);
      if(!lagScores.length) return;
      const lagAvg = lagScores.reduce((a,b)=>a+b,0)/lagScores.length;
      foods.forEach(f => {
        if(!foodStats[f]) foodStats[f] = {eaten:[], notEaten:[]};
        foodStats[f].eaten.push(lagAvg);
      });
    });

    // 食べなかった日の翌日+翌々日スコアも計算
    const allFoods = Object.keys(foodStats);
    state.dailies.forEach(d => {
      const foods = d.foods || [];
      const d1 = nextDay(d.dateStr);
      const d2 = nextDay(d1);
      const s1 = avgScore(d1);
      const s2 = avgScore(d2);
      const lagScores = [s1, s2].filter(s => s != null);
      if(!lagScores.length) return;
      const lagAvg = lagScores.reduce((a,b)=>a+b,0)/lagScores.length;
      allFoods.forEach(f => {
        if(!foods.includes(f)) {
          foodStats[f].notEaten.push(lagAvg);
        }
      });
    });

    // 差分を計算（食べた翌日平均 - 食べなかった翌日平均）
    return Object.entries(foodStats)
      .filter(([,v]) => v.eaten.length >= 2 && v.notEaten.length >= 2)
      .map(([food, v]) => {
        const eAvg = v.eaten.reduce((a,b)=>a+b,0)/v.eaten.length;
        const nAvg = v.notEaten.reduce((a,b)=>a+b,0)/v.notEaten.length;
        return { food, eAvg, nAvg, diff: eAvg-nAvg, count: v.eaten.length };
      })
      .sort((a,b) => Math.abs(b.diff)-Math.abs(a.diff))
      .slice(0, 15);
  })();

  if(foodCorrel.length > 0){
    const fc = div({className:"card"},[]);
    fc.appendChild(div({style:{fontSize:"13px",fontWeight:700,color:"#e2e8f0",marginBottom:"4px"}},"🍽️ 食材と体調の相関"));
    fc.appendChild(div({style:{fontSize:"10px",color:"#475569",marginBottom:"12px"}},"食べた翌日・翌々日の平均体調スコアとの比較"));

    const positive = foodCorrel.filter(f => f.diff > 0.2);
    const negative = foodCorrel.filter(f => f.diff < -0.2);
    const neutral  = foodCorrel.filter(f => Math.abs(f.diff) <= 0.2);

    if(positive.length > 0){
      fc.appendChild(div({style:{fontSize:"11px",fontWeight:600,color:"#4ade80",marginBottom:"6px"}},"✅ 食べると体調が良くなる傾向"));
      positive.forEach(({food,diff,count}) => {
        const pct = Math.min(100, Math.abs(diff)/3*100);
        fc.appendChild(div({style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"5px"}},[
          div({style:{fontSize:"11px",color:"#e2e8f0",minWidth:"110px"}},`${fe(food)} ${food}`),
          div({style:{flex:1,height:"6px",background:"#0f172a",borderRadius:"4px",overflow:"hidden"}},[
            div({style:{height:"100%",width:`${pct}%`,background:"#22c55e",borderRadius:"4px"}})
          ]),
          div({style:{fontSize:"11px",fontWeight:700,color:"#22c55e",minWidth:"36px",textAlign:"right"}},`+${diff.toFixed(1)}`),
          div({style:{fontSize:"10px",color:"#475569"}},`${count}回`)
        ]));
      });
    }

    if(negative.length > 0){
      fc.appendChild(div({style:{fontSize:"11px",fontWeight:600,color:"#f87171",marginBottom:"6px",marginTop:"10px"}},"⚠️ 食べると体調が下がる傾向"));
      negative.forEach(({food,diff,count}) => {
        const pct = Math.min(100, Math.abs(diff)/3*100);
        fc.appendChild(div({style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"5px"}},[
          div({style:{fontSize:"11px",color:"#e2e8f0",minWidth:"110px"}},`${fe(food)} ${food}`),
          div({style:{flex:1,height:"6px",background:"#0f172a",borderRadius:"4px",overflow:"hidden"}},[
            div({style:{height:"100%",width:`${pct}%`,background:"#ef4444",borderRadius:"4px"}})
          ]),
          div({style:{fontSize:"11px",fontWeight:700,color:"#f87171",minWidth:"36px",textAlign:"right"}},diff.toFixed(1)),
          div({style:{fontSize:"10px",color:"#475569"}},`${count}回`)
        ]));
      });
    }

    if(positive.length===0 && negative.length===0){
      fc.appendChild(div({style:{fontSize:"12px",color:"#475569",textAlign:"center",padding:"8px 0"}},"データが不足しています（各食材2回以上の記録が必要）"));
    }

    fc.appendChild(div({style:{fontSize:"10px",color:"#334155",marginTop:"10px",lineHeight:1.6}},"※ 食べた翌日・翌々日の平均スコアの差。記録が増えるほど精度が上がります。"));
    wrap.appendChild(fc);
  }

  // AI分析ボタン
  const aiCard=div({className:"card"},[div({style:{fontSize:"13px",fontWeight:700,color:"#e2e8f0",marginBottom:"10px"}},"✨ AI総合分析")]);
  const aiContent=div({style:{textAlign:"center"}},[
    h('p',{style:{fontSize:"12px",color:"#64748b",marginBottom:"12px"}},"蓄積データをAIが総合的に分析します"),
    btn({style:{padding:"10px 28px",background:"linear-gradient(135deg,#0ea5e9,#6366f1)",border:"none",borderRadius:"8px",color:"#fff",fontSize:"14px",fontWeight:600,cursor:"pointer"},onClick:()=>runAI(aiCard,aiContent,scored,state.dailies)},"AIで分析する")
  ]);
  aiCard.appendChild(aiContent);
  wrap.appendChild(aiCard);
  return wrap;
}

// エクスポート・インポート

function exportData(){
  const blob=new Blob([JSON.stringify({logs:state.logs,dailies:state.dailies},null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");
  a.href=url;a.download=`health_backup_${todayStr()}.json`;a.click();URL.revokeObjectURL(url);
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const p=JSON.parse(ev.target.result);
      if(!p.logs||!p.dailies)throw new Error("形式が違います");
      state.logs=p.logs;state.dailies=p.dailies;saveStorage();render();
      alert(`インポート完了！記録: ${p.logs.length}件`);
    }catch(err){alert("インポート失敗: "+err.message);}
  };
  reader.readAsText(file);e.target.value="";
}

function renderEditTimerModal(vd){
  const item=TODO_ITEMS.find(i=>i.id===state.editTimerItemId);
  const bg=div({className:"modal-center"});
  const m=div({className:"modal-box"});
  bg.addEventListener('click',()=>{state.modal=null;render();});
  m.addEventListener('click',e=>e.stopPropagation());

  m.appendChild(div({style:{fontSize:"14px",fontWeight:700,color:"#e2e8f0",marginBottom:"16px"}},`⏱ ${item?.label||""} 時刻を入力`));

  const mkTimeSel=(label,val,onChange)=>{
    const wrap2=div({style:{marginBottom:"12px"}},[
      div({style:{fontSize:"11px",color:"#64748b",marginBottom:"5px"}},label)
    ]);
    const row2=div({style:{display:"flex",gap:"8px",alignItems:"center"}});
    const selH=document.createElement('select');selH.className='sel';
    const selM=document.createElement('select');selM.className='sel';
    Array.from({length:24},(_,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`${String(i).padStart(2,'0')}時`;if(i===val.h)o.selected=true;selH.appendChild(o);});
    Array.from({length:60},(_,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`${String(i).padStart(2,'0')}分`;if(i===val.m)o.selected=true;selM.appendChild(o);});
    selH.addEventListener('change',e=>onChange({...val,h:Number(e.target.value)}));
    selM.addEventListener('change',e=>onChange({...val,m:Number(e.target.value)}));
    row2.appendChild(selH);
    row2.appendChild(span({style:{color:"#475569",fontWeight:700}},"："));
    row2.appendChild(selM);
    wrap2.appendChild(row2);
    return wrap2;
  };

  m.appendChild(mkTimeSel("▶ 開始時刻", state.editTimerStart, v=>{state.editTimerStart=v;}));
  m.appendChild(mkTimeSel("⏹ 終了時刻", state.editTimerEnd, v=>{state.editTimerEnd=v;}));

  const clearBtn=btn({style:{width:"100%",padding:"7px",background:"transparent",border:"1px solid #334155",borderRadius:"8px",color:"#475569",cursor:"pointer",fontSize:"12px",marginBottom:"8px"}},
    "クリア（未記録に戻す）");
  clearBtn.addEventListener('click',()=>{
    setTodo(vd,state.editTimerItemId,{});state.modal=null;render();
  });
  m.appendChild(clearBtn);

  m.appendChild(div({style:{display:"flex",gap:"8px"}},[
    btn({className:"btn-ghost",style:{flex:1},onClick:()=>{state.modal=null;render();}},"キャンセル"),
    btn({style:{flex:2,padding:"10px",background:"linear-gradient(135deg,#0ea5e9,#6366f1)",border:"none",borderRadius:"8px",color:"#fff",fontSize:"13px",fontWeight:600,cursor:"pointer"},
      onClick:()=>{
        const toISO=(dateStr,hm)=>{const p=dateStr.split('-');const d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]),hm.h,hm.m,0);return d.toISOString();};
        setTodo(vd,state.editTimerItemId,{
          startTime:toISO(vd,state.editTimerStart),
          endTime:toISO(vd,state.editTimerEnd)
        });
        state.modal=null;render();
      }},"保存")
  ]));
  bg.appendChild(m);return bg;
}
