let toastTimer=null;
function showToast(msg, color="#22c55e"){
  const el=document.getElementById('toast');
  if(!el)return;
  el.textContent=msg;
  el.style.borderColor=color;
  el.style.color=color;
  el.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}

function showConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  if(!canvas)return;
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const ctx=canvas.getContext('2d');
  const pieces=Array.from({length:120},()=>({
    x:Math.random()*canvas.width,
    y:-10-Math.random()*100,
    w:8+Math.random()*8,
    h:4+Math.random()*4,
    r:Math.random()*Math.PI*2,
    vx:(Math.random()-0.5)*4,
    vy:3+Math.random()*4,
    vr:(Math.random()-0.5)*0.2,
    color:`hsl(${Math.floor(Math.random()*360)},90%,60%)`
  }));
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);
      ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;p.vy+=0.05;
    });
    frame++;
    if(frame<120)requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

// LocalStorage容量チェック・アーカイブ
// ═══════════════════════════════════════════════════
function getStorageUsage(){
  let total=0;
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    const v=localStorage.getItem(k)||"";
    total+=k.length+v.length;
  }
  // 推定上限5MB（5,242,880文字）
  const limit=5*1024*1024/2; // UTF-16で2バイト/文字
  return {used:total,limit,pct:Math.round((total/limit)*100)};
}

function checkStorageAndAlert(){
  const {pct}=getStorageUsage();
  if(pct>=90){state.storageAlert=true;render();}
}

// アーカイブ対象の年リストを取得
function getArchiveYears(){
  const thisYear=new Date().getFullYear();
  const years=new Set();
  state.logs.forEach(l=>{const y=parseInt(l.dateStr.slice(0,4));if(y<thisYear)years.add(y);});
  state.dailies.forEach(d=>{const y=parseInt(d.dateStr.slice(0,4));if(y<thisYear)years.add(y);});
  return [...years].sort().reverse();
}

function exportAndDeleteYear(year){
  const yStr=String(year);
  // 対象データを抽出
  const logs=state.logs.filter(l=>l.dateStr.startsWith(yStr));
  const dailies=state.dailies.filter(d=>d.dateStr.startsWith(yStr));
  const todos={};
  Object.keys(state.todos).forEach(k=>{if(k.startsWith(yStr))todos[k]=state.todos[k];});
  let weather={};
  try{const s=localStorage.getItem(STORAGE_KEY+"_weather");if(s){const w=JSON.parse(s);Object.keys(w).forEach(k=>{if(k.startsWith(yStr))weather[k]=w[k];});}}catch{}

  // エクスポート
  const archive={year,logs,dailies,todos,weather,exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(archive,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");
  a.href=url;a.download=`health_archive_${year}.json`;a.click();URL.revokeObjectURL(url);

  // 削除
  state.logs=state.logs.filter(l=>!l.dateStr.startsWith(yStr));
  state.dailies=state.dailies.filter(d=>!d.dateStr.startsWith(yStr));
  Object.keys(state.todos).forEach(k=>{if(k.startsWith(yStr))delete state.todos[k];});
  try{
    const s=localStorage.getItem(STORAGE_KEY+"_weather");
    if(s){const w=JSON.parse(s);Object.keys(w).forEach(k=>{if(k.startsWith(yStr))delete w[k];});localStorage.setItem(STORAGE_KEY+"_weather",JSON.stringify(w));}
  }catch{}
  saveStorage();
  state.storageAlert=false;render();
}

function renderStorageAlertModal(){
  const {used,limit,pct}=getStorageUsage();
  const usedMB=(used*2/1024/1024).toFixed(1);
  const limitMB=(limit*2/1024/1024).toFixed(0);
  const years=getArchiveYears();
  if(!state.storageExportYear&&years.length>0)state.storageExportYear=years[0];

  const bg=div({className:"modal-center"});
  const m=div({className:"modal-box"});
  bg.addEventListener('click',e=>e.stopPropagation());
  m.addEventListener('click',e=>e.stopPropagation());

  // 警告ヘッダー
  m.appendChild(div({style:{fontSize:"28px",textAlign:"center",marginBottom:"8px"}},"⚠️"));
  m.appendChild(div({style:{fontSize:"16px",fontWeight:700,color:"#f97316",textAlign:"center",marginBottom:"8px"}},"ストレージ残量が少なくなっています"));

  // 使用量バー
  m.appendChild(div({style:{marginBottom:"16px"}},[
    div({style:{display:"flex",justifyContent:"space-between",fontSize:"11px",color:"#64748b",marginBottom:"4px"}},[
      span({},`使用中: ${usedMB}MB`),
      span({},`上限: ${limitMB}MB (${pct}%)`)
    ]),
    div({style:{height:"8px",background:"#0f172a",borderRadius:"4px",overflow:"hidden"}},[
      div({style:{height:"100%",width:`${Math.min(pct,100)}%`,background:pct>=95?"#ef4444":"#f97316",borderRadius:"4px"}})
    ])
  ]));

  m.appendChild(div({style:{fontSize:"12px",color:"#94a3b8",marginBottom:"12px",lineHeight:1.6}},"過去のデータをアーカイブしてストレージを解放してください。エクスポートしたファイルはバックアップとして保存できます。"));

  if(years.length===0){
    m.appendChild(div({style:{fontSize:"12px",color:"#475569",textAlign:"center",padding:"12px 0"}},"アーカイブできるデータがありません（今年のデータのみ）"));
  } else {
    // 年選択
    m.appendChild(div({style:{fontSize:"11px",color:"#64748b",marginBottom:"6px"}},"エクスポートする年"));
    const sel=document.createElement('select');
    sel.style.cssText="width:100%;padding:9px 12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:14px;font-family:inherit;margin-bottom:8px";
    years.forEach(y=>{
      const o=document.createElement('option');o.value=y;
      const logCount=state.logs.filter(l=>l.dateStr.startsWith(String(y))).length;
      o.textContent=`${y}年（体調記録${logCount}件）`;
      if(y===state.storageExportYear)o.selected=true;
      sel.appendChild(o);
    });
    sel.addEventListener('change',e=>{state.storageExportYear=parseInt(e.target.value);});
    m.appendChild(sel);

    // エクスポート＋削除ボタン
    m.appendChild(btn({style:{width:"100%",padding:"10px",background:"linear-gradient(135deg,#f97316,#ef4444)",border:"none",borderRadius:"8px",color:"#fff",fontSize:"13px",fontWeight:600,cursor:"pointer",marginBottom:"8px"},
      onClick:()=>{
        if(!state.storageExportYear)return;
        if(!confirm(`${state.storageExportYear}年のデータをエクスポートして削除しますか？\nエクスポートしたファイルは必ず保存してください。`))return;
        exportAndDeleteYear(state.storageExportYear);
      }},`📦 ${state.storageExportYear}年をエクスポートして削除`));
  }

  // 閉じる
  m.appendChild(btn({className:"btn-ghost",style:{width:"100%"},onClick:()=>{state.storageAlert=false;render();}},"後で対応する"));
  bg.appendChild(m);return bg;
}

const APP_VERSION = "11.28"; // ★バージョンはここ1箇所を変更すれば全体に反映される

// ── 取り消し（Undo）機構 ──────────────────────────
// 削除など取り返しのつかない操作の前に pushUndo() でデータ全体のスナップショットを
// 取り、数秒間「元に戻す」バーを表示する。健康記録など再入力が難しいデータの
// 誤削除を救済する。スナップショットは永続化される全フィールドの深いコピー。
let undoSnapshot=null, undoTimer=null;
const UNDO_FIELDS=["logs","dailies","todos","goals","goalTree","schedule","repeatEvents","tasks","routines","shiftPattern","planPatterns","customTodos"];
function snapshotData(){
  const snap={};
  UNDO_FIELDS.forEach(k=>{ try{ snap[k]=JSON.parse(JSON.stringify(state[k])); }catch{ snap[k]=state[k]; } });
  return snap;
}
function persistAll(){
  // スナップショット復元後に全フィールドを保存し直す
  saveStorage();
  if(typeof saveSchedule==='function')saveSchedule();
  if(typeof saveRepeatEvents==='function')saveRepeatEvents();
  if(typeof saveTasks==='function')saveTasks();
  if(typeof saveRoutines==='function')saveRoutines();
  if(typeof saveShiftPattern==='function')saveShiftPattern();
  if(typeof savePlanPatterns==='function')savePlanPatterns();
  if(typeof saveCustomTodos==='function')saveCustomTodos();
  if(typeof saveGoalTree==='function')saveGoalTree();
  safeSet(STORAGE_KEY+"_goals",JSON.stringify(state.goals));
  safeSet(STORAGE_KEY+"_todo",JSON.stringify(state.todos));
}
function pushUndo(label){
  undoSnapshot=snapshotData();
  showUndoBar(label||"削除しました");
}
function doUndo(){
  if(!undoSnapshot)return;
  UNDO_FIELDS.forEach(k=>{ if(undoSnapshot[k]!==undefined) state[k]=undoSnapshot[k]; });
  undoSnapshot=null;
  persistAll();
  hideUndoBar();
  showToast("元に戻しました","#22c55e");
  render();
}
function showUndoBar(label){
  const el=document.getElementById('undo-bar');
  if(!el)return;
  el.innerHTML='';
  const t=document.createElement('span');t.className='undo-label';t.textContent=label;
  const b=document.createElement('button');b.textContent='元に戻す';
  b.addEventListener('click',doUndo);
  el.appendChild(t);el.appendChild(b);
  el.classList.add('show');
  if(undoTimer)clearTimeout(undoTimer);
  undoTimer=setTimeout(hideUndoBar,6000);
}
function hideUndoBar(){
  const el=document.getElementById('undo-bar');
  if(el)el.classList.remove('show');
  if(undoTimer){clearTimeout(undoTimer);undoTimer=null;}
  // バーが消えたらスナップショットも破棄（メモリ節約）
  setTimeout(()=>{ if(!document.getElementById('undo-bar')?.classList.contains('show'))undoSnapshot=null; },300);
}

// 予定タブ「実際」列で1つにまとめて表示するルーティン群（アプリ内で編集可能・初期値）
const DEFAULT_ROUTINES = [
  {key:"morning",   title:"🌅モーニングルーティン", color:"#fb923c", ids:["meditation_am","bedmaking","grooming","water_am","stretch_am","dressing"]},
  {key:"breakfast", title:"🍳朝食",                 color:"#fbbf24", ids:["breakfast_prep","breakfast"]},
  {key:"lunch",     title:"🍱昼食",                 color:"#84cc16", ids:["lunch_prep","lunch"]},
  {key:"dinner",    title:"🍽夕食",                 color:"#f97316", ids:["dinner_prep","dinner"]},
  {key:"night",     title:"🌙ナイトルーティン",     color:"#a78bfa", ids:["stretch_pm","meditation_pm"]},
];
const cloneRoutines = () => DEFAULT_ROUTINES.map(g=>({...g, ids:[...g.ids]}));
// 既存ユーザーに不足しているルーティン群（朝食/昼食/夕食など）を追加する一度きりの移行。
// 既存の割り当ては変更せず、他グループに未割り当ての項目だけを新グループへ入れる。
function migrateRoutines(){
  const cur=state.routines||[];
  const have=new Set(cur.map(r=>r.key));
  const assigned=new Set(); cur.forEach(r=>(r.ids||[]).forEach(id=>assigned.add(id)));
  const additions=DEFAULT_ROUTINES.filter(g=>!have.has(g.key)).map(g=>({...g, ids:g.ids.filter(id=>!assigned.has(id))}));
  if(!additions.length) return;
  const nightIdx=cur.findIndex(r=>r.key==="night");
  state.routines = nightIdx>=0 ? [...cur.slice(0,nightIdx),...additions,...cur.slice(nightIdx)] : [...cur,...additions];
  saveRoutines();
}
function saveRoutines(){ safeSet(STORAGE_KEY+"_routines",JSON.stringify(state.routines)); }

// ── シフトパターン（勤務の週間繰り返し）──
const SHIFT_TYPES = {
  s1:  {label:"1直", start:7.5,  end:16, color:"#38bdf8"},
  s2:  {label:"2直", start:14.5, end:23, color:"#a78bfa"},
  off: {label:"休み", start:null, end:null, color:"#22c55e"},
};
// 直近の月曜日(YYYY-MM-DD)
function mondayStr(ds){
  const d=parseDS(ds); d.setDate(d.getDate()-((d.getDay()+6)%7));
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
// 既定パターン：2週交代（1週目=平日1直、2週目=平日2直、土日休み）
function defaultShiftPattern(){
  return {
    enabled:false,
    weeks:2,
    anchorMonday:mondayStr(todayStr()),
    grid:[
      ["s1","s1","s1","s1","s1","off","off"],
      ["s2","s2","s2","s2","s2","off","off"],
    ],
  };
}
function saveShiftPattern(){ safeSet(STORAGE_KEY+"_shift",JSON.stringify(state.shiftPattern)); }
// 指定日のパターン上のシフトキー（s1/s2/off）を返す。無効・範囲外はnull
function getPatternShift(ds){
  const sp=state.shiftPattern;
  if(!sp||!sp.enabled||!Array.isArray(sp.grid)||!sp.grid.length)return null;
  const weeks=sp.weeks||sp.grid.length;
  const anchor=parseDS(sp.anchorMonday||mondayStr(todayStr()));
  const thisMon=parseDS(mondayStr(ds));
  const wDiff=Math.round((thisMon-anchor)/(7*86400000));
  const cycleWeek=((wDiff%weeks)+weeks)%weeks;
  const dow=(parseDS(ds).getDay()+6)%7; // 月=0
  const row=sp.grid[cycleWeek]||sp.grid[cycleWeek%sp.grid.length];
  return row?(row[dow]||null):null;
}
// 予定(左)のシフトキー：その日の予定上書き(planShift)→なければパターン。
// planShift は "s1"/"s2"/"off" または カスタム時刻オブジェクト {startH,startM,endH,endM}
function getPlanShiftKey(ds){
  const d=getDaily(ds);
  if(d.planShift&&typeof d.planShift==='object') return d.planShift.startH<12?"s1":"s2"; // カスタムは時間帯で近似
  if(d.planShift!=null) return d.planShift;
  return getPatternShift(ds);
}
// 予定(左)に描くシフトブロック（キー or カスタム時刻に対応）。休み/なしは null
function getPlanShiftBlock(ds){
  const ps=getDaily(ds).planShift;
  if(ps&&typeof ps==='object'&&ps.startH!=null){
    return {startH:ps.startH,startM:ps.startM||0,endH:ps.endH,endM:ps.endM||0,label:"勤務",color:ps.startH<12?SHIFT_TYPES.s1.color:SHIFT_TYPES.s2.color,custom:true};
  }
  const key=(ps!=null)?ps:getPatternShift(ds);
  if(!key||key==="off")return null;
  const sh=SHIFT_TYPES[key]; if(!sh||sh.start==null)return null;
  let end=sh.end; if(end>24)end=24;

// ─── Open-Meteo 天気取得 ──────────────────────────
async function fetchWeatherAPI(lat, lon){
  const url = `https://api.open-meteo.com/v1/forecast`
    + `?latitude=${lat}&longitude=${lon}`
    + `&hourly=temperature_2m,relative_humidity_2m,surface_pressure,weather_code`
    + `&timezone=Asia%2FTokyo&forecast_days=1`;
  const res = await fetch(url);
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  const h = data.hourly;
  const today = todayStr();
  const humidity = h.relative_humidity_2m || h.relativehumidity_2m || [];
  const wcode    = h.weather_code || h.weathercode || [];
  return h.time.map((t,i) => ({
    hour:        new Date(t).getHours(),
    date:        t.slice(0,10),
    temp:        h.temperature_2m[i]   != null ? Math.round(h.temperature_2m[i]*10)/10   : null,
    humidity:    humidity[i]            != null ? humidity[i]                              : null,
    pressure:    h.surface_pressure[i] != null ? Math.round(h.surface_pressure[i]*10)/10 : null,
    weatherCode: wcode[i]              != null ? wcode[i]                                 : null,
  })).filter(r => r.date === today);
}

function calcBAC(drinks, wKg, sex, nowMin){
  const r = sex==="f"?0.55:0.68;
  return Math.max(0, drinks.reduce((bac,d)=>{
    if(nowMin<d.startMin)return bac;
    const peak = d.alcoholG/(wKg*r);
    const done = d.endMin+15;
    if(nowMin<=done) return bac+peak*Math.min(1,(nowMin-d.startMin)/Math.max(1,done-d.startMin));
    return bac+Math.max(0,peak-0.15*((nowMin-done)/60));
  },0));
}

// 旧「予定」タブ（v8.3）のデータを新モデルへ移行
function migrateOldSchedule(){
  let migrated=false;
  // 単発予定: events{ds:[{uid,title,sH,sM,eH,eM}]} → schedule{ds:[{...startH,startM,endH,endM,color}]}
  if(state.events && Object.keys(state.events).length){
    Object.keys(state.events).forEach(ds=>{
      state.schedule[ds]=(state.events[ds]||[]).map(e=>({
        uid:e.uid, title:e.title,
        startH:e.sH, startM:e.sM||0, endH:e.eH, endM:e.eM||0,
        color:"#38bdf8"
      }));
    });
    migrated=true;
  }
  // やること＋やりたいこと を統合して tasks.todo（優先度フラグ付き）へ
  const todo=[];
  (state.taskList||[]).forEach(t=>todo.push({uid:t.uid,text:t.text,done:!!t.done,imp:false,urg:false}));
  (state.wishList||[]).forEach(t=>todo.push({uid:t.uid,text:t.text,done:!!t.done,imp:false,urg:false}));
  if(todo.length){state.tasks.todo=todo;migrated=true;}
  // 買物
  if((state.shopList||[]).length){
    state.tasks.shopping=(state.shopList||[]).map(t=>({uid:t.uid,text:t.text,done:!!t.done}));
    migrated=true;
  }
  if(migrated){
    try{
      localStorage.setItem(STORAGE_KEY+"_schedule",JSON.stringify(state.schedule));
      localStorage.setItem(STORAGE_KEY+"_repeat",JSON.stringify(state.repeatEvents));
      localStorage.setItem(STORAGE_KEY+"_tasks",JSON.stringify(state.tasks));
    }catch{}
  }
}
// ── 保存の共通ヘルパー（失敗を検知してユーザーに通知）──
// localStorage への書き込みが失敗（容量超過・プライベートモード等）した場合、
// 従来は catch{} で握りつぶしていたため、データが保存されていないことに
// ユーザーが気づけなかった。safeSet は失敗を検知して警告し、成否を返す。
let saveFailNotified=false;
function safeSet(key,value){
  // バックアップ閲覧中は一切保存しない（現在のデータを守る）
  if(typeof state!=='undefined' && state && state.viewingBackup) return true;
  try{
    localStorage.setItem(key,value);
    return true;
  }catch(e){
    // 容量超過の可能性が高い → アーカイブ用モーダルを開く
    const quota = e && (e.name==='QuotaExceededError' || e.code===22 || e.code===1014);
    if(!saveFailNotified){
      saveFailNotified=true;
      showToast(quota?"⚠️ 保存できません（容量不足）":"⚠️ データを保存できませんでした","#ef4444");
      // 少し待ってから再通知できるように（連続表示を防ぐ）
      setTimeout(()=>{saveFailNotified=false;},4000);
    }
    if(quota){ state.storageAlert=true; }
    return false;
  }
}
function saveStorage(){
  if(state && state.viewingBackup){ render(); return; } // 閲覧中は保存しない
  const ok=safeSet(STORAGE_KEY,JSON.stringify({logs:state.logs,dailies:state.dailies}));
  if(ok){
    state.saved=true;render();setTimeout(()=>{state.saved=false;render();},2000);
  }else{
    render(); // 警告モーダル/トーストを反映
  }
}

}
function setLog(dateStr,hour,data){
  const nl=state.logs.filter(l=>!(l.dateStr===dateStr&&l.hour===hour));
  nl.push({dateStr,hour,...data});
  state.logs=nl;saveStorage();
}

// HTML生成ヘルパー
// ═══════════════════════════════════════════════════
function h(tag,attrs,children){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(v==null)continue;
    if(k==='style'&&typeof v==='object'){Object.assign(el.style,v);}
    else if(k.startsWith('on')&&typeof v==='function'){el.addEventListener(k.slice(2).toLowerCase(),v);}
    else if(k==='className'){el.className=v;}
    else{el.setAttribute(k,String(v));}
  }
  const flat=[].concat(children||[]).flat(Infinity);
  for(const c of flat){
    if(c==null||c===false||c===undefined)continue;
    if(typeof c==='string'||typeof c==='number'){
      el.appendChild(document.createTextNode(String(c)));
    } else if(c instanceof Node){
      el.appendChild(c);
    }
    // それ以外（boolean等）は無視
  }
  return el;
}
function div(attrs,children){return h('div',attrs,children);}
function btn(attrs,children){return h('button',attrs,children);}
function span(attrs,children){return h('span',attrs,children);}
function txt(s){return document.createTextNode(String(s??''));}

// ═══════════════════════════════════════════════════
// BACグラフ（Canvas）
// ═══════════════════════════════════════════════════
function renderBACChart(drinks, showCurrent, nowMinPassed){
  const H=140;
  const PX_PER_MIN=4;
  const YW=36; // 縦軸幅

  if(!drinks.length){
    const canvas=document.createElement('canvas');
    const W=Math.min(window.innerWidth-32,560);
    canvas.width=W;canvas.height=H;
    canvas.style.cssText=`width:100%;height:${H}px;display:block;background:#0a1120;border-radius:8px;`;
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='#475569';ctx.font='13px system-ui';ctx.textAlign='center';
    ctx.fillText('飲み物を追加するとグラフが表示されます',W/2,H/2);
    return canvas;
  }

  const nowMin=nowMinPassed;
  const dd=drinks.map(d=>{
    let startMin=d.hour*60+(d.min||0);
    if(d.startNextDay) startMin+=1440;
    let endMin=d.endHour!=null?d.endHour*60+(d.endMin||0):startMin+20;
    if(d.startNextDay && d.endHour!=null) endMin+=1440;
    // 終了が開始より前は+24h補正
    if(endMin<startMin) endMin+=1440;
    return {uid:d.uid, startMin, endMin, alcoholG:pureAlcohol(d.ml,d.drinkType.pct)};
  });
  const firstMin=Math.min(...dd.map(d=>d.startMin));
  const lastDrinkEnd=Math.max(...dd.map(d=>d.endMin||d.startMin+60));
  const refMin=showCurrent?Math.max(nowMin,lastDrinkEnd):lastDrinkEnd;
  const chartStart=Math.max(0,Math.min(firstMin,showCurrent?nowMin:firstMin)-60);
  let chartEnd=chartStart+8*60;
  for(let t=firstMin;t<=firstMin+14*60;t+=10){
    if(calcBAC(dd,60,'m',t)<=0.02){chartEnd=t+60;break;}
  }
  chartEnd=Math.max(chartEnd,refMin+120);
  const totalMin=chartEnd-chartStart;

  const curBac=showCurrent?calcBAC(dd,60,'m',nowMin):0;
  const maxBac=Math.max(0.3,...Array.from({length:50},(_,i)=>calcBAC(dd,60,'m',chartStart+totalMin*(i/49))));

  const PT=14,PB=24,cH=H-PT-PB;
  const yS=b=>PT+cH-(b/maxBac)*cH;
  const yLevels=[0.2,0.5,0.8,1.0].filter(v=>v<=maxBac+0.05);

  // ── 縦軸Canvas（固定）──
  const yCanvas=document.createElement('canvas');
  yCanvas.width=YW;yCanvas.height=H;
  yCanvas.style.cssText=`display:block;flex-shrink:0;height:${H}px;background:#0a1120;`;
  const yCtx=yCanvas.getContext('2d');
  yCtx.fillStyle='#0a1120';yCtx.fillRect(0,0,YW,H);
  yLevels.forEach(v=>{
    yCtx.fillStyle=v>=0.8?'#ef4444':'#64748b';
    yCtx.font='9px system-ui';yCtx.textAlign='right';
    yCtx.fillText(v.toFixed(1),YW-4,yS(v)+3);
    yCtx.strokeStyle='#334155';yCtx.lineWidth=1;
    yCtx.beginPath();yCtx.moveTo(YW-2,yS(v));yCtx.lineTo(YW,yS(v));yCtx.stroke();
  });
  // 縦軸ライン
  yCtx.strokeStyle='#334155';yCtx.lineWidth=1;
  yCtx.beginPath();yCtx.moveTo(YW-1,PT);yCtx.lineTo(YW-1,PT+cH);yCtx.stroke();
  // hPaラベル
  yCtx.fillStyle='#334155';yCtx.font='8px system-ui';yCtx.textAlign='right';
  yCtx.fillText('‰',YW-4,PT-3);

  // ── グラフCanvas（スクロール）──
  const GW=Math.max(Math.min(window.innerWidth-32-YW,560-YW), totalMin*PX_PER_MIN+8);
  const PR=8;
  const cW=GW-PR;
  const xG=t=>((t-chartStart)/totalMin)*cW;

  const canvas=document.createElement('canvas');
  canvas.width=GW;canvas.height=H;
  canvas.style.cssText=`display:block;height:${H}px;`;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#0a1120';ctx.fillRect(0,0,GW,H);

  // グリッド横線
  yLevels.forEach(v=>{
    ctx.strokeStyle=v>=0.8?'#ef444455':'#1e3a5f88';
    ctx.lineWidth=v>=0.8?1.2:0.6;
    ctx.setLineDash(v>=0.8?[5,3]:[3,6]);
    ctx.beginPath();ctx.moveTo(0,yS(v));ctx.lineTo(cW,yS(v));ctx.stroke();
    ctx.setLineDash([]);
  });

  // エリア
  const STEPS=100;
  ctx.beginPath();
  ctx.moveTo(xG(chartStart),yS(0));
  for(let i=0;i<=STEPS;i++){
    const t=chartStart+totalMin*(i/STEPS);
    ctx.lineTo(xG(t),yS(calcBAC(dd,60,'m',t)));
  }
  ctx.lineTo(xG(chartEnd),yS(0));ctx.closePath();
  const grad=ctx.createLinearGradient(0,PT,0,PT+cH);
  grad.addColorStop(0,'rgba(249,115,22,0.5)');grad.addColorStop(1,'rgba(249,115,22,0.02)');
  ctx.fillStyle=grad;ctx.fill();

  // ライン
  ctx.strokeStyle='#f97316';ctx.lineWidth=2;ctx.setLineDash([]);
  ctx.beginPath();
  for(let i=0;i<=STEPS;i++){
    const t=chartStart+totalMin*(i/STEPS);
    i===0?ctx.moveTo(xG(t),yS(calcBAC(dd,60,'m',t))):ctx.lineTo(xG(t),yS(calcBAC(dd,60,'m',t)));
  }
  ctx.stroke();

  // 飲み始め/終わりマーカー
  dd.forEach((d,i)=>{
    ctx.fillStyle='#eab308';
    ctx.beginPath();ctx.arc(xG(d.startMin),PT+cH-5,4,0,Math.PI*2);ctx.fill();
    if(drinks[i]?.endHour!=null){
      ctx.strokeStyle='#a78bfa';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
      ctx.beginPath();ctx.moveTo(xG(d.endMin),PT);ctx.lineTo(xG(d.endMin),PT+cH);ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='#a78bfa';
      ctx.beginPath();ctx.arc(xG(d.endMin),PT+cH-5,4,0,Math.PI*2);ctx.fill();
    }
  });

  // NOW（現在BAC表示時のみ）
  if(showCurrent&&nowMin>=chartStart&&nowMin<=chartEnd){
    const nx=xG(nowMin),ny=yS(curBac);
    ctx.strokeStyle='#38bdf8';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(nx,PT);ctx.lineTo(nx,PT+cH);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(56,189,248,0.2)';ctx.beginPath();ctx.arc(nx,ny,9,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#38bdf8';ctx.beginPath();ctx.arc(nx,ny,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#38bdf8';ctx.font='bold 9px system-ui';ctx.textAlign='left';ctx.fillText('NOW',nx+7,PT+12);
  }

  // X軸ラベル
  const step=totalMin<=300?30:60;
  ctx.fillStyle='#64748b';ctx.font='9px system-ui';ctx.textAlign='center';
  for(let t=Math.ceil(chartStart/step)*step;t<=chartEnd;t+=step){
    ctx.fillText(`${Math.floor(t/60)%24}:${String(t%60).padStart(2,'0')}`,xG(t),H-5);
  }

  // X軸ライン
  ctx.strokeStyle='#334155';ctx.lineWidth=1;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(0,PT+cH);ctx.lineTo(cW,PT+cH);ctx.stroke();

  // スクロールコンテナ
  const scrollWrap=document.createElement('div');
  scrollWrap.style.cssText=`overflow-x:scroll;overflow-y:hidden;-webkit-overflow-scrolling:touch;touch-action:pan-x;flex:1;background:#0a1120;`;
  scrollWrap.appendChild(canvas);

  // 縦軸＋スクロールを横並びに
  const container=document.createElement('div');
  container.style.cssText=`display:flex;background:#0a1120;border-radius:8px;overflow:hidden;`;
  container.appendChild(yCanvas);
  container.appendChild(scrollWrap);

  if(showCurrent){
    requestAnimationFrame(()=>{
      const nx=xG(nowMin);
      scrollWrap.scrollLeft=Math.max(0,nx-scrollWrap.clientWidth/2);
    });
  }

  return container;
}

function nextDate(){
  const parts=state.viewDate.split('-');

// ── 目標タブ ──────────────────────────────────────

function getGoalKey(type, dateStr){
  const p=dateStr.split('-');
  const y=parseInt(p[0]),m=parseInt(p[1]),d2=parseInt(p[2]);
  switch(type){
    case 'daily': return `daily_${dateStr}`;
    case 'weekly':{
      const n=new Date(y,m-1,d2);const day=n.getDay();
      const diff=day===0?-6:1-day;n.setDate(n.getDate()+diff);
      return `weekly_${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
    }
    case 'monthly': return `monthly_${y}-${String(m).padStart(2,'0')}`;
    case 'quarterly':{
      const q=Math.ceil(m/3);return `quarterly_${y}-Q${q}`;
    }
    case 'yearly': return `yearly_${y}`;
  }
}

function getGoal(type, dateStr){
  return state.goals[getGoalKey(type,dateStr)]||{text:"",done:false,progress:""};
}

function setGoal(type, dateStr, data){
  const key=getGoalKey(type,dateStr);
  state.goals[key]={...getGoal(type,dateStr),...data};
  safeSet(STORAGE_KEY+"_goals",JSON.stringify(state.goals));
  render();
}

function goalPeriodLabel(type, dateStr){
  const p=dateStr.split('-');
  const y=parseInt(p[0]),m=parseInt(p[1]);
  switch(type){
    case 'daily': return new Date(...p.map((v,i)=>i===1?parseInt(v)-1:parseInt(v))).toLocaleDateString("ja-JP",{month:"short",day:"numeric",weekday:"short"});
    case 'weekly':{
      const key=getGoalKey('weekly',dateStr);
      const mon=key.replace('weekly_','');
      const mp=mon.split('-');const monD=new Date(parseInt(mp[0]),parseInt(mp[1])-1,parseInt(mp[2]));
      const sunD=new Date(monD);sunD.setDate(sunD.getDate()+6);
      return `${monD.getMonth()+1}/${monD.getDate()}〜${sunD.getMonth()+1}/${sunD.getDate()}`;
    }
    case 'monthly': return `${y}年${m}月`;
    case 'quarterly':{const q=Math.ceil(m/3);return `${y}年 Q${q}`;}
    case 'yearly': return `${y}年`;
  }
}

// ══ 目標ツリー（年間目標→下位目標へ掘り下げる階層構造）══
function saveGoalTree(){ safeSet(STORAGE_KEY+"_goaltree",JSON.stringify(state.goalTree)); }
function gtNewId(){ return "g"+Date.now().toString(36)+Math.floor(Math.random()*1000); }
// 再帰探索：id のノードと親配列を返す
function gtFind(id, list=state.goalTree, parent=null){
  for(const n of list){
    if(n.id===id) return {node:n, siblings:list, parent};
    if(n.children&&n.children.length){ const r=gtFind(id,n.children,n); if(r)return r; }
  }
  return null;
}
// サブツリーの葉（子を持たないノード）の達成数/総数
function gtProgress(node){
  if(!node.children||!node.children.length) return {done:node.done?1:0, total:1};
  let d=0,t=0; node.children.forEach(c=>{const r=gtProgress(c);d+=r.done;t+=r.total;});
  return {done:d,total:t};
}
// 期間連動：ノードに periodType（yearly等）を割り当て、periodKey で特定の期間に紐付ける
const GT_PERIOD_LABELS={yearly:"年間",quarterly:"四半期",monthly:"月次",weekly:"週間",daily:"日次"};
function gtCollectByPeriod(type, key, list=state.goalTree, out=[]){
  (list||[]).forEach(n=>{
    if(n.periodType===type && n.periodKey===key) out.push(n);
    if(n.children&&n.children.length) gtCollectByPeriod(type,key,n.children,out);
  });
  return out;
}
// periodKey（例 quarterly_2026-Q1）の解析・表示・生成
function pkParse(key){
  if(!key) return null;
  if(key.startsWith('yearly_')) return {y:+key.slice(7)};
  if(key.startsWith('quarterly_')){ const s=key.slice(10).split('-Q'); return {y:+s[0], q:+s[1]}; }
  if(key.startsWith('monthly_')){ const s=key.slice(8).split('-'); return {y:+s[0], m:+s[1]}; }
  if(key.startsWith('weekly_')) return {monday:key.slice(7)};
  if(key.startsWith('daily_')) return {date:key.slice(6)};
  return null;
}
function pkLabel(key){
  const p=pkParse(key); if(!p) return "—";
  if(key.startsWith('yearly_')) return `${p.y}年`;
  if(key.startsWith('quarterly_')) return `${p.y}年 Q${p.q}`;
  if(key.startsWith('monthly_')) return `${p.y}年${p.m}月`;
  if(key.startsWith('weekly_')) return goalPeriodLabel('weekly',p.monday);
  if(key.startsWith('daily_')) return goalPeriodLabel('daily',p.date);
  return "—";
}
function pkShort(key){
  const p=pkParse(key); if(!p) return "";
  if(key.startsWith('yearly_')) return `${p.y}`;
  if(key.startsWith('quarterly_')) return `${p.y} Q${p.q}`;
  if(key.startsWith('monthly_')) return `${p.y}/${p.m}`;
  if(key.startsWith('weekly_')){ const d=p.monday.split('-'); return `${+d[1]}/${+d[2]}週`; }
  if(key.startsWith('daily_')){ const d=p.date.split('-'); return `${+d[1]}/${+d[2]}`; }
  return "";
}
// 期間タイプ選択時の既定 periodKey（親の年に合わせ、閲覧中の日付を基準に）
function pkDefault(type, parentKey, viewDate){
  const vp=(viewDate||todayStr()).split('-'); const cy=+vp[0], cm=+vp[1];
  const pp=parentKey?pkParse(parentKey):null;
  const by=(pp&&pp.y)?pp.y:cy;
  switch(type){
    case 'yearly': return `yearly_${by}`;
    case 'quarterly': return `quarterly_${by}-Q${Math.ceil(cm/3)}`;
    case 'monthly': return `monthly_${by}-${String(cm).padStart(2,'0')}`;
    case 'weekly': return getGoalKey('weekly', viewDate||todayStr());
    case 'daily': return `daily_${viewDate||todayStr()}`;
  }
  return null;
}
function gtAddChild(parentId, text){
  const node={id:gtNewId(), text:text.trim(), done:false, collapsed:false, children:[]};
  if(parentId==null){ state.goalTree=[...state.goalTree, node]; }
  else { const f=gtFind(parentId); if(f){ f.node.children=[...(f.node.children||[]), node]; f.node.collapsed=false; } }
  saveGoalTree();
}
function gtUpdate(id, patch){ const f=gtFind(id); if(f){ Object.assign(f.node, patch); saveGoalTree(); } }
function gtDelete(id){ const f=gtFind(id); if(f){ pushUndo("目標を削除しました"); const i=f.siblings.indexOf(f.node); if(i>=0)f.siblings.splice(i,1); saveGoalTree(); } }

function renderGoalTreeNode(node, depth){
  const rows=[];
  const prog=gtProgress(node);
  const hasKids=node.children&&node.children.length;
  const pct=prog.total?Math.round(prog.done/prog.total*100):0;
  const barCol=pct>=100?"#22c55e":pct>=50?"#eab308":"#38bdf8";
  const row=div({style:{display:"flex",alignItems:"center",gap:"7px",padding:"7px 4px",borderBottom:"1px solid #1e3a5f33",
    marginLeft:`${depth*16}px`,borderLeft:depth>0?"2px solid #1e3a5f":"none",paddingLeft:depth>0?"8px":"4px"}});
  // 展開/折りたたみ
  if(hasKids){
    const tg=btn({style:{width:"18px",height:"18px",flexShrink:0,background:"transparent",border:"none",color:"#64748b",cursor:"pointer",fontSize:"11px"}},node.collapsed?"▶":"▼");
    tg.addEventListener('click',()=>{gtUpdate(node.id,{collapsed:!node.collapsed});render();});
    row.appendChild(tg);
  } else { row.appendChild(div({style:{width:"18px",flexShrink:0}})); }
  // チェック
  const cb=btn({style:{width:"20px",height:"20px",flexShrink:0,borderRadius:"5px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",color:"#fff",
    border:`2px solid ${node.done?"#22c55e":"#334155"}`,background:node.done?"#22c55e":"transparent"}},node.done?"✓":"");
  cb.addEventListener('click',()=>{gtUpdate(node.id,{done:!node.done});render();});
  row.appendChild(cb);
  // テキスト（タップで編集）
  const label=div({style:{flex:1,minWidth:0,cursor:"pointer"}});
  const titleRow=div({style:{display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap"}});
  titleRow.appendChild(div({style:{fontSize:depth===0?"14px":"13px",fontWeight:depth===0?700:500,color:node.done?"#475569":"#e2e8f0",textDecoration:node.done?"line-through":"none",lineHeight:1.3,wordBreak:"break-word"}},node.text||"(無題)"));
  if(node.periodType&&GT_PERIOD_LABELS[node.periodType]){
    const badge=node.periodKey?`${GT_PERIOD_LABELS[node.periodType]} ${pkShort(node.periodKey)}`:GT_PERIOD_LABELS[node.periodType];
    titleRow.appendChild(span({style:{fontSize:"9px",padding:"1px 6px",borderRadius:"8px",background:"#6366f122",color:"#a5b4fc",border:"1px solid #6366f155",whiteSpace:"nowrap"}},"📅 "+badge));
  }
  label.appendChild(titleRow);
  if(hasKids){
    label.appendChild(div({style:{display:"flex",alignItems:"center",gap:"6px",marginTop:"3px"}},[
      div({style:{flex:1,maxWidth:"120px",height:"5px",background:"#0f172a",borderRadius:"3px",overflow:"hidden"}},[div({style:{height:"100%",width:`${pct}%`,background:barCol,borderRadius:"3px"}})]),
      span({style:{fontSize:"9px",color:"#64748b"}},`${prog.done}/${prog.total} (${pct}%)`)
    ]));
  }
  label.addEventListener('click',()=>{state.goalTreeModal={mode:"edit",id:node.id,text:node.text||""};render();});
  row.appendChild(label);
  // ＋下位目標
  const addB=btn({style:{flexShrink:0,fontSize:"11px",padding:"3px 8px",borderRadius:"6px",cursor:"pointer",fontWeight:600,background:"#0ea5e918",border:"1px solid #0ea5e955",color:"#38bdf8"}},"＋");
  addB.addEventListener('click',()=>{state.goalTreeModal={mode:"add",parentId:node.id,text:""};render();});
  row.appendChild(addB);
  rows.push(row);
  if(hasKids && !node.collapsed){ node.children.forEach(c=>{ renderGoalTreeNode(c,depth+1).forEach(r=>rows.push(r)); }); }
  return rows;
}

function renderGoalTreeModal(){
  const m0=state.goalTreeModal; if(!m0)return div({});
  const bg=div({className:"modal-center"});
  const m=div({className:"modal-box"});
  bg.addEventListener('click',()=>{state.goalTreeModal=null;render();});
  m.addEventListener('click',e=>e.stopPropagation());
  m.appendChild(div({style:{fontSize:"15px",fontWeight:700,color:"#e2e8f0",marginBottom:"4px"}},m0.mode==="add"?(m0.parentId==null?"🏆 年間目標を追加":"🎯 下位目標を追加"):"目標を編集"));
  if(m0.mode==="add"&&m0.parentId!=null){ const f=gtFind(m0.parentId); if(f)m.appendChild(div({style:{fontSize:"11px",color:"#64748b",marginBottom:"10px"}},`「${f.node.text}」を達成するための小さな目標`)); }
  const ta=document.createElement('textarea');
  ta.style.cssText="width:100%;height:80px;padding:10px 12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:14px;font-family:inherit;box-sizing:border-box;resize:vertical;margin:6px 0 12px";
  ta.value=m0.text||"";ta.placeholder="目標を入力...";
  ta.addEventListener('input',e=>{state.goalTreeModal.text=e.target.value;});
  m.appendChild(ta);
  // 期間連動：どの期間タイプ＋どの特定期（Q1/Q2…、○月など）に紐付けるか
  if(m0.periodType===undefined && m0.mode==="edit"){ const f=gtFind(m0.id); m0.periodType=(f&&f.node.periodType)||null; if(f&&f.node.periodKey)m0.periodKey=f.node.periodKey; }
  let parentKey=null;
  if(m0.mode==="add" && m0.parentId!=null){ const pf=gtFind(m0.parentId); parentKey=pf&&pf.node.periodKey; }
  else if(m0.mode==="edit"){ const ef=gtFind(m0.id); parentKey=ef&&ef.parent&&ef.parent.periodKey; }
  m.appendChild(div({style:{fontSize:"11px",color:"#64748b",marginBottom:"6px"}},"期間別目標に連動（任意）"));
  const perRow=div({style:{display:"flex",flexWrap:"wrap",gap:"5px",marginBottom:"8px"}});
  [["","なし"],["yearly","年間"],["quarterly","四半期"],["monthly","月次"],["weekly","週間"],["daily","日次"]].forEach(([k,lbl])=>{
    const on=(m0.periodType||"")===k;
    perRow.appendChild(btn({style:{fontSize:"11px",padding:"5px 10px",borderRadius:"7px",cursor:"pointer",fontWeight:600,
      border:`1px solid ${on?"#6366f1":"#334155"}`,background:on?"#6366f122":"transparent",color:on?"#a5b4fc":"#64748b"},
      onClick:()=>{ if(!k){m0.periodType=null;m0.periodKey=null;} else {m0.periodType=k;m0.periodKey=pkDefault(k,parentKey,state.viewDate||todayStr());} render(); }},lbl));
  });
  m.appendChild(perRow);
  // 特定期間ピッカー（同じ親でもQ1/Q2…や各月など複数の期に割り当て可能）
  if(m0.periodType){
    if(!m0.periodKey)m0.periodKey=pkDefault(m0.periodType,parentKey,state.viewDate||todayStr());
    const parsed=pkParse(m0.periodKey)||{};
    const picker=div({style:{background:"#0f172a",borderRadius:"8px",padding:"9px 10px",marginBottom:"12px"}});
    const chip=(lbl,on,fn)=>{const bb=btn({style:{fontSize:"11px",padding:"5px 9px",borderRadius:"6px",cursor:"pointer",fontWeight:600,border:`1px solid ${on?"#38bdf8":"#334155"}`,background:on?"#0ea5e922":"transparent",color:on?"#38bdf8":"#64748b"}},lbl);bb.addEventListener('click',fn);return bb;};
    if(["yearly","quarterly","monthly"].includes(m0.periodType)){
      const yr=parsed.y||new Date().getFullYear();
      const yrow=div({style:{display:"flex",alignItems:"center",justifyContent:"center",gap:"14px",marginBottom:m0.periodType==="yearly"?"0":"8px"}});
      const yb=(lbl,d)=>{const bb=btn({style:{width:"30px",height:"26px",border:"1px solid #334155",borderRadius:"6px",background:"transparent",color:"#94a3b8",cursor:"pointer",fontSize:"15px"}},lbl);bb.addEventListener('click',()=>{
        const y=yr+d;
        if(m0.periodType==="yearly")m0.periodKey=`yearly_${y}`;
        else if(m0.periodType==="quarterly")m0.periodKey=`quarterly_${y}-Q${parsed.q||1}`;
        else m0.periodKey=`monthly_${y}-${String(parsed.m||1).padStart(2,'0')}`;
        render();
      });return bb;};
      yrow.appendChild(yb("‹",-1));
      yrow.appendChild(span({style:{fontSize:"15px",fontWeight:700,color:"#e2e8f0"}},`${yr}年`));
      yrow.appendChild(yb("›",1));
      picker.appendChild(yrow);
    }
    if(m0.periodType==="quarterly"){
      const qrow=div({style:{display:"flex",gap:"6px",justifyContent:"center"}});
      [1,2,3,4].forEach(q=>qrow.appendChild(chip(`Q${q}`,parsed.q===q,()=>{m0.periodKey=`quarterly_${parsed.y}-Q${q}`;render();})));
      picker.appendChild(qrow);
    }
    if(m0.periodType==="monthly"){
      const mrow=div({style:{display:"flex",flexWrap:"wrap",gap:"4px",justifyContent:"center"}});
      for(let mo=1;mo<=12;mo++)mrow.appendChild(chip(`${mo}月`,parsed.m===mo,()=>{m0.periodKey=`monthly_${parsed.y}-${String(mo).padStart(2,'0')}`;render();}));
      picker.appendChild(mrow);
    }
    if(m0.periodType==="weekly"||m0.periodType==="daily"){
      picker.appendChild(div({style:{fontSize:"10px",color:"#64748b",marginBottom:"5px"}}, m0.periodType==="weekly"?"その週（月曜起点）に紐付け":"その日に紐付け"));
      const di=document.createElement('input');di.type='date';
      di.value = m0.periodType==="daily" ? (parsed.date||todayStr()) : (parsed.monday||todayStr());
      di.style.cssText="width:100%;padding:8px;background:#1e293b;border:1px solid #334155;border-radius:7px;color:#e2e8f0;font-size:14px;color-scheme:dark;font-family:inherit;box-sizing:border-box";
      di.addEventListener('change',e=>{ if(e.target.value){ m0.periodKey = m0.periodType==="daily"?`daily_${e.target.value}`:getGoalKey('weekly',e.target.value); render(); } });
      picker.appendChild(di);
    }
    picker.appendChild(div({style:{fontSize:"10px",color:"#a5b4fc",marginTop:"8px",textAlign:"center",fontWeight:600}},"連動先: "+pkLabel(m0.periodKey)));
    m.appendChild(picker);
  }
  const btns=[];
  if(m0.mode==="edit"){
    btns.push(btn({style:{padding:"9px 12px",background:"transparent",border:"1px solid #ef444455",borderRadius:"8px",color:"#f87171",cursor:"pointer",fontSize:"12px",fontWeight:600},
      onClick:()=>{ const f=gtFind(m0.id); const kids=f&&f.node.children&&f.node.children.length; if(confirm(kids?"下位目標も含めて削除しますか？":"この目標を削除しますか？")){ gtDelete(m0.id); state.goalTreeModal=null; render(); } }},"🗑 削除"));
  }
  btns.push(btn({className:"btn-ghost",style:{flex:1},onClick:()=>{state.goalTreeModal=null;render();}},"キャンセル"));
  btns.push(btn({style:{flex:1,padding:"10px",background:"linear-gradient(135deg,#0ea5e9,#6366f1)",border:"none",borderRadius:"8px",color:"#fff",fontSize:"13px",fontWeight:600,cursor:"pointer"},
    onClick:()=>{
      const text=(state.goalTreeModal.text||"").trim();
      if(!text){ alert("目標を入力してください"); return; }
      const pt=state.goalTreeModal.periodType||null;
      const pk=pt?(state.goalTreeModal.periodKey||pkDefault(pt,null,state.viewDate||todayStr())):null;
      if(m0.mode==="add"){
        gtAddChild(m0.parentId==null?null:m0.parentId, text);
        // 追加直後のノード（末尾）に期間連動を設定
        if(pt){ const list=m0.parentId==null?state.goalTree:(gtFind(m0.parentId)?.node.children||[]); const created=list[list.length-1]; if(created){created.periodType=pt;created.periodKey=pk;saveGoalTree();} }
      } else {
        gtUpdate(m0.id,{text, periodType:pt, periodKey:pk});
      }
      state.goalTreeModal=null; render();
    }},"保存"));
  m.appendChild(div({style:{display:"flex",gap:"8px",alignItems:"center"}},btns));
  bg.appendChild(m);return bg;
}

function renderGoalTree(){
  const card=div({className:"card"});
  card.appendChild(div({style:{fontSize:"12px",color:"#64748b",marginBottom:"10px",lineHeight:1.6}},
    "🏆 年間目標を最終到達点として、それを達成するための下位目標へ「＋」でどんどん掘り下げられます。子目標の達成率が親に集計されます。"));
  if(!state.goalTree.length){
    card.appendChild(div({style:{fontSize:"12px",color:"#475569",textAlign:"center",padding:"18px 0"}},"まだ目標がありません。下のボタンから年間目標を追加してください。"));
  } else {
    state.goalTree.forEach(root=>{ renderGoalTreeNode(root,0).forEach(r=>card.appendChild(r)); });
  }
  card.appendChild(btn({style:{width:"100%",marginTop:"12px",padding:"11px",background:"#0ea5e918",border:"1px solid #0ea5e9",borderRadius:"8px",color:"#38bdf8",fontSize:"13px",fontWeight:600,cursor:"pointer"},
    onClick:()=>{state.goalTreeModal={mode:"add",parentId:null,text:""};render();}},"🏆 年間目標を追加"));
  return card;
}

function renderGoals(vd, ds){
  const wrap=div({style:{maxWidth:"600px",margin:"0 auto",padding:"10px 16px 60px"}});

  // モード切替：目標ツリー / 期間別
  const modeRow=div({style:{display:"flex",gap:"6px",marginBottom:"10px"}});
  [["tree","🌳 目標ツリー"],["period","📅 期間別"]].forEach(([k,lbl])=>{
    const on=(state.goalView||"tree")===k;
    modeRow.appendChild(btn({style:{flex:1,padding:"9px",borderRadius:"8px",cursor:"pointer",fontSize:"12px",fontWeight:600,
      border:`1px solid ${on?"#38bdf8":"#334155"}`,background:on?"#0ea5e922":"transparent",color:on?"#38bdf8":"#64748b"},
      onClick:()=>{state.goalView=k;render();}},lbl));
  });
  wrap.appendChild(modeRow);
  if((state.goalView||"tree")==="tree"){ wrap.appendChild(renderGoalTree()); return wrap; }


  const GOAL_TYPES=[
    {type:"yearly",    icon:"🏆",label:"年間目標",    hasProgress:true},
    {type:"quarterly", icon:"📅",label:"四半期目標",  hasProgress:true},
    {type:"monthly",   icon:"🗓️",label:"月次目標",    hasProgress:true},
    {type:"weekly",    icon:"📆",label:"週間目標",    hasProgress:true},
    {type:"daily",     icon:"☀️",label:"一日目標",    hasProgress:false},
  ];

  GOAL_TYPES.forEach(({type,icon,label,hasProgress})=>{
    const goal=getGoal(type,vd);
    const periodLabel=goalPeriodLabel(type,vd);
    const card=div({className:"card",style:{marginBottom:"10px"}});

    // ヘッダー
    card.appendChild(div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}},[
      div({},[
        div({style:{fontSize:"13px",fontWeight:700,color:"#e2e8f0"}},[txt(`${icon} ${label}`)]),
        div({style:{fontSize:"10px",color:"#64748b",marginTop:"2px"}},periodLabel)
      ]),
      div({style:{display:"flex",alignItems:"center",gap:"8px"}},[
        btn({style:{fontSize:"10px",padding:"3px 8px",background:"transparent",border:"1px solid #334155",borderRadius:"6px",color:"#64748b",cursor:"pointer"},
          onClick:()=>{state.goalHistoryType=type;render();}},"📋 履歴"),
        // チェックボックス
        (()=>{
          const cb=btn({style:{
            width:"28px",height:"28px",borderRadius:"8px",flexShrink:0,
            border:`2px solid ${goal.done?"#22c55e":"#334155"}`,
            background:goal.done?"#22c55e":"transparent",
            cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px"
          }},goal.done?"✓":"");
          cb.addEventListener('click',()=>{
          const newDone=!goal.done;
          setGoal(type,vd,{done:newDone});
          if(newDone){
            showToast(`🎉 ${label}達成！おめでとう！`,"#f97316");
            showConfetti();
          }
        });
          return cb;
        })()
      ])
    ]));

    // 目標テキスト入力
    const ta=document.createElement('textarea');
    ta.placeholder=`${label}を入力...`;
    ta.value=goal.text||"";
    ta.style.cssText="width:100%;min-height:60px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:13px;padding:8px;resize:none;box-sizing:border-box;font-family:inherit;line-height:1.5";
    ta.addEventListener('change',e=>setGoal(type,vd,{text:e.target.value}));
    ta.addEventListener('blur',e=>setGoal(type,vd,{text:e.target.value}));
    card.appendChild(ta);

    // 進捗テキスト（一日目標以外）
    if(hasProgress){
      const pr=document.createElement('textarea');
      pr.placeholder="進捗・メモを入力...";
      pr.value=goal.progress||"";
      pr.style.cssText="width:100%;min-height:44px;background:#0a1120;border:1px solid #1e3a5f;border-radius:8px;color:#94a3b8;font-size:12px;padding:8px;resize:none;box-sizing:border-box;font-family:inherit;margin-top:6px;line-height:1.5";
      pr.addEventListener('change',e=>setGoal(type,vd,{progress:e.target.value}));
      pr.addEventListener('blur',e=>setGoal(type,vd,{progress:e.target.value}));
      card.appendChild(pr);
    }

    // 目標ツリーから連動している目標
    const linked=gtCollectByPeriod(type, getGoalKey(type,vd));
    if(linked.length){
      card.appendChild(div({style:{fontSize:"10px",color:"#a5b4fc",marginTop:"10px",marginBottom:"4px",fontWeight:600}},"🌳 目標ツリーから連動"));
      linked.forEach(n=>{
        const prog=gtProgress(n); const hasKids=n.children&&n.children.length; const pct=prog.total?Math.round(prog.done/prog.total*100):0;
        const rrow=div({style:{display:"flex",alignItems:"center",gap:"8px",padding:"6px 8px",background:"#6366f111",border:"1px solid #6366f133",borderRadius:"7px",marginBottom:"4px"}});
        const cb=btn({style:{width:"20px",height:"20px",flexShrink:0,borderRadius:"5px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",color:"#fff",
          border:`2px solid ${n.done?"#22c55e":"#334155"}`,background:n.done?"#22c55e":"transparent"}},n.done?"✓":"");
        cb.addEventListener('click',()=>{gtUpdate(n.id,{done:!n.done});render();});
        rrow.appendChild(cb);
        const tx=div({style:{flex:1,minWidth:0,cursor:"pointer"}},[
          div({style:{fontSize:"12px",color:n.done?"#475569":"#e2e8f0",textDecoration:n.done?"line-through":"none",wordBreak:"break-word"}},n.text||"(無題)"),
          hasKids?div({style:{fontSize:"9px",color:"#64748b",marginTop:"2px"}},`下位目標 ${prog.done}/${prog.total} (${pct}%)`):null
        ]);
        tx.addEventListener('click',()=>{state.goalView="tree";state.goalTreeModal={mode:"edit",id:n.id,text:n.text||""};render();});
        rrow.appendChild(tx);
        card.appendChild(rrow);
      });
    }

    wrap.appendChild(card);
  });

  return wrap;
}

function renderGoalHistory(vd){
  const type=state.goalHistoryType;
  const LABELS={yearly:"年間目標",quarterly:"四半期目標",monthly:"月次目標",weekly:"週間目標",daily:"一日目標"};
  const ICONS ={yearly:"🏆",quarterly:"📅",monthly:"🗓️",weekly:"📆",daily:"☀️"};

  // 過去の目標キーを収集
  const prefix={yearly:"yearly_",quarterly:"quarterly_",monthly:"monthly_",weekly:"weekly_",daily:"daily_"}[type];
  const keys=Object.keys(state.goals).filter(k=>k.startsWith(prefix)).sort().reverse();

  const bg=div({className:"modal-bg"});
  const m=div({className:"modal",style:{maxHeight:"85vh",overflow:"hidden",display:"flex",flexDirection:"column"}});
  bg.addEventListener('click',()=>{state.goalHistoryType=null;render();});

  m.appendChild(div({style:{width:"36px",height:"4px",background:"#334155",borderRadius:"4px",margin:"0 auto 12px"}}));
  m.appendChild(div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}},[
    div({style:{fontSize:"15px",fontWeight:700,color:"#e2e8f0"}},`${ICONS[type]} ${LABELS[type]} 履歴`),
    btn({style:{background:"transparent",border:"none",color:"#64748b",cursor:"pointer",fontSize:"20px",padding:"0"}},"×")
  ])).querySelector('button').addEventListener('click',()=>{state.goalHistoryType=null;render();});

  // 履歴リスト
  const list=div({style:{flex:1,overflowY:"auto"}});

  if(keys.length===0){
    list.appendChild(div({style:{textAlign:"center",color:"#475569",padding:"24px 0",fontSize:"13px"}},"まだ記録がありません"));
  } else {
    keys.forEach(key=>{
      const g=state.goals[key];
      if(!g||!g.text)return;
      // キーから期間ラベルを生成
      const raw=key.replace(prefix,"");
      let periodStr=raw;
      if(type==="daily"){
        const p=raw.split('-');periodStr=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])).toLocaleDateString("ja-JP",{year:"numeric",month:"short",day:"numeric",weekday:"short"});
      } else if(type==="weekly"){
        const p=raw.split('-');const mon=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));const sun=new Date(mon);sun.setDate(sun.getDate()+6);
        periodStr=`${mon.getMonth()+1}/${mon.getDate()}〜${sun.getMonth()+1}/${sun.getDate()}`;
      } else if(type==="monthly"){
        const p=raw.split('-');periodStr=`${p[0]}年${parseInt(p[1])}月`;
      } else if(type==="quarterly"){
        periodStr=raw.replace('-',' ');
      } else if(type==="yearly"){
        periodStr=`${raw}年`;
      }

      const item=div({style:{marginBottom:"10px",padding:"10px 12px",background:"#0f172a",borderRadius:"10px",border:`1px solid ${g.done?"#22c55e33":"#1e3a5f"}`,cursor:"pointer"}});
      item.addEventListener('click',(()=>{const k=key;const type2=type;return()=>{
        state.goalEditKey=k;
        state.goalEditType=type2;
        state.goalEditText=g.text||"";
        state.goalEditProgress=g.progress||"";
        state.goalEditDone=g.done||false;
        state.goalEditPeriodStr=periodStr;
        render();
      };})()); 
      item.appendChild(div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}},[
        span({style:{fontSize:"11px",color:"#64748b"}},periodStr),
        span({style:{fontSize:"12px",fontWeight:700,color:g.done?"#22c55e":"#475569"}},g.done?"✅ 達成":"— 未達成")
      ]));
      item.appendChild(div({style:{fontSize:"13px",color:"#e2e8f0",lineHeight:1.6,marginBottom:g.progress?"6px":"0"}},g.text));

        item.appendChild(div({style:{fontSize:"11px",color:"#64748b",lineHeight:1.6,padding:"6px 8px",background:"#0a1120",borderRadius:"6px"}},g.progress));

async function doFetchWeather(city){
  if(state.viewingBackup)return; // 閲覧中は取得・保存しない
  state.weatherLoading=true;state.weatherError=null;state.weather=[];render();
  try{
    state.weather=await fetchWeatherAPI(city.lat,city.lon);
    state.weatherCity=city;
    try{localStorage.setItem(STORAGE_KEY+"_city",JSON.stringify(city));}catch{}

    // 天気データを日付キーで保存
    const td=todayStr();
    let weatherStore={};
    try{const s=localStorage.getItem(STORAGE_KEY+"_weather");if(s)weatherStore=JSON.parse(s);}catch{}
    weatherStore[td]=state.weather;

    // 90日の境界日を計算
    const cutoff90=new Date();cutoff90.setDate(cutoff90.getDate()-90);
    const cutoff90Str=`${cutoff90.getFullYear()}-${String(cutoff90.getMonth()+1).padStart(2,'0')}-${String(cutoff90.getDate()).padStart(2,'0')}`;

    // 各日付のデータを整理
    Object.keys(weatherStore).forEach(dateKey=>{
      if(dateKey>=cutoff90Str){
        // 90日以内：全時間保持
        return;
      }
      // 90日より前：体調記録のある時間とその前2時間のみ保持
      const scoredHours=state.logs
        .filter(l=>l.dateStr===dateKey&&l.score!=null)
        .map(l=>l.hour);
      if(scoredHours.length===0){
        // 体調記録なし→削除
        delete weatherStore[dateKey];
        return;
      }
      // 保持する時間を計算（記録時間とその前2時間）
      const keepHours=new Set();
      scoredHours.forEach(h=>{
        for(let i=0;i<=2;i++){
          const t=h-i;
          if(t>=0)keepHours.add(t);
        }
      });
      // 不要な時間を削除
      weatherStore[dateKey]=weatherStore[dateKey].filter(w=>keepHours.has(w.hour));
      if(weatherStore[dateKey].length===0) delete weatherStore[dateKey];
    });

    try{localStorage.setItem(STORAGE_KEY+"_weather",JSON.stringify(weatherStore));}catch{}
  }catch(e){
    state.weatherError=e.message;
  }
  state.weatherLoading=false;render();
}

// 日付ユーティリティ
function parseDS(ds){const p=ds.split('-');return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));}
function fmtDS(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function addDays(ds,n){const x=parseDS(ds);x.setDate(x.getDate()+n);return fmtDS(x);}
// その日の朝に起きた睡眠(＝前日の就寝→当日の起床)の時間数。未記録は null
function getNightSleepHours(ds){
  const bed=getDaily(addDays(ds,-1)).bedTime, wake=getDaily(ds).wakeTime;
  if(bed==null||wake==null)return null;
  return (wake-bed+24)%24;
}

// 旧睡眠(sleepStart=就寝/sleepEnd=起床、同日)を新モデル(bedTime=当夜就寝/wakeTime=当朝起床)へ移行
function migrateSleepModel(){
  let migrated=false;
  const byDate=Object.fromEntries(state.dailies.map(d=>[d.dateStr,d]));
  [...state.dailies].forEach(d=>{
    if(d.sleepStart==null && d.sleepEnd==null) return;
    if(d.sleepEnd!=null && d.wakeTime==null) d.wakeTime=d.sleepEnd;   // その朝の起床
    if(d.sleepStart!=null){                                          // その夜の就寝は前日の夜
      const prev=addDays(d.dateStr,-1);
      let pd=byDate[prev];
      if(!pd){ pd={dateStr:prev}; state.dailies.push(pd); byDate[prev]=pd; }
      if(pd.bedTime==null) pd.bedTime=d.sleepStart;
    }
    delete d.sleepStart; delete d.sleepEnd; migrated=true;
  });
  if(migrated){ try{localStorage.setItem(STORAGE_KEY,JSON.stringify({logs:state.logs,dailies:state.dailies}));}catch{} }
}

// 繰り返し予定が指定日にマッチするか
function repeatMatches(ev, dateStr){
  const d=parseDS(dateStr), s=parseDS(ev.startDate);
  if(d<s)return false;
  if(ev.endDate){ const e2=parseDS(ev.endDate); if(d>e2)return false; } // これ以降変更で分割した終了日
  if(ev.exceptions && ev.exceptions.includes(dateStr))return false;     // この予定のみ変更で除外した日
  const t=ev.repeatType;
  if(t==="daily")return true;
  if(t==="w1"||t==="w2"||t==="w3"||t==="w4"){
    const k=parseInt(t.slice(1));
    const wds=(ev.weekdays&&ev.weekdays.length)?ev.weekdays:[s.getDay()];
    if(!wds.includes(d.getDay()))return false;
    // 週間隔は各週の月曜起点で判定（複数曜日でも正しく数える）
    const mon=x=>{const m=new Date(x.getFullYear(),x.getMonth(),x.getDate());m.setDate(m.getDate()-((m.getDay()+6)%7));return m;};
    const weeks=Math.round((mon(d)-mon(s))/(7*86400000));
    return weeks%k===0;
  }
  if(t==="nth"){
    if(d.getDay()!==s.getDay())return false;
    return Math.ceil(d.getDate()/7)===Math.ceil(s.getDate()/7);
  }
  if(t==="monthly")return d.getDate()===s.getDate();
  if(t==="yearly")return d.getMonth()===s.getMonth()&&d.getDate()===s.getDate();
  return false;
}

// 指定日の全予定（単発＋繰り返し展開）
function getEventsForDate(vd){
  const singles=(state.schedule[vd]||[]).map(e=>({...e,isRepeat:false}));
  const repeats=(state.repeatEvents||[]).filter(ev=>repeatMatches(ev,vd)).map(e=>({...e,isRepeat:true}));
  return [...singles,...repeats].sort((a,b)=>(a.startH*60+a.startM)-(b.startH*60+b.startM));
}

// 繰り返しタイプのラベル
function repeatLabel(t, startDate){
  const s=parseDS(startDate);
  const w=WEEKDAYS_JP[s.getDay()];
  const nth=Math.ceil(s.getDate()/7);
  const map={
    daily:"毎日", w1:`毎週${w}曜`, w2:`2週ごと${w}曜`, w3:`3週ごと${w}曜`, w4:`4週ごと${w}曜`,
    nth:`第${nth}${w}曜`, monthly:`毎月${s.getDate()}日`, yearly:`毎年${s.getMonth()+1}/${s.getDate()}`
  };
  return map[t]||"";
}

// TODOタブから「実際の行動」を取得（タイマー＋チェック完了）
// 日跨ぎ対応：予定/実績の絶対分スパン（endNextDay または 終了<開始 で翌日へ延長）
function itemAbsSpan(it){
  let s=(it.startH||0)*60+(it.startM||0);
  let e=(it.endH!=null?it.endH*60+(it.endM||0):s+15);
  if(it.endNextDay) e+=1440;
  if(e<=s) e+=1440;
  return {s,e};
}
// 所有日(vd)に表示する部分：[start, min(1440,end)]
function crossOwnerSeg(it){ const {s,e}=itemAbsSpan(it); if(s>=1440) return null; return {...it, startMin:s, endMin:Math.min(1440,e)}; }
// 翌日にまたがった尾部：[0, end-1440]
function crossTailSeg(it){ const {s,e}=itemAbsSpan(it); if(e<=1440) return null; return {...it, startMin:0, endMin:Math.min(1440,e-1440), _tail:true}; }

function getActualActivities(vd){
  const t=state.todos[vd]||{};
  const acts=[];
  const routines=state.routines||[];
  const routineIds=new Set(routines.flatMap(g=>g.ids));
  TODO_ITEMS.forEach(item=>{
    if(routineIds.has(item.id))return; // ルーティンは後でまとめて1ブロックに
    const d=t[item.id];
    if(!d||d.excluded)return;
    if(item.multi&&d.sessions){
      d.sessions.forEach(s=>{
        if(s.startTime&&s.endTime){
          const st=new Date(s.startTime),et=new Date(s.endTime);
          acts.push({title:item.label,startMin:st.getHours()*60+st.getMinutes(),endMin:et.getHours()*60+et.getMinutes()});
        }
      });
    } else if(item.type==="timer"&&d.startTime&&d.endTime){
      const st=new Date(d.startTime),et=new Date(d.endTime);
      acts.push({title:item.label,startMin:st.getHours()*60+st.getMinutes(),endMin:et.getHours()*60+et.getMinutes()});
    } else if(item.type==="check"&&d.checked&&d.time){
      const ct=new Date(d.time);
      acts.push({title:"✓"+item.label,startMin:ct.getHours()*60+ct.getMinutes(),endMin:ct.getHours()*60+ct.getMinutes()+12,isPoint:true});
    }
  });
  // ルーティンは1ブロックにまとめて表示（完了項目の最早〜最遅時刻）
  // 日付をまたぐのを防ぐため、そのページ(vd)と同じ日付に記録されたものだけ集約
  const mm=dt=>{const x=new Date(dt);return x.getHours()*60+x.getMinutes();};
  const sameDay=iso=>{try{return fmtDS(new Date(iso))===vd;}catch{return false;}};
  routines.forEach(g=>{
    const mins=[];
    const addMin=iso=>{ if(iso&&sameDay(iso)) mins.push(mm(iso)); };
    (g.ids||[]).forEach(id=>{
      const d=t[id];
      if(!d||d.excluded)return;
      if(d.checked&&d.time) addMin(d.time);
      addMin(d.startTime);
      addMin(d.endTime);
      (d.sessions||[]).forEach(s=>{ addMin(s.startTime); addMin(s.endTime); });
    });
    if(mins.length){
      const s=Math.min(...mins), e=Math.max(...mins);
      acts.push({title:g.title, startMin:s, endMin:Math.max(e, s+16), color:g.color});
    }
  });
  // アルコール記録も実際の行動として反映（琥珀色で区別）
  const daily=getDaily(vd);
  (daily.drinks||[]).forEach(dr=>{
    const dt=resolveDT(dr);
    const sMin=(dr.hour||0)*60+(dr.min||0);
    acts.push({title:`${dt.emoji}${dt.label}`,startMin:sMin,endMin:sMin+12,isPoint:true,color:"#f59e0b"});
  });
  // 睡眠：就寝日(D)を1つの夜として bed(D)→wake(D+1) を span&clip で反映
  // （その日の就寝と、翌朝の起床。就寝が早朝<12なら翌日就寝として扱う）
  {
    const SC="#60a5fa";
    for(let off=-1; off<=0; off++){
      const D=addDays(vd,off);
      const bed=getDaily(D).bedTime, wake=getDaily(addDays(D,1)).wakeTime;
      if(bed==null && wake==null) continue;
      let bedAbs = bed!=null ? ((bed<12?off+1:off)*1440 + bed*60) : null;
      let wakeAbs= wake!=null ? ((off+1)*1440 + wake*60) : null;
      if(bedAbs==null) bedAbs=wakeAbs-480;   // 就寝未記録→8h仮定
      if(wakeAbs==null) wakeAbs=bedAbs+480;   // 起床未記録→8h仮定
      const s=Math.max(0,Math.round(bedAbs)), e=Math.min(1440,Math.round(wakeAbs));
      if(e>s) acts.push({title:"😴 睡眠",startMin:s,endMin:e,color:SC});
    }
  }
  // 昼寝も反映
  (daily.naps||[]).forEach(n=>{
    const s=(n.hour||0)*60+(n.min||0);
    let e=n.endHour!=null?(n.endHour*60+(n.endMin||0)):s+(n.mins||30);
    if(e<=s)e=s+(n.mins||30);
    acts.push({title:"💤 昼寝",startMin:s,endMin:e,color:"#93c5fd"});
  });
  // 射精も実際の行動として反映（ピンクで区別・点イベント）
  (daily.ejaculations||[]).forEach(ej=>{
    const s=(ej.hour||0)*60+(ej.min||0);
    acts.push({title:`💧 射精${ej.tag?"("+ej.tag+")":""}`,startMin:s,endMin:s+12,isPoint:true,color:"#ec4899"});
  });
  // 日記で記録した実際の勤務は実際(右)列に反映（予定シフトとは独立）
  if(daily.workStart!=null&&daily.workEnd!=null){
    const ws=Math.round(daily.workStart*60);
    let we=Math.round((daily.workEnd+(daily.overtime||0))*60);
    if(we>1440)we=1440;
    if(we>ws) acts.push({title:"💼 仕事",startMin:ws,endMin:we,color:"#2dd4bf"});
  }
  // たまにやること（カスタムTODO）チェック済みも実際列へ（既存チェックと同じ）
  dueCustomTodos(vd).forEach(ct=>{
    const rec=(state.todos[vd]||{})[ct.uid];
    if(rec&&rec.checked){
      let mins=null;
      if(rec.time){ const t2=new Date(rec.time); mins=t2.getHours()*60+t2.getMinutes(); }
      else { const tt=customTodoTimeFor(ct,vd); if(tt)mins=tt.h*60+tt.m; }
      if(mins!=null) acts.push({title:"✓"+ct.label,startMin:mins,endMin:mins+12,isPoint:true,color:ct.color||"#22c55e"});
    }
  });
  // 手動登録した実績（予定外・突発的な行動を含む）。日跨ぎは当日側を末尾までクリップ
  (daily.actuals||[]).forEach(a=>{
    const {s,e}=itemAbsSpan(a);
    if(s>=1440)return;
    acts.push({title:(a.unplanned?"⚡ ":"")+a.title,startMin:s,endMin:Math.min(1440,e),color:a.color||"#f472b6",manualUid:a.uid,unplanned:!!a.unplanned});
  });
  return acts.sort((a,b)=>a.startMin-b.startMin);
}

// 左（予定）列に出すパターン由来のブロック（シフト計画＋パターン予定）
function getPlannedExtras(vd){
  const out=[];
  const sk=getPlanShiftKey(vd);
  // シフト計画（パターン or 予定上書き・カスタム時刻）を予定(左)へ。実績(workStart)とは独立
  const sb=getPlanShiftBlock(vd);
  if(sb){
    out.push({title:`💼 ${sb.label}`,color:sb.color,startH:sb.startH,startM:sb.startM,endH:sb.endH,endM:sb.endM,isPattern:true,shiftBlock:true});
  }
  // パターン予定（睡眠など）。シフト連動なら当日のシフトで時間が変わる。0時またぎは分割
  // 日をまたぐ睡眠などは「就寝する日」を1つの夜として扱う：
  //  ・今夜(vd)の就寝→24時 は vd のシフトで
  //  ・今朝(vd)の起床(0時→) は【前日】の夜から継続 → 前日のシフトで描画
  // 各パターンを「所有する日(D)」ごとに絶対時間帯で計算し、表示日(vd)に切り出す（span & clip）。
  //  ・翌日フラグ(nextDay)で、その日の睡眠を翌日にずらせる（2直明けの睡眠など）
  //  ・終了<開始 は0時またぎ（翌朝まで）として扱う
  //  ・1つの夜=1つの所有日、なので境目で重複・欠落が起きない
  const addD=(ds,n)=>{const x=parseDS(ds);x.setDate(x.getDate()+n);return fmtDS(x);};
  (state.planPatterns||[]).forEach(p=>{
    if(p.enabled===false)return;
    for(let off=-2; off<=0; off++){
      const D=addD(vd,off);
      const t=patternTimesFor(p,D);
      if(!t)continue;
      const base=off+(t.nextDay?1:0);                 // vd基準の日数（この夜の開始日）
      let startAbs=base*1440+t.sH*60+(t.sM||0);
      let endAbs  =base*1440+t.eH*60+(t.eM||0);
      if(endAbs<=startAbs)endAbs+=1440;               // 0時またぎ
      const s=Math.max(0,startAbs), e=Math.min(1440,endAbs);
      if(e<=s)continue;                                // vd に掛からない
      const ovObj=(getDaily(D).patternOv||{})[p.uid];
      out.push({title:p.title,color:p.color||"#38bdf8",startH:Math.floor(s/60),startM:s%60,endH:Math.floor(e/60),endM:e%60,
        isPattern:true,patternUid:p.uid,oSH:t.sH,oSM:t.sM,oEH:t.eH,oEM:t.eM,oNext:!!t.nextDay,ovDate:D,ovDay:!!(ovObj&&ovObj.startH!=null)});
    }
  });
  // たまにやること（カスタムTODO）で時刻設定があるものは、その日の予定(左)に表示
  dueCustomTodos(vd).forEach(ct=>{
    const tt=customTodoTimeFor(ct,vd); if(!tt)return;
    const s=tt.h*60+tt.m, e=Math.min(1440,s+12);
    out.push({title:`☑️ ${ct.label}`,color:ct.color||"#38bdf8",startH:Math.floor(s/60),startM:s%60,endH:Math.floor(e/60),endM:e%60,customTodo:true});
  });
  return out;
}
// パターンpの指定日dsでの時刻 {sH,sM,eH,eM,nextDay}。非表示/対象外は null
function patternTimesFor(p,ds){
  if(!p||p.enabled===false)return null;
  const ov=(getDaily(ds).patternOv||{})[p.uid];
  if(ov&&ov.hidden)return null;
  if(ov&&ov.startH!=null) return {sH:ov.startH,sM:ov.startM||0,eH:ov.endH,eM:ov.endM||0,nextDay:!!ov.nextDay};
  const dow=parseDS(ds).getDay();
  if(Array.isArray(p.weekdays)&&p.weekdays.length&&!p.weekdays.includes(dow))return null;
  // 曜日別の時間上書き：設定された曜日はシフト連動/固定の基本時刻より優先。
  // 各曜日上書きはさらに「直で分ける」ことができ、その場合は当日のシフトで時間が変わる。
  const wt=(p.weekdayTimes||{})[dow];
  if(wt){
    if(wt.byShift){
      const dshift=getPlanShiftKey(ds)||"off";
      const st=(wt.shiftTimes||{})[dshift];
      if(st&&st.on!==false&&st.startH!=null) return {sH:st.startH,sM:st.startM||0,eH:st.endH,eM:st.endM||0,nextDay:!!st.nextDay};
      return null; // その直は非表示指定
    }
    if(wt.startH!=null) return {sH:wt.startH,sM:wt.startM||0,eH:wt.endH,eM:wt.endM||0,nextDay:!!wt.nextDay};
  }
  if(p.byShift){
    const dshift=getPlanShiftKey(ds)||"off";
    const st=(p.shiftTimes||{})[dshift];
    if(!st||st.on===false)return null;
    return {sH:st.startH,sM:st.startM||0,eH:st.endH,eM:st.endM||0,nextDay:!!st.nextDay};
  }
  return {sH:p.startH,sM:p.startM||0,eH:p.endH,eM:p.endM||0,nextDay:!!p.nextDay};
}

function timeField(getH,getM,setHM){
  const inp=document.createElement('input');inp.type='time';
  const clamp=n=>Math.max(0,Math.min(23,n|0));
  inp.value=`${String(clamp(getH())).padStart(2,'0')}:${String(getM()||0).padStart(2,'0')}`;
  inp.style.cssText="flex:1;min-width:0;padding:9px 10px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:15px;font-family:inherit;color-scheme:dark";

  return inp;
}
