let toastTimer=null;
function showToast(msg, color="#22c55e"){
  const el=document.getElementById('toast');
  if(!el)return;
  el.textContent=msg;
  el.style.borderColor=color;
  el.style.color=color;
  el.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}

function showConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  if(!canvas)return;
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const ctx=canvas.getContext('2d');
  const pieces=Array.from({length:120},()=>({
    x:Math.random()*canvas.width,
    y:-10-Math.random()*100,
    w:8+Math.random()*8,
    h:4+Math.random()*4,
    r:Math.random()*Math.PI*2,
    vx:(Math.random()-0.5)*4,
    vy:3+Math.random()*4,
    vr:(Math.random()-0.5)*0.2,
    color:`hsl(${Math.floor(Math.random()*360)},90%,60%)`
  }));
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);
      ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;p.vy+=0.05;
    });
    frame++;
    if(frame<120)requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

// LocalStorage容量チェック・アーカイブ
// ═══════════════════════════════════════════════════
function getStorageUsage(){
  let total=0;
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    const v=localStorage.getItem(k)||"";
    total+=k.length+v.length;
  }
  // 推定上限5MB（5,242,880文字）
  const limit=5*1024*1024/2; // UTF-16で2バイト/文字
  return {used:total,limit,pct:Math.round((total/limit)*100)};
}

function checkStorageAndAlert(){
  const {pct}=getStorageUsage();
  if(pct>=90){state.storageAlert=true;render();}
}

// アーカイブ対象の年リストを取得
function getArchiveYears(){
  const thisYear=new Date().getFullYear();
  const years=new Set();
  state.logs.forEach(l=>{const y=parseInt(l.dateStr.slice(0,4));if(y<thisYear)years.add(y);});
  state.dailies.forEach(d=>{const y=parseInt(d.dateStr.slice(0,4));if(y<thisYear)years.add(y);});
  return [...years].sort().reverse();
}

function exportAndDeleteYear(year){
  const yStr=String(year);
  // 対象データを抽出
  const logs=state.logs.filter(l=>l.dateStr.startsWith(yStr));
  const dailies=state.dailies.filter(d=>d.dateStr.startsWith(yStr));
  const todos={};
  Object.keys(state.todos).forEach(k=>{if(k.startsWith(yStr))todos[k]=state.todos[k];});
  let weather={};
  try{const s=localStorage.getItem(STORAGE_KEY+"_weather");if(s){const w=JSON.parse(s);Object.keys(w).forEach(k=>{if(k.startsWith(yStr))weather[k]=w[k];});}}catch{}

  // エクスポート
  const archive={year,logs,dailies,todos,weather,exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(archive,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");
  a.href=url;a.download=`health_archive_${year}.json`;a.click();URL.revokeObjectURL(url);

  // 削除
  state.logs=state.logs.filter(l=>!l.dateStr.startsWith(yStr));
  state.dailies=state.dailies.filter(d=>!d.dateStr.startsWith(yStr));
  Object.keys(state.todos).forEach(k=>{if(k.startsWith(yStr))delete state.todos[k];});
  try{
    const s=localStorage.getItem(STORAGE_KEY+"_weather");
    if(s){const w=JSON.parse(s);Object.keys(w).forEach(k=>{if(k.startsWith(yStr))delete w[k];});localStorage.setItem(STORAGE_KEY+"_weather",JSON.stringify(w));}
  }catch{}
  saveStorage();
  state.storageAlert=false;render();
}

function renderStorageAlertModal(){
  const {used,limit,pct}=getStorageUsage();
  const usedMB=(used*2/1024/1024).toFixed(1);
  const limitMB=(limit*2/1024/1024).toFixed(0);
  const years=getArchiveYears();
  if(!state.storageExportYear&&years.length>0)state.storageExportYear=years[0];

  const bg=div({className:"modal-center"});
  const m=div({className:"modal-box"});
  bg.addEventListener('click',e=>e.stopPropagation());
  m.addEventListener('click',e=>e.stopPropagation());

  // 警告ヘッダー
  m.appendChild(div({style:{fontSize:"28px",textAlign:"center",marginBottom:"8px"}},"⚠️"));
  m.appendChild(div({style:{fontSize:"16px",fontWeight:700,color:"#f97316",textAlign:"center",marginBottom:"8px"}},"ストレージ残量が少なくなっています"));

  // 使用量バー
  m.appendChild(div({style:{marginBottom:"16px"}},[
    div({style:{display:"flex",justifyContent:"space-between",fontSize:"11px",color:"#64748b",marginBottom:"4px"}},[
      span({},`使用中: ${usedMB}MB`),
      span({},`上限: ${limitMB}MB (${pct}%)`)
    ]),
    div({style:{height:"8px",background:"#0f172a",borderRadius:"4px",overflow:"hidden"}},[
      div({style:{height:"100%",width:`${Math.min(pct,100)}%`,background:pct>=95?"#ef4444":"#f97316",borderRadius:"4px"}})
    ])
  ]));

  m.appendChild(div({style:{fontSize:"12px",color:"#94a3b8",marginBottom:"12px",lineHeight:1.6}},"過去のデータをアーカイブしてストレージを解放してください。エクスポートしたファイルはバックアップとして保存できます。"));

  if(years.length===0){
    m.appendChild(div({style:{fontSize:"12px",color:"#475569",textAlign:"center",padding:"12px 0"}},"アーカイブできるデータがありません（今年のデータのみ）"));
  } else {
    // 年選択
    m.appendChild(div({style:{fontSize:"11px",color:"#64748b",marginBottom:"6px"}},"エクスポートする年"));
    const sel=document.createElement('select');
    sel.style.cssText="width:100%;padding:9px 12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:14px;font-family:inherit;margin-bottom:8px";
    years.forEach(y=>{
      const o=document.createElement('option');o.value=y;
      const logCount=state.logs.filter(l=>l.dateStr.startsWith(String(y))).length;
      o.textContent=`${y}年（体調記録${logCount}件）`;
      if(y===state.storageExportYear)o.selected=true;
      sel.appendChild(o);
    });
    sel.addEventListener('change',e=>{state.storageExportYear=parseInt(e.target.value);});
    m.appendChild(sel);

    // エクスポート＋削除ボタン
    m.appendChild(btn({style:{width:"100%",padding:"10px",background:"linear-gradient(135deg,#f97316,#ef4444)",border:"none",borderRadius:"8px",color:"#fff",fontSize:"13px",fontWeight:600,cursor:"pointer",marginBottom:"8px"},
      onClick:()=>{
        if(!state.storageExportYear)return;
        if(!confirm(`${state.storageExportYear}年のデータをエクスポートして削除しますか？\nエクスポートしたファイルは必ず保存してください。`))return;
        exportAndDeleteYear(state.storageExportYear);
      }},`📦 ${state.storageExportYear}年をエクスポートして削除`));
  }

  // 閉じる
  m.appendChild(btn({className:"btn-ghost",style:{width:"100%"},onClick:()=>{state.storageAlert=false;render();}},"後で対応する"));
  bg.appendChild(m);return bg;
}

// ── シフトパターン（勤務の週間繰り返し）──
const SHIFT_TYPES = {
  s1:  {label:"1直", start:7.5,  end:16, color:"#38bdf8"},
  s2:  {label:"2直", start:14.5, end:23, color:"#a78bfa"},

// 直近の月曜日(YYYY-MM-DD)
function mondayStr(ds){
  const d=parseDS(ds); d.setDate(d.getDate()-((d.getDay()+6)%7));
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
// 既定パターン：2週交代（1週目=平日1直、2週目=平日2直、土日休み）
function defaultShiftPattern(){
  return {
    enabled:false,
    weeks:2,
    anchorMonday:mondayStr(todayStr()),
    grid:[
      ["s1","s1","s1","s1","s1","off","off"],
      ["s2","s2","s2","s2","s2","off","off"],
    ],
  };
}
function saveShiftPattern(){ try{localStorage.setItem(STORAGE_KEY+"_shift",JSON.stringify(state.shiftPattern));}catch{} }
// 指定日のパターン上のシフトキー（s1/s2/off）を返す。無効・範囲外はnull
function getPatternShift(ds){
  const sp=state.shiftPattern;
  if(!sp||!sp.enabled||!Array.isArray(sp.grid)||!sp.grid.length)return null;
  const weeks=sp.weeks||sp.grid.length;
  const anchor=parseDS(sp.anchorMonday||mondayStr(todayStr()));
  const thisMon=parseDS(mondayStr(ds));
  const wDiff=Math.round((thisMon-anchor)/(7*86400000));
  const cycleWeek=((wDiff%weeks)+weeks)%weeks;
  const dow=(parseDS(ds).getDay()+6)%7; // 月=0
  const row=sp.grid[cycleWeek]||sp.grid[cycleWeek%sp.grid.length];
  return row?(row[dow]||null):null;
}
// 指定日の勤務（手動優先→パターン）。{start,end,overtime,manual,key}
function getWorkForDate(ds){
  const d=getDaily(ds);
  if(d.shiftManual) return {start:d.workStart??null,end:d.workEnd??null,overtime:d.overtime||0,manual:true};
  if(d.workStart!=null||d.workEnd!=null) return {start:d.workStart??null,end:d.workEnd??null,overtime:d.overtime||0,manual:true};
  const key=getPatternShift(ds);
  if(key==null) return {start:null,end:null,overtime:0,manual:false};
  const sh=SHIFT_TYPES[key]||SHIFT_TYPES.off;
  return {start:sh.start,end:sh.end,overtime:0,manual:false,key};
}
// 指定日の現在シフトキー（表示用。手動→時間から判定、無ければパターン）
function currentShiftKey(ds){
  const w=getWorkForDate(ds);
  if(w.key)return w.key;
  if(w.start==null&&w.end==null)return w.manual?"off":null; // 手動休み or 未設定
  if(w.start!=null&&w.start<12)return "s1";
  if(w.start!=null)return "s2";
  return null;
}
// その日のシフトを設定（手動上書き）。key=null でパターンに戻す
function setDayShift(ds,key){
  if(key==null){ setDaily(ds,{workStart:null,workEnd:null,shiftManual:false}); return; }
  const sh=SHIFT_TYPES[key]; if(!sh)return;
  setDaily(ds,{workStart:sh.start,workEnd:sh.end,overtime:0,shiftManual:true});
}

// ─── Open-Meteo 天気取得 ──────────────────────────
async function fetchWeatherAPI(lat, lon){
  const url = `https://api.open-meteo.com/v1/forecast`
    + `?latitude=${lat}&longitude=${lon}`
    + `&hourly=temperature_2m,relative_humidity_2m,surface_pressure,weather_code`
    + `&timezone=Asia%2FTokyo&forecast_days=1`;
  const res = await fetch(url);
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  const h = data.hourly;
  const today = todayStr();
  const humidity = h.relative_humidity_2m || h.relativehumidity_2m || [];
  const wcode    = h.weather_code || h.weathercode || [];
  return h.time.map((t,i) => ({
    hour:        new Date(t).getHours(),
    date:        t.slice(0,10),
    temp:        h.temperature_2m[i]   != null ? Math.round(h.temperature_2m[i]*10)/10   : null,
    humidity:    humidity[i]            != null ? humidity[i]                              : null,
    pressure:    h.surface_pressure[i] != null ? Math.round(h.surface_pressure[i]*10)/10 : null,
    weatherCode: wcode[i]              != null ? wcode[i]                                 : null,
  })).filter(r => r.date === today);
}

const pureAlcohol = (ml,pct) => ml*(pct/100)*0.8;
const resolveDT = d => (d.drinkType?.pct ? d.drinkType : DRINK_TYPES.find(t=>t.id===d.id)||DRINK_TYPES[0]);

function calcBAC(drinks, wKg, sex, nowMin){
  const r = sex==="f"?0.55:0.68;
  return Math.max(0, drinks.reduce((bac,d)=>{
    if(nowMin<d.startMin)return bac;
    const peak = d.alcoholG/(wKg*r);
    const done = d.endMin+15;
    if(nowMin<=done) return bac+peak*Math.min(1,(nowMin-d.startMin)/Math.max(1,done-d.startMin));
    return bac+Math.max(0,peak-0.15*((nowMin-done)/60));
  },0));
}
function bacLevel(b){
  if(b>=1.5)return{label:"危険⚠️",color:"#ef4444",bg:"#3f0000"};
  if(b>=0.8)return{label:"酩酊",  color:"#f97316",bg:"#2d1500"};
  if(b>=0.5)return{label:"ほろ酔い",color:"#eab308",bg:"#2d2200"};
  if(b>=0.2)return{label:"爽快期",color:"#22c55e",bg:"#002d10"};
  return          {label:"ほぼ素面",color:"#38bdf8",bg:"#00162d"};
}

function migrateOldSchedule(){
  let migrated=false;
  // 単発予定: events{ds:[{uid,title,sH,sM,eH,eM}]} → schedule{ds:[{...startH,startM,endH,endM,color}]}
  if(state.events && Object.keys(state.events).length){
    Object.keys(state.events).forEach(ds=>{
      state.schedule[ds]=(state.events[ds]||[]).map(e=>({
        uid:e.uid, title:e.title,
        startH:e.sH, startM:e.sM||0, endH:e.eH, endM:e.eM||0,
        color:"#38bdf8"
      }));
    });
    migrated=true;
  }
  // やること＋やりたいこと を統合して tasks.todo（優先度フラグ付き）へ
  const todo=[];
  (state.taskList||[]).forEach(t=>todo.push({uid:t.uid,text:t.text,done:!!t.done,imp:false,urg:false}));
  (state.wishList||[]).forEach(t=>todo.push({uid:t.uid,text:t.text,done:!!t.done,imp:false,urg:false}));
  if(todo.length){state.tasks.todo=todo;migrated=true;}
  // 買物
  if((state.shopList||[]).length){
    state.tasks.shopping=(state.shopList||[]).map(t=>({uid:t.uid,text:t.text,done:!!t.done}));
    migrated=true;
  }
  if(migrated){
    try{
      localStorage.setItem(STORAGE_KEY+"_schedule",JSON.stringify(state.schedule));
      localStorage.setItem(STORAGE_KEY+"_repeat",JSON.stringify(state.repeatEvents));
      localStorage.setItem(STORAGE_KEY+"_tasks",JSON.stringify(state.tasks));
    }catch{}
  }
}

function h(tag,attrs,children){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(v==null)continue;
    if(k==='style'&&typeof v==='object'){Object.assign(el.style,v);}
    else if(k.startsWith('on')&&typeof v==='function'){el.addEventListener(k.slice(2).toLowerCase(),v);}
    else if(k==='className'){el.className=v;}
    else{el.setAttribute(k,String(v));}
  }
  const flat=[].concat(children||[]).flat(Infinity);
  for(const c of flat){
    if(c==null||c===false||c===undefined)continue;
    if(typeof c==='string'||typeof c==='number'){
      el.appendChild(document.createTextNode(String(c)));
    } else if(c instanceof Node){
      el.appendChild(c);
    }
    // それ以外（boolean等）は無視
  }
  return el;
}
function div(attrs,children){return h('div',attrs,children);}
function btn(attrs,children){return h('button',attrs,children);}
function span(attrs,children){return h('span',attrs,children);}

// ═══════════════════════════════════════════════════
// BACグラフ（Canvas）
// ═══════════════════════════════════════════════════
function renderBACChart(drinks, showCurrent, nowMinPassed){
  const H=140;
  const PX_PER_MIN=4;
  const YW=36; // 縦軸幅

  if(!drinks.length){
    const canvas=document.createElement('canvas');
    const W=Math.min(window.innerWidth-32,560);
    canvas.width=W;canvas.height=H;
    canvas.style.cssText=`width:100%;height:${H}px;display:block;background:#0a1120;border-radius:8px;`;
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='#475569';ctx.font='13px system-ui';ctx.textAlign='center';
    ctx.fillText('飲み物を追加するとグラフが表示されます',W/2,H/2);
    return canvas;
  }

  const nowMin=nowMinPassed;
  const dd=drinks.map(d=>{
    let startMin=d.hour*60+(d.min||0);
    if(d.startNextDay) startMin+=1440;
    let endMin=d.endHour!=null?d.endHour*60+(d.endMin||0):startMin+20;
    if(d.startNextDay && d.endHour!=null) endMin+=1440;
    // 終了が開始より前は+24h補正
    if(endMin<startMin) endMin+=1440;
    return {uid:d.uid, startMin, endMin, alcoholG:pureAlcohol(d.ml,d.drinkType.pct)};
  });
  const firstMin=Math.min(...dd.map(d=>d.startMin));
  const lastDrinkEnd=Math.max(...dd.map(d=>d.endMin||d.startMin+60));
  const refMin=showCurrent?Math.max(nowMin,lastDrinkEnd):lastDrinkEnd;
  const chartStart=Math.max(0,Math.min(firstMin,showCurrent?nowMin:firstMin)-60);
  let chartEnd=chartStart+8*60;
  for(let t=firstMin;t<=firstMin+14*60;t+=10){
    if(calcBAC(dd,60,'m',t)<=0.02){chartEnd=t+60;break;}
  }
  chartEnd=Math.max(chartEnd,refMin+120);
  const totalMin=chartEnd-chartStart;

  const curBac=showCurrent?calcBAC(dd,60,'m',nowMin):0;
  const maxBac=Math.max(0.3,...Array.from({length:50},(_,i)=>calcBAC(dd,60,'m',chartStart+totalMin*(i/49))));

  const PT=14,PB=24,cH=H-PT-PB;
  const yS=b=>PT+cH-(b/maxBac)*cH;
  const yLevels=[0.2,0.5,0.8,1.0].filter(v=>v<=maxBac+0.05);

  // ── 縦軸Canvas（固定）──
  const yCanvas=document.createElement('canvas');
  yCanvas.width=YW;yCanvas.height=H;
  yCanvas.style.cssText=`display:block;flex-shrink:0;height:${H}px;background:#0a1120;`;
  const yCtx=yCanvas.getContext('2d');
  yCtx.fillStyle='#0a1120';yCtx.fillRect(0,0,YW,H);
  yLevels.forEach(v=>{
    yCtx.fillStyle=v>=0.8?'#ef4444':'#64748b';
    yCtx.font='9px system-ui';yCtx.textAlign='right';
    yCtx.fillText(v.toFixed(1),YW-4,yS(v)+3);
    yCtx.strokeStyle='#334155';yCtx.lineWidth=1;
    yCtx.beginPath();yCtx.moveTo(YW-2,yS(v));yCtx.lineTo(YW,yS(v));yCtx.stroke();
  });
  // 縦軸ライン
  yCtx.strokeStyle='#334155';yCtx.lineWidth=1;
  yCtx.beginPath();yCtx.moveTo(YW-1,PT);yCtx.lineTo(YW-1,PT+cH);yCtx.stroke();
  // hPaラベル
  yCtx.fillStyle='#334155';yCtx.font='8px system-ui';yCtx.textAlign='right';
  yCtx.fillText('‰',YW-4,PT-3);

  // ── グラフCanvas（スクロール）──
  const GW=Math.max(Math.min(window.innerWidth-32-YW,560-YW), totalMin*PX_PER_MIN+8);
  const PR=8;
  const cW=GW-PR;
  const xG=t=>((t-chartStart)/totalMin)*cW;

  const canvas=document.createElement('canvas');
  canvas.width=GW;canvas.height=H;
  canvas.style.cssText=`display:block;height:${H}px;`;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#0a1120';ctx.fillRect(0,0,GW,H);

  // グリッド横線
  yLevels.forEach(v=>{
    ctx.strokeStyle=v>=0.8?'#ef444455':'#1e3a5f88';
    ctx.lineWidth=v>=0.8?1.2:0.6;
    ctx.setLineDash(v>=0.8?[5,3]:[3,6]);
    ctx.beginPath();ctx.moveTo(0,yS(v));ctx.lineTo(cW,yS(v));ctx.stroke();
    ctx.setLineDash([]);
  });

  // エリア
  const STEPS=100;
  ctx.beginPath();
  ctx.moveTo(xG(chartStart),yS(0));
  for(let i=0;i<=STEPS;i++){
    const t=chartStart+totalMin*(i/STEPS);
    ctx.lineTo(xG(t),yS(calcBAC(dd,60,'m',t)));
  }
  ctx.lineTo(xG(chartEnd),yS(0));ctx.closePath();
  const grad=ctx.createLinearGradient(0,PT,0,PT+cH);
  grad.addColorStop(0,'rgba(249,115,22,0.5)');grad.addColorStop(1,'rgba(249,115,22,0.02)');
  ctx.fillStyle=grad;ctx.fill();

  // ライン
  ctx.strokeStyle='#f97316';ctx.lineWidth=2;ctx.setLineDash([]);
  ctx.beginPath();
  for(let i=0;i<=STEPS;i++){
    const t=chartStart+totalMin*(i/STEPS);
    i===0?ctx.moveTo(xG(t),yS(calcBAC(dd,60,'m',t))):ctx.lineTo(xG(t),yS(calcBAC(dd,60,'m',t)));
  }
  ctx.stroke();

  // 飲み始め/終わりマーカー
  dd.forEach((d,i)=>{
    ctx.fillStyle='#eab308';
    ctx.beginPath();ctx.arc(xG(d.startMin),PT+cH-5,4,0,Math.PI*2);ctx.fill();
    if(drinks[i]?.endHour!=null){
      ctx.strokeStyle='#a78bfa';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
      ctx.beginPath();ctx.moveTo(xG(d.endMin),PT);ctx.lineTo(xG(d.endMin),PT+cH);ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='#a78bfa';
      ctx.beginPath();ctx.arc(xG(d.endMin),PT+cH-5,4,0,Math.PI*2);ctx.fill();
    }
  });

  // NOW（現在BAC表示時のみ）
  if(showCurrent&&nowMin>=chartStart&&nowMin<=chartEnd){
    const nx=xG(nowMin),ny=yS(curBac);
    ctx.strokeStyle='#38bdf8';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(nx,PT);ctx.lineTo(nx,PT+cH);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(56,189,248,0.2)';ctx.beginPath();ctx.arc(nx,ny,9,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#38bdf8';ctx.beginPath();ctx.arc(nx,ny,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#38bdf8';ctx.font='bold 9px system-ui';ctx.textAlign='left';ctx.fillText('NOW',nx+7,PT+12);
  }

  // X軸ラベル
  const step=totalMin<=300?30:60;
  ctx.fillStyle='#64748b';ctx.font='9px system-ui';ctx.textAlign='center';
  for(let t=Math.ceil(chartStart/step)*step;t<=chartEnd;t+=step){
    ctx.fillText(`${Math.floor(t/60)%24}:${String(t%60).padStart(2,'0')}`,xG(t),H-5);
  }

  // X軸ライン
  ctx.strokeStyle='#334155';ctx.lineWidth=1;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(0,PT+cH);ctx.lineTo(cW,PT+cH);ctx.stroke();

  // スクロールコンテナ
  const scrollWrap=document.createElement('div');
  scrollWrap.style.cssText=`overflow-x:scroll;overflow-y:hidden;-webkit-overflow-scrolling:touch;touch-action:pan-x;flex:1;background:#0a1120;`;
  scrollWrap.appendChild(canvas);

  // 縦軸＋スクロールを横並びに
  const container=document.createElement('div');
  container.style.cssText=`display:flex;background:#0a1120;border-radius:8px;overflow:hidden;`;
  container.appendChild(yCanvas);
  container.appendChild(scrollWrap);

  if(showCurrent){
    requestAnimationFrame(()=>{
      const nx=xG(nowMin);
      scrollWrap.scrollLeft=Math.max(0,nx-scrollWrap.clientWidth/2);
    });
  }

  return container;
}

let headerMounted = false;

function getGoalKey(type, dateStr){
  const p=dateStr.split('-');
  const y=parseInt(p[0]),m=parseInt(p[1]),d2=parseInt(p[2]);
  switch(type){
    case 'daily': return `daily_${dateStr}`;
    case 'weekly':{
      const n=new Date(y,m-1,d2);const day=n.getDay();
      const diff=day===0?-6:1-day;n.setDate(n.getDate()+diff);
      return `weekly_${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
    }
    case 'monthly': return `monthly_${y}-${String(m).padStart(2,'0')}`;
    case 'quarterly':{
      const q=Math.ceil(m/3);return `quarterly_${y}-Q${q}`;
    }
    case 'yearly': return `yearly_${y}`;
  }
}

function getGoal(type, dateStr){
  return state.goals[getGoalKey(type,dateStr)]||{text:"",done:false,progress:""};
}

function setGoal(type, dateStr, data){
  const key=getGoalKey(type,dateStr);
  state.goals[key]={...getGoal(type,dateStr),...data};
  try{localStorage.setItem(STORAGE_KEY+"_goals",JSON.stringify(state.goals));}catch{}
  render();
}

function goalPeriodLabel(type, dateStr){
  const p=dateStr.split('-');
  const y=parseInt(p[0]),m=parseInt(p[1]);
  switch(type){
    case 'daily': return new Date(...p.map((v,i)=>i===1?parseInt(v)-1:parseInt(v))).toLocaleDateString("ja-JP",{month:"short",day:"numeric",weekday:"short"});
    case 'weekly':{
      const key=getGoalKey('weekly',dateStr);
      const mon=key.replace('weekly_','');
      const mp=mon.split('-');const monD=new Date(parseInt(mp[0]),parseInt(mp[1])-1,parseInt(mp[2]));
      const sunD=new Date(monD);sunD.setDate(sunD.getDate()+6);
      return `${monD.getMonth()+1}/${monD.getDate()}〜${sunD.getMonth()+1}/${sunD.getDate()}`;
    }
    case 'monthly': return `${y}年${m}月`;
    case 'quarterly':{const q=Math.ceil(m/3);return `${y}年 Q${q}`;}
    case 'yearly': return `${y}年`;
  }
}

function renderGoalHistory(vd){
  const type=state.goalHistoryType;
  const LABELS={yearly:"年間目標",quarterly:"四半期目標",monthly:"月次目標",weekly:"週間目標",daily:"一日目標"};
  const ICONS ={yearly:"🏆",quarterly:"📅",monthly:"🗓️",weekly:"📆",daily:"☀️"};

  // 過去の目標キーを収集
  const prefix={yearly:"yearly_",quarterly:"quarterly_",monthly:"monthly_",weekly:"weekly_",daily:"daily_"}[type];
  const keys=Object.keys(state.goals).filter(k=>k.startsWith(prefix)).sort().reverse();

  const bg=div({className:"modal-bg"});
  const m=div({className:"modal",style:{maxHeight:"85vh",overflow:"hidden",display:"flex",flexDirection:"column"}});
  bg.addEventListener('click',()=>{state.goalHistoryType=null;render();});
  m.addEventListener('click',e=>e.stopPropagation());

  // ヘッダー
  m.appendChild(div({style:{width:"36px",height:"4px",background:"#334155",borderRadius:"4px",margin:"0 auto 12px"}}));
  m.appendChild(div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}},[
    div({style:{fontSize:"15px",fontWeight:700,color:"#e2e8f0"}},`${ICONS[type]} ${LABELS[type]} 履歴`),
    btn({style:{background:"transparent",border:"none",color:"#64748b",cursor:"pointer",fontSize:"20px",padding:"0"}},"×")
  ])).querySelector('button').addEventListener('click',()=>{state.goalHistoryType=null;render();});

  // 履歴リスト
  const list=div({style:{flex:1,overflowY:"auto"}});

  if(keys.length===0){
    list.appendChild(div({style:{textAlign:"center",color:"#475569",padding:"24px 0",fontSize:"13px"}},"まだ記録がありません"));
  } else {
    keys.forEach(key=>{
      const g=state.goals[key];
      if(!g||!g.text)return;
      // キーから期間ラベルを生成
      const raw=key.replace(prefix,"");
      let periodStr=raw;
      if(type==="daily"){
        const p=raw.split('-');periodStr=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])).toLocaleDateString("ja-JP",{year:"numeric",month:"short",day:"numeric",weekday:"short"});
      } else if(type==="weekly"){
        const p=raw.split('-');const mon=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));const sun=new Date(mon);sun.setDate(sun.getDate()+6);
        periodStr=`${mon.getMonth()+1}/${mon.getDate()}〜${sun.getMonth()+1}/${sun.getDate()}`;
      } else if(type==="monthly"){
        const p=raw.split('-');periodStr=`${p[0]}年${parseInt(p[1])}月`;
      } else if(type==="quarterly"){
        periodStr=raw.replace('-',' ');
      } else if(type==="yearly"){
        periodStr=`${raw}年`;
      }

      const item=div({style:{marginBottom:"10px",padding:"10px 12px",background:"#0f172a",borderRadius:"10px",border:`1px solid ${g.done?"#22c55e33":"#1e3a5f"}`,cursor:"pointer"}});
      item.addEventListener('click',(()=>{const k=key;const type2=type;return()=>{
        state.goalEditKey=k;
        state.goalEditType=type2;
        state.goalEditText=g.text||"";
        state.goalEditProgress=g.progress||"";
        state.goalEditDone=g.done||false;
        state.goalEditPeriodStr=periodStr;
        render();
      };})()); 
      item.appendChild(div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}},[
        span({style:{fontSize:"11px",color:"#64748b"}},periodStr),
        span({style:{fontSize:"12px",fontWeight:700,color:g.done?"#22c55e":"#475569"}},g.done?"✅ 達成":"— 未達成")
      ]));
      item.appendChild(div({style:{fontSize:"13px",color:"#e2e8f0",lineHeight:1.6,marginBottom:g.progress?"6px":"0"}},g.text));
      if(g.progress){
        item.appendChild(div({style:{fontSize:"11px",color:"#64748b",lineHeight:1.6,padding:"6px 8px",background:"#0a1120",borderRadius:"6px"}},g.progress));
      }
      list.appendChild(item);
    });
  }

  m.appendChild(list);
  bg.appendChild(m);
  return bg;
}

async function doFetchWeather(city){
  state.weatherLoading=true;state.weatherError=null;state.weather=[];render();
  try{
    state.weather=await fetchWeatherAPI(city.lat,city.lon);
    state.weatherCity=city;
    try{localStorage.setItem(STORAGE_KEY+"_city",JSON.stringify(city));}catch{}

    // 天気データを日付キーで保存
    const td=todayStr();
    let weatherStore={};
    try{const s=localStorage.getItem(STORAGE_KEY+"_weather");if(s)weatherStore=JSON.parse(s);}catch{}
    weatherStore[td]=state.weather;

    // 90日の境界日を計算
    const cutoff90=new Date();cutoff90.setDate(cutoff90.getDate()-90);
    const cutoff90Str=`${cutoff90.getFullYear()}-${String(cutoff90.getMonth()+1).padStart(2,'0')}-${String(cutoff90.getDate()).padStart(2,'0')}`;

    // 各日付のデータを整理
    Object.keys(weatherStore).forEach(dateKey=>{
      if(dateKey>=cutoff90Str){
        // 90日以内：全時間保持
        return;
      }
      // 90日より前：体調記録のある時間とその前2時間のみ保持
      const scoredHours=state.logs
        .filter(l=>l.dateStr===dateKey&&l.score!=null)
        .map(l=>l.hour);
      if(scoredHours.length===0){
        // 体調記録なし→削除
        delete weatherStore[dateKey];
        return;
      }
      // 保持する時間を計算（記録時間とその前2時間）
      const keepHours=new Set();
      scoredHours.forEach(h=>{
        for(let i=0;i<=2;i++){
          const t=h-i;
          if(t>=0)keepHours.add(t);
        }
      });
      // 不要な時間を削除
      weatherStore[dateKey]=weatherStore[dateKey].filter(w=>keepHours.has(w.hour));
      if(weatherStore[dateKey].length===0) delete weatherStore[dateKey];
    });

    try{localStorage.setItem(STORAGE_KEY+"_weather",JSON.stringify(weatherStore));}catch{}
  }catch(e){
    state.weatherError=e.message;
  }
  state.weatherLoading=false;render();
}

const WEEKDAYS_JP=["日","月","火","水","木","金","土"];

// 日付ユーティリティ
function parseDS(ds){const p=ds.split('-');return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));}
function fmtDS(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

// 繰り返し予定が指定日にマッチするか
function repeatMatches(ev, dateStr){
  const d=parseDS(dateStr), s=parseDS(ev.startDate);
  if(d<s)return false;
  if(ev.endDate){ const e2=parseDS(ev.endDate); if(d>e2)return false; } // これ以降変更で分割した終了日
  if(ev.exceptions && ev.exceptions.includes(dateStr))return false;     // この予定のみ変更で除外した日
  const t=ev.repeatType;
  if(t==="daily")return true;
  if(t==="w1"||t==="w2"||t==="w3"||t==="w4"){
    const k=parseInt(t.slice(1));
    const wds=(ev.weekdays&&ev.weekdays.length)?ev.weekdays:[s.getDay()];
    if(!wds.includes(d.getDay()))return false;
    // 週間隔は各週の月曜起点で判定（複数曜日でも正しく数える）
    const mon=x=>{const m=new Date(x.getFullYear(),x.getMonth(),x.getDate());m.setDate(m.getDate()-((m.getDay()+6)%7));return m;};
    const weeks=Math.round((mon(d)-mon(s))/(7*86400000));
    return weeks%k===0;
  }
  if(t==="nth"){
    if(d.getDay()!==s.getDay())return false;
    return Math.ceil(d.getDate()/7)===Math.ceil(s.getDate()/7);
  }
  if(t==="monthly")return d.getDate()===s.getDate();
  if(t==="yearly")return d.getMonth()===s.getMonth()&&d.getDate()===s.getDate();
  return false;
}

// 指定日の全予定（単発＋繰り返し展開）
function getEventsForDate(vd){
  const singles=(state.schedule[vd]||[]).map(e=>({...e,isRepeat:false}));
  const repeats=(state.repeatEvents||[]).filter(ev=>repeatMatches(ev,vd)).map(e=>({...e,isRepeat:true}));
  return [...singles,...repeats].sort((a,b)=>(a.startH*60+a.startM)-(b.startH*60+b.startM));
}

// 繰り返しタイプのラベル
function repeatLabel(t, startDate){
  const s=parseDS(startDate);
  const w=WEEKDAYS_JP[s.getDay()];
  const nth=Math.ceil(s.getDate()/7);
  const map={
    daily:"毎日", w1:`毎週${w}曜`, w2:`2週ごと${w}曜`, w3:`3週ごと${w}曜`, w4:`4週ごと${w}曜`,
    nth:`第${nth}${w}曜`, monthly:`毎月${s.getDate()}日`, yearly:`毎年${s.getMonth()+1}/${s.getDate()}`
  };
  return map[t]||"";
}

// TODOタブから「実際の行動」を取得（タイマー＋チェック完了）
function getActualActivities(vd){
  const t=state.todos[vd]||{};
  const acts=[];
  const routines=state.routines||[];
  const routineIds=new Set(routines.flatMap(g=>g.ids));
  TODO_ITEMS.forEach(item=>{
    if(routineIds.has(item.id))return; // ルーティンは後でまとめて1ブロックに
    const d=t[item.id];
    if(!d||d.excluded)return;
    if(item.multi&&d.sessions){
      d.sessions.forEach(s=>{
        if(s.startTime&&s.endTime){
          const st=new Date(s.startTime),et=new Date(s.endTime);
          acts.push({title:item.label,startMin:st.getHours()*60+st.getMinutes(),endMin:et.getHours()*60+et.getMinutes()});
        }
      });
    } else if(item.type==="timer"&&d.startTime&&d.endTime){
      const st=new Date(d.startTime),et=new Date(d.endTime);
      acts.push({title:item.label,startMin:st.getHours()*60+st.getMinutes(),endMin:et.getHours()*60+et.getMinutes()});
    } else if(item.type==="check"&&d.checked&&d.time){
      const ct=new Date(d.time);
      acts.push({title:"✓"+item.label,startMin:ct.getHours()*60+ct.getMinutes(),endMin:ct.getHours()*60+ct.getMinutes()+12,isPoint:true});
    }
  });
  // ルーティンは1ブロックにまとめて表示（完了項目の最早〜最遅時刻）
  // 日付をまたぐのを防ぐため、そのページ(vd)と同じ日付に記録されたものだけ集約
  const mm=dt=>{const x=new Date(dt);return x.getHours()*60+x.getMinutes();};
  const sameDay=iso=>{try{return fmtDS(new Date(iso))===vd;}catch{return false;}};
  routines.forEach(g=>{
    const mins=[];
    const addMin=iso=>{ if(iso&&sameDay(iso)) mins.push(mm(iso)); };
    (g.ids||[]).forEach(id=>{
      const d=t[id];
      if(!d||d.excluded)return;
      if(d.checked&&d.time) addMin(d.time);
      addMin(d.startTime);
      addMin(d.endTime);
      (d.sessions||[]).forEach(s=>{ addMin(s.startTime); addMin(s.endTime); });
    });
    if(mins.length){
      const s=Math.min(...mins), e=Math.max(...mins);
      acts.push({title:g.title, startMin:s, endMin:Math.max(e, s+16), color:g.color});
    }
  });
  // アルコール記録も実際の行動として反映（琥珀色で区別）
  const daily=getDaily(vd);
  (daily.drinks||[]).forEach(dr=>{
    const dt=resolveDT(dr);
    const sMin=(dr.hour||0)*60+(dr.min||0);
    acts.push({title:`${dt.emoji}${dt.label}`,startMin:sMin,endMin:sMin+12,isPoint:true,color:"#f59e0b"});
  });
  // 睡眠（就寝〜起床）も実際の行動として反映。0時をまたぐ場合は深夜0時で2分割
  if(daily.sleepStart!=null&&daily.sleepEnd!=null){
    const ss=Math.round(daily.sleepStart*60), se=Math.round(daily.sleepEnd*60);
    const SC="#60a5fa";
    if(se>ss){
      acts.push({title:"😴 睡眠",startMin:ss,endMin:se,color:SC});
    } else if(se<ss){
      if(ss<1440) acts.push({title:"😴 睡眠",startMin:ss,endMin:1440,color:SC});
      if(se>0)    acts.push({title:"😴 睡眠",startMin:0,endMin:se,color:SC});
    }
  }
  // 昼寝も反映
  (daily.naps||[]).forEach(n=>{
    const s=(n.hour||0)*60+(n.min||0);
    let e=n.endHour!=null?(n.endHour*60+(n.endMin||0)):s+(n.mins||30);
    if(e<=s)e=s+(n.mins||30);
    acts.push({title:"💤 昼寝",startMin:s,endMin:e,color:"#93c5fd"});
  });
  // ※ 仕事（シフト）は「予定」（左）列へ移動したため、実際列には出さない
  return acts.sort((a,b)=>a.startMin-b.startMin);
}

// 左（予定）列に出すパターン由来のブロック（シフト＋パターン予定）
function getPlannedExtras(vd){
  const out=[];
  // シフト（勤務）を予定として（休み・未設定は出さない）
  const sk=currentShiftKey(vd);
  const wk=getWorkForDate(vd);
  if(sk&&sk!=="off"&&wk.start!=null&&wk.end!=null){
    const sh=SHIFT_TYPES[sk];
    let endTotal=wk.end+(wk.overtime||0); if(endTotal>24)endTotal=24;
    out.push({title:`💼 ${sh?sh.label:"仕事"}`,color:sh?sh.color:"#2dd4bf",
      startH:Math.floor(wk.start),startM:Math.round((wk.start%1)*60),
      endH:Math.floor(endTotal),endM:Math.round((endTotal%1)*60),isPattern:true});
  }
  // パターン予定（睡眠など）。0時をまたぐものは分割
  const dow=parseDS(vd).getDay();
  (state.planPatterns||[]).forEach(p=>{
    if(p.enabled===false)return;
    if(Array.isArray(p.weekdays)&&p.weekdays.length&&!p.weekdays.includes(dow))return;
    const s=p.startH*60+(p.startM||0), e=p.endH*60+(p.endM||0);
    const mk=(sh,sm,eh,em)=>({title:p.title,color:p.color||"#38bdf8",startH:sh,startM:sm,endH:eh,endM:em,isPattern:true});
    if(e>s){ out.push(mk(p.startH,p.startM||0,p.endH,p.endM||0)); }
    else { out.push(mk(p.startH,p.startM||0,24,0)); if(e>0) out.push(mk(0,0,p.endH,p.endM||0)); }
  });
  return out;
}

      }},"＋ 予定を追加"),
    btn({style:{flex:1,padding:"9px",background:"linear-gradient(135deg,#0ea5e918,#6366f118)",border:"1px solid #6366f1",borderRadius:"8px",color:"#a5b4fc",fontSize:"12px",fontWeight:600,cursor:"pointer"},
      onClick:()=>runAISchedule(vd),
      },state.aiScheduleLoading?"🤖 提案中...":"🤖 AI提案")
  ]));

  // AI提案結果の確認カード
  if(state.aiScheduleProposal){
    const p=state.aiScheduleProposal;
    const pc=div({className:"card",style:{border:"1px solid #6366f155"}});
    pc.appendChild(div({style:{fontSize:"13px",fontWeight:700,color:"#a5b4fc",marginBottom:"8px"}},"🤖 AIのスケジュール提案"));
    if(p.comment)pc.appendChild(div({style:{fontSize:"11px",color:"#94a3b8",marginBottom:"10px",lineHeight:1.6}},p.comment));
    (p.events||[]).forEach(ev=>{
      pc.appendChild(div({style:{display:"flex",gap:"8px",alignItems:"center",padding:"5px 8px",background:"#0f172a",borderRadius:"6px",marginBottom:"4px"}},[
        span({style:{fontSize:"11px",color:"#64748b",minWidth:"84px"}},`${String(ev.startH).padStart(2,'0')}:${String(ev.startM).padStart(2,'0')}〜${String(ev.endH).padStart(2,'0')}:${String(ev.endM).padStart(2,'0')}`),
        span({style:{fontSize:"12px",color:"#e2e8f0"}},ev.title)
      ]));
    });
    pc.appendChild(div({style:{display:"flex",gap:"8px",marginTop:"10px"}},[
      btn({className:"btn-ghost",style:{flex:1},onClick:()=>{state.aiScheduleProposal=null;render();}},"却下"),
      btn({style:{flex:2,padding:"9px",background:"linear-gradient(135deg,#0ea5e9,#6366f1)",border:"none",borderRadius:"8px",color:"#fff",fontSize:"12px",fontWeight:600,cursor:"pointer"},
        onClick:()=>{
          if(!state.schedule[vd])state.schedule[vd]=[];
          (state.aiScheduleProposal.events||[]).forEach(ev=>{
            state.schedule[vd].push({uid:Date.now()+Math.random(),title:ev.title,startH:ev.startH,startM:ev.startM,endH:ev.endH,endM:ev.endM,color:EV_COLORS[0]});
          });
          saveSchedule();state.aiScheduleProposal=null;render();
          showToast("📅 スケジュールを登録しました");
        }},"この予定を登録")
    ]));
    wrap.appendChild(pc);
  }

  // タイムライン（0〜24時）
  const HOUR_H=40, START_H=0, END_H=24;
  const tlCard=div({className:"card",style:{padding:"10px"}});
  tlCard.appendChild(div({style:{display:"flex",marginBottom:"6px"}},[
    div({style:{width:"34px"}},""),
    div({style:{flex:1,fontSize:"10px",fontWeight:700,color:"#38bdf8",textAlign:"center"}},"📅 予定"),
    div({style:{flex:1,fontSize:"10px",fontWeight:700,color:"#22c55e",textAlign:"center"}},"✔ 実際（TODO・睡眠・飲酒）")
  ]));

  const tl=div({style:{position:"relative",height:`${(END_H-START_H)*HOUR_H}px`}});
  for(let h2=START_H;h2<END_H;h2++){
    tl.appendChild(div({style:{position:"absolute",top:`${(h2-START_H)*HOUR_H}px`,left:0,right:0,borderTop:"1px solid #1e3a5f55",display:"flex"}},[
      div({style:{width:"34px",fontSize:"9px",color:"#475569",marginTop:"-6px"}},`${h2}:00`)
    ]));
  }
  if(isToday){
    const now=new Date();const nowY=((now.getHours()+now.getMinutes()/60)-START_H)*HOUR_H;
    if(nowY>0&&nowY<(END_H-START_H)*HOUR_H){
      tl.appendChild(div({id:"now-line","data-hourh":HOUR_H,"data-starth":START_H,"data-endh":END_H,style:{position:"absolute",top:`${nowY}px`,left:"30px",right:0,borderTop:"1.5px solid #38bdf8",zIndex:5}},[
        div({style:{width:"6px",height:"6px",borderRadius:"50%",background:"#38bdf8",marginTop:"-4px"}})
      ]));
    }
  }
  // 重なりをレーン（横並び）に振り分けて文字被りを防ぐ
  const layoutLanes=(items)=>{
    const arr=items.map(ev=>{
      const s=(ev.startMin!=null?ev.startMin:ev.startH*60+ev.startM);
      let e=(ev.endMin!=null?ev.endMin:ev.endH*60+ev.endM);
      if(e<=s)e=s+(ev.isPoint?12:16);
      return {ev,s,e,lane:0,lanes:1};
    }).sort((a,b)=>a.s-b.s||a.e-b.e);
    // 連続して重なるものをクラスタ化し、各クラスタ内でレーン割当
    let cluster=[], clusterEnd=-1;
    const flush=()=>{
      if(!cluster.length)return;
      const laneEnd=[];
      cluster.forEach(o=>{
        let placed=false;
        for(let i=0;i<laneEnd.length;i++){ if(o.s>=laneEnd[i]){o.lane=i;laneEnd[i]=o.e;placed=true;break;} }
        if(!placed){ o.lane=laneEnd.length; laneEnd.push(o.e); }
      });
      cluster.forEach(o=>o.lanes=laneEnd.length);
      cluster=[]; clusterEnd=-1;
    };
    arr.forEach(o=>{
      if(cluster.length && o.s>=clusterEnd) flush();
      cluster.push(o); clusterEnd=Math.max(clusterEnd,o.e);
    });
    flush();
    return arr;
  };
  const blockArea=(items,leftBase,widthArea,defaultColor,onTap)=>{
    layoutLanes(items).forEach(({ev,s:sMin,e:eMin,lane,lanes})=>{
      const color=ev.color||defaultColor;
      const top=((sMin/60)-START_H)*HOUR_H;
      const height=ev.isPoint?14:Math.max(16,((eMin-sMin)/60)*HOUR_H-2);
      if(top+height<0||top>(END_H-START_H)*HOUR_H)return;
      // レーン位置（横分割）。widthArea/leftBase は calc 用の生の式
      const left=`calc((${leftBase}) + (${widthArea}) * ${(lane/lanes).toFixed(4)})`;
      const width=`calc((${widthArea}) * ${(1/lanes).toFixed(4)} - 2px)`;
      const block=div({style:{
        position:"absolute",top:`${Math.max(0,top)}px`,left,width,
        height:`${height}px`,background:color+"22",border:`1px solid ${color}66`,
        borderLeft:`3px solid ${color}`,borderRadius:"5px",padding:"1px 4px",
        overflow:"hidden",cursor:onTap?"pointer":"default",zIndex:3,boxSizing:"border-box"
      }});
      block.appendChild(div({style:{fontSize:"9px",fontWeight:600,color:color,lineHeight:1.25,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},
        (ev.isRepeat?"🔁":"")+ev.title));
      if(height>30&&!ev.isPoint&&lanes===1)block.appendChild(div({style:{fontSize:"8px",color:"#64748b"}},`${Math.floor(sMin/60)}:${String(sMin%60).padStart(2,'0')}〜${Math.floor(eMin/60)}:${String(eMin%60).padStart(2,'0')}`));
      if(onTap)block.addEventListener('click',()=>onTap(ev));
      tl.appendChild(block);
    });
  };
  blockArea(events,"36px","50% - 40px",EV_COLORS[0],ev=>{
    if(ev.isPattern){ state.tab="設定"; showToast("パターンは設定タブで編集できます"); render(); return; }
    state.modal="addEvent";state.editEventUid=ev.uid;state.editEventIsRepeat=!!ev.isRepeat;
    state.newEvTitle=ev.title;state.newEvH=ev.startH;state.newEvM=ev.startM;
    state.newEvEndH=ev.endH;state.newEvEndM=ev.endM;
    state.newEvRepeat=ev.isRepeat?ev.repeatType:"none";
    state.newEvColor=ev.color||EV_COLORS[0];
    state.newEvWeekdays=(ev.weekdays&&ev.weekdays.length)?[...ev.weekdays]:[parseDS(ev.startDate||vd).getDay()];
    state.editScope="this";
    render();
  });
  blockArea(actuals,"50% + 2px","50% - 6px","#22c55e",null);

  tlCard.appendChild(tl);
  wrap.appendChild(tlCard);
  return wrap;
}

// ── 週カレンダー ──
function renderWeekCalendar(vd,ds){
  const wrap=div({});
  // vdの週（月曜始まり）
  const base=parseDS(vd);
  const mondayOff=(base.getDay()+6)%7;
  const monday=new Date(base);monday.setDate(monday.getDate()-mondayOff);

  wrap.appendChild(div({style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}},[
    btn({style:{background:"transparent",border:"1px solid #334155",borderRadius:"7px",color:"#94a3b8",cursor:"pointer",fontSize:"14px",padding:"2px 10px"},
      onClick:()=>{const n=new Date(parseDS(state.viewDate));n.setDate(n.getDate()-7);state.viewDate=fmtDS(n);render();}},"‹"),
    div({style:{fontSize:"13px",fontWeight:700,color:"#e2e8f0"}},
      `${monday.getMonth()+1}/${monday.getDate()} 〜 の週`),
    btn({style:{background:"transparent",border:"1px solid #334155",borderRadius:"7px",color:"#94a3b8",cursor:"pointer",fontSize:"14px",padding:"2px 10px"},
      onClick:()=>{const n=new Date(parseDS(state.viewDate));n.setDate(n.getDate()+7);state.viewDate=fmtDS(n);render();}},"›")
  ]));

  // シフト操作バー（入れ替えモード）
  const shiftOn=state.shiftPattern&&state.shiftPattern.enabled;
  wrap.appendChild(div({style:{display:"flex",gap:"6px",alignItems:"center",marginBottom:"8px"}},[
    div({style:{flex:1,fontSize:"10px",color:"#64748b"}},
      state.swapMode?(state.swapFirst?"入れ替える2日目をタップ":"入れ替える1日目をタップ"):"シフトバッジをタップで 1直→2直→休み→自動 を切替"),
    btn({style:{fontSize:"11px",padding:"5px 12px",borderRadius:"7px",cursor:"pointer",fontWeight:600,
      border:`1px solid ${state.swapMode?"#f59e0b":"#334155"}`,background:state.swapMode?"#f59e0b22":"transparent",color:state.swapMode?"#f59e0b":"#94a3b8"},
      onClick:()=>{state.swapMode=!state.swapMode;state.swapFirst=null;render();}},state.swapMode?"入れ替え中…やめる":"🔄 2日を入れ替え")
  ]));

  const cycleDayShift=(dsK)=>{
    const w=getWorkForDate(dsK);
    if(!w.manual){ setDayShift(dsK,"s1"); }
    else { const k=currentShiftKey(dsK); if(k==="s1")setDayShift(dsK,"s2"); else if(k==="s2")setDayShift(dsK,"off"); else setDayShift(dsK,null); }
    render();
  };
  const doSwap=(a,b)=>{ const ka=currentShiftKey(a)||"off", kb=currentShiftKey(b)||"off"; setDayShift(a,kb); setDayShift(b,ka); };
  const onDayTap=(dsK)=>{
    if(state.swapMode){
      if(!state.swapFirst){ state.swapFirst=dsK; }
      else if(state.swapFirst===dsK){ state.swapFirst=null; }
      else { doSwap(state.swapFirst,dsK); state.swapFirst=null; showToast("🔄 シフトを入れ替えました"); }
      render();
    } else { state.viewDate=dsK;state.scheduleSubTab="日";render(); }
  };

  const card=div({className:"card",style:{padding:"8px"}});
  const grid=div({style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"3px"}});
  const DAY_LBL=["月","火","水","木","金","土","日"];
  for(let i=0;i<7;i++){
    const d2=new Date(monday);d2.setDate(d2.getDate()+i);
    const dsK=fmtDS(d2);
    const isT=dsK===todayStr();
    const isSel=state.swapMode&&state.swapFirst===dsK;
    const evs=getEventsForDate(dsK);
    const col=div({style:{minHeight:"120px",background:isSel?"#f59e0b22":"#0f172a",borderRadius:"6px",padding:"4px 3px",border:`1px solid ${isSel?"#f59e0b":isT?"#38bdf8":"#1e3a5f"}`,cursor:"pointer",overflow:"hidden"}});
    col.appendChild(div({style:{textAlign:"center",fontSize:"9px",color:isT?"#38bdf8":"#64748b",fontWeight:isT?700:400,marginBottom:"3px"}},`${DAY_LBL[i]} ${d2.getDate()}`));
    // シフトバッジ
    const sk=currentShiftKey(dsK);
    if(shiftOn||sk){
      const w=getWorkForDate(dsK);
      const sh=sk?SHIFT_TYPES[sk]:null;
      const badge=div({style:{textAlign:"center",fontSize:"9px",fontWeight:700,marginBottom:"3px",padding:"2px 0",borderRadius:"4px",cursor:"pointer",
        color:sh?sh.color:"#475569",background:sh?sh.color+"22":"transparent",border:`1px solid ${sh?sh.color+"55":"#1e3a5f"}`,
        opacity:w.manual?1:0.7}},(sh?sh.label:"—")+(w.manual?"":"˚"));
      badge.addEventListener('click',(()=>{const k=dsK;return e=>{e.stopPropagation(); if(state.swapMode)onDayTap(k); else cycleDayShift(k);};})());
      col.appendChild(badge);
    }
    evs.slice(0,5).forEach(ev=>{
      const c=ev.color||EV_COLORS[0];
      col.appendChild(div({style:{fontSize:"8px",color:c,background:c+"22",borderLeft:`2px solid ${c}`,borderRadius:"3px",padding:"1px 3px",marginBottom:"2px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},
        `${String(ev.startH).padStart(2,'0')}:${String(ev.startM).padStart(2,'0')} ${ev.title}`));
    });
    if(evs.length>5)col.appendChild(div({style:{fontSize:"8px",color:"#475569",textAlign:"center"}},`+${evs.length-5}`));
    col.addEventListener('click',(()=>{const k=dsK;return()=>onDayTap(k);})());
    grid.appendChild(col);
  }
  card.appendChild(grid);
  wrap.appendChild(card);
  wrap.appendChild(div({style:{textAlign:"center",fontSize:"10px",color:"#475569",marginTop:"6px"}},
    state.swapMode?"入れ替えたい2日をタップ":"日をタップで日表示へ／シフトは「˚」が自動、無印が手動"));
  return wrap;
}

// ── 月カレンダー ──
function renderMonthCalendar(vd,ds){
  const wrap=div({});
  const base=parseDS(vd);
  const y=base.getFullYear(),m=base.getMonth()+1;

  wrap.appendChild(div({style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}},[
    btn({style:{background:"transparent",border:"1px solid #334155",borderRadius:"7px",color:"#94a3b8",cursor:"pointer",fontSize:"14px",padding:"2px 10px"},
      onClick:()=>{const n=new Date(y,m-2,1);state.viewDate=fmtDS(n);render();}},"‹"),
    div({style:{fontSize:"13px",fontWeight:700,color:"#e2e8f0"}},`${y}年${m}月`),
    btn({style:{background:"transparent",border:"1px solid #334155",borderRadius:"7px",color:"#94a3b8",cursor:"pointer",fontSize:"14px",padding:"2px 10px"},
      onClick:()=>{const n=new Date(y,m,1);state.viewDate=fmtDS(n);render();}},"›")
  ]));

  const card=div({className:"card",style:{padding:"8px"}});
  card.appendChild(div({style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"3px",marginBottom:"3px"}},
    ["月","火","水","木","金","土","日"].map(w=>div({style:{textAlign:"center",fontSize:"9px",color:"#475569"}},w))));

  const firstDay=new Date(y,m-1,1);
  const daysInMonth=new Date(y,m,0).getDate();
  const startBlank=(firstDay.getDay()+6)%7;
  const grid=div({style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"3px"}});
  for(let i=0;i<startBlank;i++)grid.appendChild(div({},""));
  const todayD2=todayStr();
  for(let day=1;day<=daysInMonth;day++){
    const dsK=`${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const evs=getEventsForDate(dsK);
    const isT=dsK===todayD2;
    const cell=div({style:{minHeight:"52px",borderRadius:"6px",padding:"3px",
      background:"#0f172a",border:`1px solid ${isT?"#38bdf8":"#1e3a5f"}`,cursor:"pointer",overflow:"hidden"}});
    cell.appendChild(div({style:{fontSize:"9px",color:isT?"#38bdf8":"#64748b",fontWeight:isT?700:400,marginBottom:"2px"}},String(day)));
    evs.slice(0,3).forEach(ev=>{
      const c=ev.color||EV_COLORS[0];
      cell.appendChild(div({style:{fontSize:"7px",color:c,background:c+"22",borderRadius:"2px",padding:"0 2px",marginBottom:"1px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},ev.title));
    });
    if(evs.length>3)cell.appendChild(div({style:{fontSize:"7px",color:"#475569"}},`+${evs.length-3}`));
    cell.addEventListener('click',(()=>{const k=dsK;return()=>{state.viewDate=k;state.scheduleSubTab="日";render();};})());
    grid.appendChild(cell);
  }
  card.appendChild(grid);
  wrap.appendChild(card);
  wrap.appendChild(div({style:{textAlign:"center",fontSize:"10px",color:"#475569",marginTop:"6px"}},"日をタップで日表示へ"));
  return wrap;
}

// ── やることリスト（重要度×緊急度マトリクス） ──
function renderTaskMatrix(){
  const wrap=div({});
  const list=state.tasks.todo||[];
  const card=div({className:"card"});
  card.appendChild(div({style:{fontSize:"13px",fontWeight:700,color:"#e2e8f0",marginBottom:"2px"}},"✅ やることリスト"));
  card.appendChild(div({style:{fontSize:"10px",color:"#475569",marginBottom:"10px"}},"重要・緊急で優先順位付け／期日設定・「予定に追加」で作業をスケジュール化"));

  const inputRow=div({style:{display:"flex",gap:"6px",marginBottom:"10px"}});
  const inp=document.createElement('input');
  inp.type='text';inp.placeholder="やることを追加...";
  inp.style.cssText="flex:1;padding:8px 12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:13px;font-family:inherit";
  const addFn=()=>{
    const v=inp.value.trim();if(!v)return;
    state.tasks.todo=[...(state.tasks.todo||[]),{uid:Date.now(),text:v,done:false,imp:false,urg:false}];
    saveTasks();inp.value="";render();
  };
  inp.addEventListener('keydown',e=>{if(e.key==="Enter")addFn();});
  const addBtn=btn({style:{padding:"8px 16px",background:"#0ea5e918",border:"1px solid #0ea5e9",borderRadius:"8px",color:"#38bdf8",fontSize:"13px",fontWeight:600,cursor:"pointer"}},"＋");
  addBtn.addEventListener('click',addFn);
  inputRow.appendChild(inp);inputRow.appendChild(addBtn);
  card.appendChild(inputRow);

  // 優先度ソート：重×急 → 重 → 急 → なし → 完了、同順位は期日の早い順
  const prio=t=>t.done?4:(t.imp&&t.urg)?0:t.imp?1:t.urg?2:3;
  const prioColor=t=>(t.imp&&t.urg)?"#ef4444":t.imp?"#f97316":t.urg?"#eab308":"#334155";
  const prioLabel=t=>(t.imp&&t.urg)?"最優先":t.imp?"重要":t.urg?"緊急":"";
  const dueVal=t=>t.due?parseDS(t.due).getTime():Infinity;
  const sorted=[...list].sort((a,b)=>prio(a)-prio(b)||dueVal(a)-dueVal(b));
  const updateTask=(uid,upd)=>{state.tasks.todo=state.tasks.todo.map(x=>x.uid===uid?{...x,...upd}:x);saveTasks();render();};
  const dueBadge=item=>{
    const dd=parseDS(item.due), td=parseDS(todayStr());
    const days=Math.round((dd-td)/86400000);
    let color,label;
    if(days<0){color="#ef4444";label=`期日超過${-days}日`;}
    else if(days===0){color="#f97316";label="今日が期日";}
    else if(days<=2){color="#eab308";label=`あと${days}日`;}
    else {color="#38bdf8";label=`${dd.getMonth()+1}/${dd.getDate()}まで`;}
    return div({style:{fontSize:"9px",color,fontWeight:700,marginTop:"2px"}},`📅 ${label}`);
  };

  if(sorted.length===0){
    card.appendChild(div({style:{textAlign:"center",fontSize:"11px",color:"#475569",padding:"12px 0"}},"まだありません"));
  }
  sorted.forEach(item=>{
    const pc=prioColor(item);
    const box=div({style:{padding:"8px 10px",background:"#0f172a",borderRadius:"8px",marginBottom:"4px",borderLeft:`3px solid ${item.done?"#334155":pc}`,opacity:item.done?"0.5":"1"}});
    // 1行目：チェック＋テキスト＋削除
    const row1=div({style:{display:"flex",alignItems:"center",gap:"8px"}});
    const cb=btn({style:{width:"22px",height:"22px",borderRadius:"6px",flexShrink:0,
      border:`2px solid ${item.done?"#22c55e":"#334155"}`,background:item.done?"#22c55e":"transparent",
      cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px"}},item.done?"✓":"");
    cb.addEventListener('click',(()=>{const uid=item.uid;return()=>updateTask(uid,{done:!item.done});})());
    row1.appendChild(cb);
    const label=div({style:{flex:1,minWidth:0}});
    label.appendChild(div({style:{fontSize:"13px",color:item.done?"#64748b":"#e2e8f0",textDecoration:item.done?"line-through":"none"}},item.text));
    if(prioLabel(item)&&!item.done)label.appendChild(div({style:{fontSize:"9px",color:pc,fontWeight:700}},prioLabel(item)));
    if(item.due&&!item.done)label.appendChild(dueBadge(item));
    row1.appendChild(label);
    const del=btn({style:{background:"transparent",border:"none",color:"#334155",cursor:"pointer",fontSize:"15px",padding:"0 2px",flexShrink:0}},"×");
    del.addEventListener('click',(()=>{const uid=item.uid;return()=>{state.tasks.todo=state.tasks.todo.filter(x=>x.uid!==uid);saveTasks();render();};})());
    row1.appendChild(del);
    box.appendChild(row1);
    // 2行目：重要・緊急・期日・予定に追加
    const row2=div({style:{display:"flex",alignItems:"center",gap:"6px",marginTop:"8px",flexWrap:"wrap"}});
    const impB=btn({style:{fontSize:"10px",padding:"3px 8px",borderRadius:"6px",cursor:"pointer",whiteSpace:"nowrap",
      border:`1px solid ${item.imp?"#f97316":"#334155"}`,background:item.imp?"#f9731622":"transparent",color:item.imp?"#f97316":"#475569"}},"重要");
    impB.addEventListener('click',(()=>{const uid=item.uid;return()=>updateTask(uid,{imp:!item.imp});})());
    row2.appendChild(impB);
    const urgB=btn({style:{fontSize:"10px",padding:"3px 8px",borderRadius:"6px",cursor:"pointer",whiteSpace:"nowrap",
      border:`1px solid ${item.urg?"#eab308":"#334155"}`,background:item.urg?"#eab30822":"transparent",color:item.urg?"#eab308":"#475569"}},"緊急");
    urgB.addEventListener('click',(()=>{const uid=item.uid;return()=>updateTask(uid,{urg:!item.urg});})());
    row2.appendChild(urgB);
    // 期日
    const dueInp=document.createElement('input');dueInp.type='date';dueInp.value=item.due||"";
    dueInp.style.cssText="padding:3px 6px;background:#1e293b;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:11px;font-family:inherit;color-scheme:dark";

function getTodo(dateStr){
  return state.todos[dateStr] || {};
}
function setTodo(dateStr, id, data){
  if(!state.todos[dateStr]) state.todos[dateStr]={};
  state.todos[dateStr][id] = data;
  try{localStorage.setItem(STORAGE_KEY+"_todo", JSON.stringify(state.todos));}catch{}
  render();
}
function toggleExclude(dateStr, id){
  if(!state.todos[dateStr]) state.todos[dateStr]={};
  const cur=state.todos[dateStr][id]||{};
  state.todos[dateStr][id]={...cur, excluded:!cur.excluded};
  try{localStorage.setItem(STORAGE_KEY+"_todo", JSON.stringify(state.todos));}catch{}
  render();
}

// ── TODO並び順管理 ────────────────────────────────
function getOrderedTodoItems(){
  let order=null;
  try{const s=localStorage.getItem(STORAGE_KEY+"_todo_order");if(s)order=JSON.parse(s);}catch{}
  if(!Array.isArray(order)||order.length===0) return [...TODO_ITEMS];
  const byId=Object.fromEntries(TODO_ITEMS.map(it=>[it.id,it]));
  const ordered=order.map(id=>byId[id]).filter(Boolean);
  // 保存順にない新項目は末尾に追加
  TODO_ITEMS.forEach(it=>{if(!order.includes(it.id))ordered.push(it);});
  return ordered;
}
function moveTodoItem(id, dir){
  const items=getOrderedTodoItems();
  const idx=items.findIndex(it=>it.id===id);
  const to=idx+dir;
  if(idx<0||to<0||to>=items.length)return;
  [items[idx],items[to]]=[items[to],items[idx]];
  try{localStorage.setItem(STORAGE_KEY+"_todo_order",JSON.stringify(items.map(it=>it.id)));}catch{}
  render();
}

// 日付を1日前に戻す
function prevDay(dateStr){
  const a=dateStr.split('-');
  const n=new Date(parseInt(a[0]),parseInt(a[1])-1,parseInt(a[2]));
  n.setDate(n.getDate()-1);
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}

// 指定アイテムが指定日に完了しているか
function isTodoDone(dateStr, item){
  const t=(state.todos[dateStr]||{})[item.id]||{};
  if(t.excluded) return true; // 除外日は達成扱い（連続を途切れさせない）
  if(item.type==="check") return !!t.checked;
  if(item.type==="timer"){
    if(item.multi){
      // マルチ：少なくとも1セッション完了していればOK
      const sessions=t.sessions||[];
      return sessions.some(s=>s.startTime&&s.endTime);
    }
    return !!(t.startTime && t.endTime);
  }
  return false;
}

// 指定アイテムの連続達成日数（vdの日まで何日連続か）
function calcStreak(vd, item){
  let count = 0;
  let chk = vd;
  for(let i=0;i<365;i++){
    if(isTodoDone(chk, item)) count++;
    else break;
    chk = prevDay(chk);
  }
  return count;
}

function renderTodo(vd, ds, isToday){
  const wrap=div({style:{maxWidth:"600px",margin:"0 auto",padding:"10px 16px 60px"}});
  const todo=getTodo(vd);

  // 除外アイテムを除いた対象項目
  const targetItems = TODO_ITEMS.filter(item => !(todo[item.id]||{}).excluded);
  const done = targetItems.filter(item => isTodoDone(vd, item)).length;
  const total = targetItems.length;

  // 全体連続達成（除外アイテムを除いた全項目完了した日が何日続いているか）
  const totalStreak = (() => {
    let count = 0;
    const allDone = d => {
      const td2=state.todos[d]||{};
      const targets=TODO_ITEMS.filter(item=>!(td2[item.id]||{}).excluded);
      return targets.length>0&&targets.every(item=>isTodoDone(d,item));
    };
    let chk = vd;
    for(let i=0;i<365;i++){
      if(allDone(chk)) count++;
      else break;
      chk = prevDay(chk);
    }
    return count;
  })();

  // ヘッダーカード
  const p2=vd.split('-');
  wrap.appendChild(div({className:"card"},[
    div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}},[
      div({},[
        div({style:{fontSize:"13px",fontWeight:700,color:"#e2e8f0"}},"📋 デイリーTODO"),
        div({style:{fontSize:"11px",color:"#64748b",marginTop:"2px"}},
          isToday?"今日のタスク":new Date(parseInt(p2[0]),parseInt(p2[1])-1,parseInt(p2[2])).toLocaleDateString("ja-JP",{month:"short",day:"numeric"}))
      ]),
      div({style:{textAlign:"right"}},[
        div({style:{fontSize:"22px",fontWeight:800,color:done===total?"#22c55e":"#38bdf8"}},[
          txt(`${done}`),span({style:{fontSize:"13px",color:"#475569"}},`/${total}`)
        ]),
        totalStreak>0?div({style:{fontSize:"11px",color:"#f97316",marginTop:"2px"}},`🔥 全完了 ${totalStreak}日連続`):null
      ])
    ]),
    div({style:{height:"6px",background:"#0f172a",borderRadius:"4px",overflow:"hidden"}},[
      div({style:{height:"100%",width:`${(done/total)*100}%`,background:done===total?"#22c55e":"#38bdf8",borderRadius:"4px"}})
    ]),
    // 並べ替えモードトグル
    (()=>{
      const on=!!state.todoSortMode;
      const b=btn({style:{marginTop:"8px",fontSize:"10px",padding:"4px 10px",borderRadius:"6px",cursor:"pointer",
        border:`1px solid ${on?"#38bdf8":"#334155"}`,background:on?"#0ea5e918":"transparent",color:on?"#38bdf8":"#475569"}},
        on?"✓ 並べ替え完了":"⇅ 並べ替え");
      b.addEventListener('click',()=>{state.todoSortMode=!on;render();});
      return b;
    })()
  ]));

  // TODOリスト（カスタム並び順）
  const orderedItems=getOrderedTodoItems();
  orderedItems.forEach((item, itemIdx) => {
    // ── 並べ替えモード ──
    if(state.todoSortMode){
      const row2=div({style:{border:"1px solid #1e3a5f",borderRadius:"10px",marginBottom:"5px",padding:"8px 12px",background:"#1e293b",display:"flex",alignItems:"center",gap:"10px"}});
      row2.appendChild(div({style:{fontSize:"11px",color:"#475569",minWidth:"20px"}},String(itemIdx+1)));
      row2.appendChild(div({style:{flex:1,fontSize:"13px",fontWeight:600,color:"#e2e8f0"}},item.label));
      const upB=btn({style:{padding:"4px 12px",background:itemIdx>0?"#0ea5e918":"transparent",border:`1px solid ${itemIdx>0?"#0ea5e9":"#1e3a5f"}`,borderRadius:"6px",color:itemIdx>0?"#38bdf8":"#334155",fontSize:"13px",cursor:itemIdx>0?"pointer":"default"}},"↑");
      if(itemIdx>0)upB.addEventListener('click',(()=>{const id=item.id;return()=>moveTodoItem(id,-1);})());
      const dnB=btn({style:{padding:"4px 12px",background:itemIdx<orderedItems.length-1?"#0ea5e918":"transparent",border:`1px solid ${itemIdx<orderedItems.length-1?"#0ea5e9":"#1e3a5f"}`,borderRadius:"6px",color:itemIdx<orderedItems.length-1?"#38bdf8":"#334155",fontSize:"13px",cursor:itemIdx<orderedItems.length-1?"pointer":"default"}},"↓");
      if(itemIdx<orderedItems.length-1)dnB.addEventListener('click',(()=>{const id=item.id;return()=>moveTodoItem(id,1);})());
      row2.appendChild(upB);row2.appendChild(dnB);
      wrap.appendChild(row2);
      return;
    }

    const t = todo[item.id] || {};
    const isDone = isTodoDone(vd, item);
    const isExcluded = !!t.excluded;
    const isRunning = !item.multi && !isExcluded && item.type==="timer" && t.startTime && !t.endTime;

    // 連続日数計算
    const streak = calcStreak(vd, item); // 今日含む
    const yesterStreak = calcStreak(prevDay(vd), item); // 昨日まで

    // 表示する連続日数と色
    const streakDisplay = (() => {
      if(isExcluded) return null;
      if(isDone && streak >= 2){
        // 今日達成済み：今日含む日数（青緑）
        return {count: streak, label: `🔥${streak}日`, color: "#22c55e", title: "今日含む"};
      } else if(!isDone && yesterStreak >= 1){
        // 今日未達成：昨日まで（オレンジ）
        return {count: yesterStreak, label: `🔥${yesterStreak}日継続中`, color: "#f97316", title: "昨日まで"};
      }
      return null;
    })();

    // 経過時間（通常タイマーのみ）
    const elapsed = (item.multi || isExcluded) ? null : (() => {
      if(!t.startTime) return null;
      const end = t.endTime ? new Date(t.endTime) : new Date();
      const ms = end - new Date(t.startTime);
      const m = Math.floor(ms/60000);
      const h2 = Math.floor(m/60);
      return h2>0 ? `${h2}h${m%60}m` : `${m}m`;
    })();

    const row=div({style:{
      border:`1px solid ${isExcluded?"#334155":isDone?"#22c55e33":isRunning?"#f97316":"#1e3a5f"}`,
      borderRadius:"10px",marginBottom:"5px",padding:"10px 12px",
      background:"#1e293b",
      opacity: isExcluded?"0.4":isDone?"0.75":"1"
    }});

    if(item.multi){
      // ── マルチセッション（読書・副業） ──
      const sessions = [...(t.sessions||[])].sort((a,b)=>{
        const ta=a.startTime?new Date(a.startTime).getTime():0;
        const tb=b.startTime?new Date(b.startTime).getTime():0;
        return ta-tb;
      });
      const totalMs = sessions.filter(s=>s.startTime&&s.endTime)
        .reduce((a,s)=>a+(new Date(s.endTime)-new Date(s.startTime)),0);
      const totalMin2 = Math.floor(totalMs/60000);
      const totalLabel = totalMin2>0?(Math.floor(totalMin2/60)>0?`${Math.floor(totalMin2/60)}h${totalMin2%60}m`:`${totalMin2}m`):null;
      const activeSession = sessions.find(s=>s.startTime&&!s.endTime)||null;

      // ヘッダー行：左にボタン、中央にラベル、右に除外
      const headerRow=div({style:{display:"flex",alignItems:"center",gap:"8px"}});

      // 左端：▶⏹ボタン
      if(!isExcluded){
        let timerBtn2;
        if(activeSession){
          timerBtn2=btn({style:{padding:"3px 10px",background:"#f9731633",border:"1px solid #f97316",borderRadius:"6px",color:"#f97316",fontSize:"12px",cursor:"pointer",fontWeight:600,flexShrink:0}},"⏹");
          timerBtn2.addEventListener('click',(()=>{const sid=activeSession.uid;return e=>{e.stopPropagation();
            const ns=[...sessions].map(s=>s.uid===sid?{...s,endTime:new Date().toISOString()}:s);
            setTodo(vd,item.id,{sessions:ns});
            showToast(`✅ ${item.label} セッション完了！`);
          };})()); 
        } else {
          timerBtn2=btn({style:{padding:"3px 10px",background:"#0ea5e933",border:"1px solid #0ea5e9",borderRadius:"6px",color:"#38bdf8",fontSize:"12px",cursor:"pointer",fontWeight:600,flexShrink:0}},"▶");
          timerBtn2.addEventListener('click',e=>{e.stopPropagation();
            const ns=[...sessions,{uid:Date.now(),startTime:new Date().toISOString()}];
            setTodo(vd,item.id,{sessions:ns});
          });
        }
        headerRow.appendChild(timerBtn2);
      } else {
        headerRow.appendChild(div({style:{width:"24px",height:"24px",borderRadius:"6px",flexShrink:0,background:"#1e3a5f",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px"}},"—"));
      }
      headerRow.appendChild(div({style:{flex:1}},[
        div({style:{display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap"}},[
          div({style:{fontSize:"13px",fontWeight:600,color:isExcluded?"#475569":"#e2e8f0",textDecoration:isExcluded?"line-through":"none"}},item.label),
          streakDisplay?span({style:{fontSize:"10px",color:streakDisplay.color,fontWeight:700}},streakDisplay.label):null
        ]),
        totalLabel&&!isExcluded?div({style:{fontSize:"11px",color:"#22c55e",marginTop:"2px"}},`合計 ${totalLabel}`):null
      ]));
      // 除外ボタン（右端）
      const exBtn2=btn({style:{
        fontSize:"10px",padding:"3px 8px",borderRadius:"6px",whiteSpace:"nowrap",cursor:"pointer",
        border:`1px solid ${isExcluded?"#f97316":"#334155"}`,
        background:isExcluded?"#f9731622":"transparent",
        color:isExcluded?"#f97316":"#475569"
      }},isExcluded?"除外中":"除外");
      exBtn2.addEventListener('click',(()=>{const id=item.id;return e=>{e.stopPropagation();toggleExclude(vd,id);};})()); 
      headerRow.appendChild(exBtn2);

      row.appendChild(headerRow);

      // セッション一覧
      if(sessions.length>0){
        const sessionList=div({style:{marginTop:"8px",display:"flex",flexDirection:"column",gap:"4px"}});
        sessions.forEach((s,i)=>{
          const sTime=s.startTime?new Date(s.startTime):null;
          const eTime=s.endTime?new Date(s.endTime):null;
          const ms2=sTime&&eTime?eTime-sTime:0;
          const min2=Math.floor(ms2/60000);
          const dur=s.endTime?(min2>0?(Math.floor(min2/60)>0?`${Math.floor(min2/60)}h${min2%60}m`:`${min2}m`):"0m"):null;
          const sLabel=sTime?`${sTime.getHours()}:${String(sTime.getMinutes()).padStart(2,'0')}`:"—";
          const eLabel=eTime?`${eTime.getHours()}:${String(eTime.getMinutes()).padStart(2,'0')}`:"—";
          const sRow=div({style:{display:"flex",alignItems:"center",gap:"6px",padding:"4px 8px",background:"#0f172a",borderRadius:"6px",cursor:"pointer"}});
          sRow.appendChild(span({style:{fontSize:"10px",color:"#64748b"}},`${i+1}.`));
          // タップで時刻編集モーダルを開く
          sRow.addEventListener('click',(()=>{const session=s;const itemId=item.id;const allSessions=sessions;return()=>{
            state.modal="editSession";
            state.editSessionItemId=itemId;
            state.editSessionUid=session.uid;
            state.editSessionSessions=allSessions;
            const parseT2=str=>{if(!str)return{h:new Date().getHours(),m:0};const d2=new Date(str);return{h:d2.getHours(),m:d2.getMinutes()};};
            state.editTimerStart=parseT2(session.startTime);
            state.editTimerEnd=parseT2(session.endTime);
            render();
          };})()); 
          sRow.appendChild(div({style:{flex:1}},[
            span({style:{fontSize:"11px",color:"#94a3b8"}},`${sLabel} 〜 ${eLabel}`),
            dur?span({style:{fontSize:"11px",fontWeight:600,color:"#22c55e",marginLeft:"6px"}},dur):null
          ]));
          const delBtn=btn({style:{background:"transparent",border:"none",color:"#334155",cursor:"pointer",fontSize:"14px",padding:"0"}},
            "×");
          delBtn.addEventListener('click',(e2=>{e2.stopPropagation();const uid2=s.uid;
            setTodo(vd,item.id,{sessions:sessions.filter(x=>x.uid!==uid2)});
          }));
          sRow.appendChild(delBtn);
          sessionList.appendChild(sRow);
        });
        row.appendChild(sessionList);
      }

    } else {
      // ── 通常タイマー ──
      const innerRow=div({style:{display:"flex",alignItems:"center",gap:"8px"}});

      // 左側：チェックボックス or タイマーボタン（左端）
      if(item.type==="check"){
        const cb=btn({style:{
          width:"24px",height:"24px",borderRadius:"6px",flexShrink:0,
          border:`2px solid ${isDone?"#22c55e":"#334155"}`,
          background:isDone?"#22c55e":"transparent",
          cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px"
        }}, isDone?"✓":"");
        cb.addEventListener('click',()=>{
          const newChecked=!t.checked;
          setTodo(vd,item.id,{checked:newChecked,time:new Date().toISOString()});
          if(newChecked){
            // 全完了チェック
            const newDone=TODO_ITEMS.filter(it=>{
              if(it.id===item.id)return true;
              return isTodoDone(vd,it);
            }).length;
            const targets=TODO_ITEMS.filter(it=>!(( state.todos[vd]||{})[it.id]||{}).excluded);
            if(newDone>=targets.length){
              setTimeout(()=>{showToast("🎉 全TODO完了！おめでとう！","#22c55e");showConfetti();},100);
            } else {
              showToast(`✅ ${item.label} 達成！`);
            }
          }
        });
        innerRow.appendChild(cb);
      } else {
        // タイマー：▶⏹→編集ボタンを左端に
        if(!isExcluded){
          let timerBtn;
          if(!t.startTime){
            timerBtn=btn({style:{padding:"3px 10px",background:"#0ea5e933",border:"1px solid #0ea5e9",borderRadius:"6px",color:"#38bdf8",fontSize:"12px",cursor:"pointer",fontWeight:600,flexShrink:0}},"▶");
            timerBtn.addEventListener('click',e=>{e.stopPropagation();setTodo(vd,item.id,{startTime:new Date().toISOString()});});
          } else if(!t.endTime){
            timerBtn=btn({style:{padding:"3px 10px",background:"#f9731633",border:"1px solid #f97316",borderRadius:"6px",color:"#f97316",fontSize:"12px",cursor:"pointer",fontWeight:600,flexShrink:0}},"⏹");
            timerBtn.addEventListener('click',e=>{e.stopPropagation();setTodo(vd,item.id,{...t,endTime:new Date().toISOString()});showToast(`✅ ${item.label} 完了！`);});
          } else {
            timerBtn=btn({style:{padding:"3px 8px",background:"#22c55e18",border:"1px solid #22c55e44",borderRadius:"6px",color:"#22c55e",fontSize:"11px",cursor:"pointer",flexShrink:0,whiteSpace:"nowrap"}},"✏️ 編集");
            timerBtn.addEventListener('click',(()=>{const td2=t;const itemId=item.id;return e=>{e.stopPropagation();
              state.editTimerItemId=itemId;
              const parseT=s=>{if(!s)return null;const d2=new Date(s);return{h:d2.getHours(),m:d2.getMinutes()};};
              state.editTimerStart=parseT(td2.startTime)||{h:new Date().getHours(),m:0};
              state.editTimerEnd=parseT(td2.endTime)||{h:new Date().getHours(),m:0};
              state.modal="editTimer";render();
            };})()); 
          }
          innerRow.appendChild(timerBtn);
        } else {
          // 除外中は左側に小さいアイコンのみ
          const icon=div({style:{width:"24px",height:"24px",borderRadius:"6px",flexShrink:0,background:"#1e3a5f",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px"}},"—");
          innerRow.appendChild(icon);
        }
        // 左アイコン（タップで手動入力）は除外
      }

      // ラベル＋連続日数
      innerRow.appendChild(div({style:{flex:1}},[
        div({style:{display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap"}},[
          div({style:{fontSize:"13px",fontWeight:600,color:isExcluded?"#475569":isDone?"#64748b":"#e2e8f0",textDecoration:(isExcluded||isDone)?"line-through":"none"}},item.label),
          streakDisplay?span({style:{fontSize:"10px",color:streakDisplay.color,fontWeight:700}},streakDisplay.label):null
        ]),
        elapsed&&!isExcluded?div({style:{fontSize:"11px",color:isRunning?"#f97316":"#64748b",marginTop:"2px"}},[
          isRunning
            ?(()=>{
              const sTime=new Date(t.startTime);
              const sL=`${sTime.getHours()}:${String(sTime.getMinutes()).padStart(2,'0')}`;
              return txt(`⏱ ${sL}〜 計測中 ${elapsed}...`);
            })()
            :(()=>{
              const sTime=t.startTime?new Date(t.startTime):null;
              const eTime=t.endTime?new Date(t.endTime):null;
              const sL=sTime?`${sTime.getHours()}:${String(sTime.getMinutes()).padStart(2,'0')}`:"";
              const eL=eTime?`${eTime.getHours()}:${String(eTime.getMinutes()).padStart(2,'0')}`:"";
              return txt(`✓ ${sL}〜${eL} (${elapsed})`);
            })()
        ]):null
      ]));

      // 除外ボタン（右端）
      const exBtn=btn({style:{
        fontSize:"10px",padding:"3px 8px",borderRadius:"6px",whiteSpace:"nowrap",cursor:"pointer",
        border:`1px solid ${isExcluded?"#f97316":"#334155"}`,
        background:isExcluded?"#f9731622":"transparent",
        color:isExcluded?"#f97316":"#475569"
      }},isExcluded?"除外中":"除外");
      exBtn.addEventListener('click',(()=>{const id=item.id;return e=>{e.stopPropagation();toggleExclude(vd,id);};})()); 
      innerRow.appendChild(exBtn);

      // チェック完了時刻表示
      if(item.type==="check" && isDone && t.time){
        const d2=new Date(t.time);
        innerRow.appendChild(span({style:{fontSize:"10px",color:"#334155",whiteSpace:"nowrap"}},
          `${d2.getHours()}:${String(d2.getMinutes()).padStart(2,'0')}`));
      }
      row.appendChild(innerRow);
    }

    wrap.appendChild(row);
  });

  return wrap;
}

// ── アルコールタブ ────────────────────────────────
function renderAlcohol(vd,isToday){
  const d=getDaily(vd);
  const drinks=(d.drinks||[]).map(dr=>({...dr,drinkType:resolveDT(dr)}));
  const totalG=drinks.reduce((a,b)=>a+pureAlcohol(b.ml,b.drinkType.pct),0);
  const wrap=div({style:{maxWidth:"600px",margin:"0 auto",padding:"12px 16px 60px"}},[]);

  // BAC計算
  let nowMin=new Date().getHours()*60+new Date().getMinutes();
  const dd=drinks.map(d=>{let startMin=d.hour*60+(d.min||0);if(d.startNextDay)startMin+=1440;let endMin=d.endHour!=null?d.endHour*60+(d.endMin||0):startMin+20;if(d.startNextDay&&d.endHour!=null)endMin+=1440;if(endMin<startMin)endMin+=1440;return{startMin,endMin,alcoholG:pureAlcohol(d.ml,d.drinkType.pct)};});

  const hasNextDay=drinks.some(d=>d.startNextDay);

  // 表示日の翌日が今日か判定（日をまたいで継続中のケース）
  const isViewingYesterday=(()=>{
    const p=vd.split('-');
    const viewD=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
    viewD.setDate(viewD.getDate()+1);
    const nextStr=`${viewD.getFullYear()}-${String(viewD.getMonth()+1).padStart(2,'0')}-${String(viewD.getDate()).padStart(2,'0')}`;
    return nextStr===todayStr();
  })();

  // 現在BACを計算すべきか＆計算用の現在時刻
  let showCurrent=false, nowMinCalc=nowMin;
  if(isToday){
    showCurrent=true;
    nowMinCalc=hasNextDay?nowMin+1440:nowMin;
  } else if(isViewingYesterday){
    // 昨日を表示中：今の時刻は「昨日の24時以降」として扱う
    showCurrent=true;
    nowMinCalc=nowMin+1440;
  }

  const curBac=(drinks.length&&showCurrent)?calcBAC(dd,60,'m',nowMinCalc):0;
  const lv=bacLevel(curBac);

  // 今以降のピーク値
  const peakBac=(drinks.length&&showCurrent)?(() => {
    let peak=curBac;
    for(let t=nowMinCalc;t<=nowMinCalc+8*60;t+=5){
      const b=calcBAC(dd,60,'m',t);
      if(b>peak)peak=b;
    }
    return peak;
  })():0;
  const peakLv=bacLevel(peakBac);

  const graphCard=div({className:"card"},[
    div({style:{fontSize:"13px",fontWeight:700,color:"#e2e8f0",marginBottom:"12px"}},"📊 血中アルコール推移"),
    div({style:{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:"10px"}},[
      div({},[
        div({style:{fontSize:"10px",color:"#64748b",marginBottom:"2px"}},"現在の血中アルコール濃度"),
        div({style:{fontSize:"28px",fontWeight:800,color:lv.color,lineHeight:1}},[txt(`${curBac.toFixed(2)}`),span({style:{fontSize:"13px",color:"#64748b"}},"‰")]),
        div({style:{marginTop:"4px",display:"inline-block",fontSize:"11px",padding:"2px 10px",borderRadius:"12px",background:lv.bg,color:lv.color,fontWeight:700,border:`1px solid ${lv.color}55`}},lv.label)
      ]),
      div({style:{textAlign:"right"}},[
        div({style:{fontSize:"10px",color:"#64748b"}},"素面になる目安"),
        div({style:{fontSize:"14px",fontWeight:700,color:"#94a3b8"}},getSoberTime(drinks))
      ])
    ]),
    // 今後のピーク値
    drinks.length>0?div({style:{display:"flex",alignItems:"center",gap:"12px",padding:"8px 12px",background:"#0f172a",borderRadius:"8px",marginBottom:"10px"}},[
      div({},[
        div({style:{fontSize:"10px",color:"#64748b",marginBottom:"2px"}},"今後の最大血中アルコール濃度"),
        div({style:{display:"flex",alignItems:"baseline",gap:"6px"}},[
          div({style:{fontSize:"22px",fontWeight:800,color:peakLv.color}},[txt(`${peakBac.toFixed(2)}`),span({style:{fontSize:"11px",color:"#64748b"}},"‰")]),
          div({style:{fontSize:"11px",padding:"1px 8px",borderRadius:"10px",background:peakLv.bg,color:peakLv.color,border:`1px solid ${peakLv.color}55`}},peakLv.label)
        ])
      ])
    ]):null,
    renderBACChart(drinks, showCurrent, nowMinCalc),
    div({style:{display:"flex",gap:"10px",marginTop:"8px",flexWrap:"wrap"}},[
      {c:"#ef4444",dash:true,l:"酩酊(0.8‰)"},{c:"#eab308",dot:true,l:"飲み始め"},
      {c:"#a78bfa",dot:true,l:"飲み終わり"},{c:"#38bdf8",dot:true,l:"現在"}
    ].map(({c,dash,dot,l})=>div({style:{display:"flex",alignItems:"center",gap:"4px"}},[
      div({style:{width:dot?"8px":"14px",height:dot?"8px":"2px",borderRadius:dot?"50%":"0",background:dot?c:`repeating-linear-gradient(90deg,${c} 0,${c} 3px,transparent 3px,transparent 6px)`}}),
      span({style:{fontSize:"10px",color:"#64748b"}},l)
    ])))
  ]);
  wrap.appendChild(graphCard);

function getSoberTime(drinks){
  if(!drinks.length)return"—";
  const nowMin=new Date().getHours()*60+new Date().getMinutes();
  const dd=drinks.map(d=>{let startMin=d.hour*60+(d.min||0);if(d.startNextDay)startMin+=1440;let endMin=d.endHour!=null?d.endHour*60+(d.endMin||0):startMin+20;if(d.startNextDay&&d.endHour!=null)endMin+=1440;if(endMin<startMin)endMin+=1440;return{startMin,endMin,alcoholG:pureAlcohol(d.ml,d.drinkType.pct)};});
  for(let t=nowMin+5;t<=nowMin+14*60;t+=5){
    if(calcBAC(dd,60,'m',t)<=0.02)return`${Math.floor(t/60)%24}:${String(t%60).padStart(2,"0")}`;
  }
  return"12h以上";
}
function removeDrink(vd,uid){const d=getDaily(vd);setDaily(vd,{drinks:(d.drinks||[]).filter(x=>x.uid!==uid)});}
function recordEnd(vd,uid){const n=new Date();const d=getDaily(vd);setDaily(vd,{drinks:(d.drinks||[]).map(x=>x.uid===uid?{...x,endHour:n.getHours(),endMin:n.getMinutes()}:x)});render();}
function clearEnd(vd,uid){const d=getDaily(vd);setDaily(vd,{drinks:(d.drinks||[]).map(x=>{if(x.uid!==uid)return x;const c={...x};delete c.endHour;delete c.endMin;return c;})});render();}

  const wrap=div({style:{maxWidth:"600px",margin:"0 auto",padding:"12px 16px 60px"}});

  // ── 月間体調ヒートマップ ──
  if(state.heatmapMonth===undefined){
    const n=new Date();
    state.heatmapMonth={y:n.getFullYear(),m:n.getMonth()+1};
  }
  const hm=state.heatmapMonth;
  const hmCard=div({className:"card"});
  hmCard.appendChild(div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}},[
    btn({style:{background:"transparent",border:"1px solid #334155",borderRadius:"7px",color:"#94a3b8",cursor:"pointer",fontSize:"14px",padding:"2px 10px"},
      onClick:()=>{hm.m--;if(hm.m<1){hm.m=12;hm.y--;}render();}},"‹"),

    btn({style:{background:"transparent",border:"1px solid #334155",borderRadius:"7px",color:"#94a3b8",cursor:"pointer",fontSize:"14px",padding:"2px 10px"},

  hmCard.appendChild(div({style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"3px",marginBottom:"3px"}},
    ["月","火","水","木","金","土","日"].map(w=>div({style:{textAlign:"center",fontSize:"9px",color:"#475569"}},w))));

  // 日ごとの平均スコアマップ
  const monthPrefix=`${hm.y}-${String(hm.m).padStart(2,'0')}`;
  const dayScores={};
  state.logs.filter(l=>l.dateStr.startsWith(monthPrefix)&&l.score!=null).forEach(l=>{
    if(!dayScores[l.dateStr])dayScores[l.dateStr]=[];
    dayScores[l.dateStr].push(l.score);

  // カレンダー描画（月曜始まり）
  const firstDay=new Date(hm.y,hm.m-1,1);
